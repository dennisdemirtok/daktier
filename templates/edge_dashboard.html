// ── Bokmodeller — evaluerar aktien mot klassiska värderingsmodeller ──
function _verdict(pass, warn) {
    if (pass) return {cls:'v-pass', icon:'✅', txt:'Pass'};
    if (warn) return {cls:'v-warn', icon:'⚠️', txt:'Varning'};
    return {cls:'v-fail', icon:'❌', txt:'Fail'};
}
function evaluateBookModels(s) {
    const out = [];
    const pe = s.pe_ratio, pb = s.price_book_ratio, evEbit = s.ev_ebit_ratio;
    const dy = s.direct_yield, roe = s.return_on_equity, roce = s.return_on_capital_employed;
    const de = s.debt_to_equity_ratio, ndEbitda = s.net_debt_ebitda_ratio;
    const vol = s.volatility, beta = s.beta, rsi = s.rsi14;
    const sma200 = s.sma200; // pct deviation (positive = över)
    const mcap = s.market_cap, ocf = s.operating_cash_flow;

    // Graham Defensive (P/E < 15, P/B < 1.5, P/E * P/B < 22.5)
    if (pe != null && pb != null) {
        const prod = pe * pb;
        const pass = pe < 15 && pb < 1.5 && prod < 22.5;
        const warn = pe < 20 && pb < 2.5 && prod < 35;
        const v = _verdict(pass, !pass && warn);
        out.push({
            key:'graham', icon:'📘', title:'Graham Defensive',
            sub:'Den intelligente investeraren — P/E × P/B < 22,5',
            v, metric: `P/E ${pe.toFixed(1)} × P/B ${pb.toFixed(2)} = ${prod.toFixed(1)}`
        });
    }

    // Buffett Quality — kräver BÅDE hög ROE OCH verifierbar låg skuld (D/E eller ND/EBITDA).
    // Utan skuld-data kan vi inte säga om lönsamheten är hävstångsdriven.
    if (roe != null) {
        const roePct = roe * 100;
        const hasDebtData = de != null || ndEbitda != null;
        const deOk = de == null || de < 0.5;
        const ndOk = ndEbitda == null || ndEbitda < 3;
        const pass = roePct >= 15 && hasDebtData && deOk && ndOk;
        const warn = hasDebtData && roePct >= 10 && deOk && ndOk;
        const v = _verdict(pass, !pass && warn);
        const dbgMetric = !hasDebtData
            ? `ROE ${roePct.toFixed(1)}% · skulddata saknas (ej bedömbar)`
            : `ROE ${roePct.toFixed(1)}% · D/E ${de!=null?de.toFixed(2):'—'} · ND/EBITDA ${ndEbitda!=null?ndEbitda.toFixed(1):'—'}`;
        out.push({
            key:'buffett', icon:'🏰', title:'Buffett Quality Moat',
            sub:'Hög ROE + låg skuld = kvalitetsbolag',
            v, metric: dbgMetric
        });
    }

    // Lynch PEG (< 1 = billigt, < 1.5 = OK). Kräver RIKTIG tillväxt (>5%).
    // PEG = P/E / tillväxt — vi approximerar tillväxt från ägarutveckling 1Y
    const growthProxy = s.owners_change_1y != null ? s.owners_change_1y * 100 : null;
    if (pe != null && growthProxy != null && growthProxy > 5) {
        const peg = pe / growthProxy;
        const pass = peg < 1;
        const warn = peg < 1.5;
        const v = _verdict(pass, !pass && warn);
        out.push({
            key:'lynch', icon:'🔎', title:'Lynch PEG',
            sub:'P/E i relation till tillväxt (ägar-proxy)',
            v, metric: `PEG ≈ ${peg.toFixed(2)} (P/E ${pe.toFixed(1)} / tillväxt ${growthProxy.toFixed(1)}%)`
        });
    }

    // Magic Formula (Greenblatt): kräver BÅDA — billigt (låg EV/EBIT) OCH kvalitet (hög ROCE).
    // En enskild stark sida räcker inte enligt Greenblatt.
    if (evEbit != null && roce != null) {
        const ey = 1 / evEbit;  // earnings yield
        const pass = evEbit < 10 && roce > 0.15;
        const warn = evEbit < 15 && roce > 0.10;
        const v = _verdict(pass, !pass && warn);
        const cheapTag = evEbit < 10 ? '✓ billigt' : (evEbit < 15 ? '~ok' : '✗ dyrt');
        const qualTag  = roce > 0.15 ? '✓ kvalitet' : (roce > 0.10 ? '~ok' : '✗ svag kvalitet');
        out.push({
            key:'magic', icon:'📊', title:'Magic Formula',
            sub:'Greenblatt: kräver BÅDE billigt (EV/EBIT<10) OCH kvalitet (ROCE>15%)',
            v, metric: `EY ${(ey*100).toFixed(1)}% (${cheapTag}) · ROCE ${(roce*100).toFixed(1)}% (${qualTag})`
        });
    }

    // Klarman Margin of Safety — kräver BÅDE lågt P/B OCH lågt EV/EBIT (dubbel bekräftelse).
    // En enskild billig multipel kan vara värdefälla — kräv att båda stämmer.
    if (pb != null && evEbit != null) {
        const passBoth = pb < 1.0 && evEbit < 8;
        const warnBoth = pb < 1.5 && evEbit < 12;
        const v = _verdict(passBoth, !passBoth && warnBoth);
        out.push({
            key:'klarman', icon:'🛡️', title:'Klarman Margin of Safety',
            sub:'Djupvärde — kräver BÅDE lågt P/B OCH lågt EV/EBIT',
            v, metric: `P/B ${pb.toFixed(2)} · EV/EBIT ${evEbit.toFixed(1)}`
        });
    } else if (pb != null || evEbit != null) {
        // Bara en mätpunkt → kan som bäst bli warn
        const warn = (pb != null && pb < 1.0) || (evEbit != null && evEbit < 8);
        const v = _verdict(false, warn);
        out.push({
            key:'klarman', icon:'🛡️', title:'Klarman Margin of Safety',
            sub:'Djupvärde — kräver BÅDE lågt P/B OCH lågt EV/EBIT',
            v, metric: `P/B ${pb!=null?pb.toFixed(2):'—'} · EV/EBIT ${evEbit!=null?evEbit.toFixed(1):'—'} (endast ett mätvärde)`
        });
    }

    // Bogle/Investera — utdelning + kvalitet (DY ≥ 3%, ROE > 10%, D/E < 1)
    if (dy != null) {
        const dyPct = dy * 100;
        const roeOk = roe == null || roe * 100 > 10;
        const deOk = de == null || de < 1;
        const pass = dyPct >= 3 && roeOk && deOk;
        const warn = dyPct >= 2;
        const v = _verdict(pass, !pass && warn);
        out.push({
            key:'divq', icon:'💰', title:'Utdelningskvalitet',
            sub:'Stabil direktavkastning + hållbar balansräkning',
            v, metric: `DY ${dyPct.toFixed(2)}% · ROE ${roe!=null?(roe*100).toFixed(1)+'%':'—'} · D/E ${de!=null?de.toFixed(2):'—'}`
        });
    }

    // Trend / Momentum (ovanför SMA200, RSI < 70)
    if (sma200 != null) {
        const trendUp = sma200 > 0;
        const rsiOk = rsi == null || rsi < 70;
        const pass = trendUp && rsiOk && (rsi == null || rsi > 40);
        const warn = trendUp;
        const v = _verdict(pass, !pass && warn);
        out.push({
            key:'trend', icon:'📈', title:'Trend & Momentum',
            sub:'Stinsen-regeln — följ trenden, undvik överköpta lägen',
            v, metric: `SMA200 ${(sma200*100).toFixed(1)}% · RSI ${rsi!=null?rsi.toFixed(0):'—'}`
        });
    }

    // Taleb Barbell — hög vol = spekulativ (liten andel); låg vol = säker (stor andel)
    if (vol != null) {
        const volPct = vol * 100;
        let tag, v;
        if (volPct < 25) { tag = 'Säker sida (80% av portföljen)'; v = _verdict(true, false); }
        else if (volPct < 45) { tag = 'Mitten — begränsad roll'; v = _verdict(false, true); }
        else { tag = 'Spekulativ sida (max 20%)'; v = _verdict(false, false); }
        out.push({
            key:'taleb', icon:'🎯', title:'Taleb Barbell',
            sub:'Klassa som "säker" vs "spekulativ"',
            v, metric: `${tag} · vol ${volPct.toFixed(0)}% · beta ${beta!=null?beta.toFixed(2):'—'}`
        });
    }

    // Kelly Criterion — simpel sizing baserat på estimerat edge från meta_score
    if (s.meta_score != null) {
        const edge = (s.meta_score - 50) / 100;  // 50 = neutral, >50 = edge
        const kelly = Math.max(-0.25, Math.min(0.25, edge * 0.5));
        const kellyPct = kelly * 100;
        const pass = kellyPct > 10;
        const warn = kellyPct > 3;
        const v = _verdict(pass, !pass && warn);
        out.push({
            key:'kelly', icon:'🎲', title:'Kelly Sizing',
            sub:'Halv-Kelly från Meta Score (edge-baserad vikt)',
            v, metric: `Föreslagen vikt ${kellyPct>0?'+':''}${kellyPct.toFixed(1)}%`
        });
    }

    // Ägarmomentum (Spiltan/Stinsen — smart money flow)
    if (s.owners_change_1m != null) {
        const mom = s.owners_change_1m * 100;
        const pass = mom > 3;
        const warn = mom > 0;
        const v = _verdict(pass, !pass && warn);
        out.push({
            key:'owners', icon:'👥', title:'Ägarmomentum',
            sub:'Spiltan-approach — smart money följer kvalitet',
            v, metric: `Ägare +${mom.toFixed(1)}% (30d) · totalt ${fmtNum(s.number_of_owners)}`
        });
    }

    return out;
}

function renderBookModelSection(s) {
    const models = evaluateBookModels(s);
    if (!models.length) return '';

    const passCount = models.filter(m => m.v.cls === 'v-pass').length;
    const warnCount = models.filter(m => m.v.cls === 'v-warn').length;
    const failCount = models.filter(m => m.v.cls === 'v-fail').length;
    const total = models.length;
    const passPct = (passCount / total) * 100;

    let verdict, verdictColor;
    if (passCount >= total * 0.6) { verdict = 'Stark bokmodell-konsensus'; verdictColor = 'var(--green-dark)'; }
    else if (passCount + warnCount >= total * 0.6) { verdict = 'Blandad signal — läs detaljer'; verdictColor = '#92400e'; }
    else { verdict = 'Svag enligt bokmodellerna'; verdictColor = 'var(--red)'; }

    const cards = models.map(m => `
        <div class="model-verdict ${m.v.cls}">
            <div class="mv-head">
                <span class="mv-icon">${m.icon}</span>
                <div class="mv-title-wrap">
                    <div class="mv-title">${m.title}</div>
                    <div class="mv-sub">${m.sub}</div>
                </div>
                <span class="mv-badge">${m.v.icon} ${m.v.txt}</span>
            </div>
            <div class="mv-metric">${m.metric}</div>
        </div>
    `).join('');

    return `<div class="drawer-section">
        <div class="drawer-section-title">📚 Bokmodeller (från böckerna)</div>
        <div style="background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-radius:12px;padding:14px 16px;margin-bottom:10px">
            <div style="display:flex;align-items:center;gap:14px">
                <div>
                    <div style="font-size:24px;font-weight:900;color:${verdictColor}">${passCount}/${total}</div>
                    <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px;font-weight:700">Pass</div>
                </div>
                <div style="flex:1">
                    <div style="font-size:13px;font-weight:700;color:${verdictColor}">${verdict}</div>
                    <div style="display:flex;gap:10px;margin-top:4px;font-size:11px;color:var(--text-muted)">
                        <span>✅ ${passCount}</span>
                        <span>⚠️ ${warnCount}</span>
                        <span>❌ ${failCount}</span>
                    </div>
                    <div class="mv-meter"><div class="mv-meter-fill" style="width:${passPct}%;background:${verdictColor}"></div></div>
                </div>
            </div>
        </div>
        <div class="mv-stack">${cards}</div>
    </div>`;
}

    if (!s) return;

    const flag = FLAGS[s.country] || '';

    // Header
    document.getElementById('drawerHeaderContent').innerHTML = `
        <div>
            <div style="font-size:20px;font-weight:700">${flag} ${s.name}</div>
            <div style="font-size:13px;color:var(--text-muted)">${s.short_name || ''} · ${s.country || ''} · ${s.market_place || ''}</div>

        </div>
    `;

    let html = '';

    // ── EDGE MODEL (if available) ──
    if (s.edge_score != null) {
        const sc = scoreColor(s.edge_score);
        html += `<div class="drawer-section">
            <div class="drawer-section-title">Edge Model</div>
            <div class="drawer-grid">
                <div class="drawer-item"><div class="drawer-item-label">Edge Score</div><div class="drawer-item-value" style="color:${sc}">${s.edge_score.toFixed(1)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Signal</div><div class="drawer-item-value">${signalBadge(s.signal)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Action</div><div class="drawer-item-value">${actionBadge(s.action)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Fas</div><div class="drawer-item-value">${phaseBadge(s.phase)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">DD Risk</div><div class="drawer-item-value">${ddRiskBadge(s.dd_risk, s.dd_risk_label)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">7d Trend</div><div class="drawer-item-value">${trend7dBadge(s.trend_7d, s.trend_7d_sv)}</div></div>
            </div>
        </div>`;
        if (s.components) {
            const comps = [
                ['Momentum', s.components.owner_momentum, 'var(--green)'],
                ['Accel+SS', s.components.accel_sweetspot, 'var(--blue)'],
                ['Kontrarian', s.components.kontrarian, 'var(--purple)'],
                ['Fundamental', s.components.fundamental, '#2563eb'],
                ['Short Squeeze', s.components.short_squeeze, 'var(--orange)'],
                ['Ägarmognad', s.components.owner_maturity, '#16a34a'],
            ];
            html += `<div class="drawer-section"><div class="drawer-section-title">Modellkomponenter</div><div class="drawer-grid">${
                comps.map(([l,v,c]) => `<div class="drawer-item"><div class="drawer-item-label">${l}</div><div class="drawer-item-value" style="color:${c}">${v!=null?v.toFixed(0):'-'}</div></div>`).join('')
            }</div></div>`;
        }
    }

    // ── DISCOVERY SIGNAL (backtestad: 66-87% win rate, +45% 1Y) ──
    const disc = s.discovery_score || (s.components && s.components.discovery) || 0;
    if (disc >= 30) {
        const discColor = disc >= 70 ? '#92400e' : disc >= 50 ? '#1e40af' : '#166534';
        const discBg = disc >= 70 ? 'linear-gradient(135deg, #fef3c7, #fde68a)' : disc >= 50 ? 'linear-gradient(135deg, #dbeafe, #bfdbfe)' : 'linear-gradient(135deg, #f0fdf4, #dcfce7)';
        const discEmoji = disc >= 70 ? '🔥' : disc >= 50 ? '⚡' : '📈';
        const discLabel = disc >= 70 ? 'Stark Discovery' : disc >= 50 ? 'Discovery' : 'Tidig tillväxt';
        const gc = s.growth_consistency || 0;
        const qp = s.quarters_positive || 0;
        const qt = s.quarters_total || 0;
        const vel = s.vel_13w ? (s.vel_13w * 100).toFixed(1) : '0';
        const strk = s.streak || 0;
        html += `<div class="drawer-section" style="background:${discBg};border-radius:12px;padding:16px">
            <div class="drawer-section-title" style="color:${discColor}">${discEmoji} Discovery Signal</div>
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
                <div style="font-size:36px;font-weight:900;color:${discColor}">${disc}</div>
                <div>
                    <div style="font-size:14px;font-weight:700;color:${discColor}">${discLabel}</div>
                    <div style="font-size:12px;color:var(--text-muted)">Backtest: 66% win, +45% snitt 1Y</div>
                </div>
            </div>
            <div class="consistency-bar"><div class="consistency-bar-fill" style="width:${gc * 100}%;background:${discColor}"></div></div>
            <div class="drawer-grid" style="margin-top:12px">
                <div class="drawer-item"><div class="drawer-item-label">Kvartalstillväxt</div><div class="drawer-item-value" style="color:${discColor}">${vel}%</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Streak</div><div class="drawer-item-value" style="color:${strk>=8?'var(--green)':'var(--text-muted)'}">${strk}v</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Konsistens</div><div class="drawer-item-value">${qp}/${qt} Q</div></div>
            </div>
        </div>`;
    }

    // ── ÄGARMOGNAD (5000+ aktier) ──
    if (s.maturity_score > 0 && disc < 30) {
        const ms = s.maturity_score;
        const ml = s.maturity_label || '';
        const gc = s.growth_consistency || 0;
        const qp = s.quarters_positive || 0;
        const qt = s.quarters_total || 0;
        const c5k = s.crossed_5000_date;
        const ov = s.owner_velocity || 0;
        const msColor = ms >= 70 ? '#166534' : ms >= 50 ? '#854d0e' : '#6b7280';
        const bgColor = ms >= 70 ? 'linear-gradient(135deg, #f0fdf4, #ecfccb)' : ms >= 50 ? 'linear-gradient(135deg, #fefce8, #fef9c3)' : '#f9fafb';
        html += `<div class="drawer-section" style="background:${bgColor};border-radius:12px;padding:16px">
            <div class="drawer-section-title" style="color:${msColor}">Ägarmognad</div>
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
                <div style="font-size:36px;font-weight:900;color:${msColor}">${ms.toFixed(0)}</div>
                <div>
                    <div style="font-size:14px;font-weight:700;color:${msColor}">${ml}</div>
                    <div style="font-size:12px;color:var(--text-muted)">Tillväxtkonsistens: ${qp}/${qt} kvartal</div>
                </div>
            </div>
            <div class="consistency-bar"><div class="consistency-bar-fill" style="width:${gc * 100}%"></div></div>
            <div class="drawer-grid" style="margin-top:12px">
                <div class="drawer-item"><div class="drawer-item-label">Velocity</div><div class="drawer-item-value" style="color:${ov>0?'var(--green)':'var(--red)'}">${ov.toFixed(2)}%/v</div></div>
                ${c5k ? `<div class="drawer-item"><div class="drawer-item-label">Korsade 5000</div><div class="drawer-item-value">${c5k}</div></div>` : ''}
            </div>
        </div>`;
    }

    // ── META SCORE (alla 4 modeller) ──
    if (s.meta_score != null) {
        const mc = scoreColor(s.meta_score);
        const dsc = s.dsm_score || 0;
        const asc = s.ace_score || 0;
        const msc = s.magic_score;
        html += `<div class="drawer-section">
            <div class="drawer-section-title">🎯 Meta Score (4 modeller)</div>
            <div class="drawer-grid">
                <div class="drawer-item"><div class="drawer-item-label">Meta Score</div><div class="drawer-item-value" style="font-size:20px;color:${mc}">${s.meta_score.toFixed(1)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Meta Signal</div><div class="drawer-item-value">${metaSignalBadge(s.meta_signal)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Enighet</div><div class="drawer-item-value">${modelAgreementBadge(s.model_agreement, s.model_agreement_total)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">DD Blockerad</div><div class="drawer-item-value">${s.dd_blocked ? '<span style="color:var(--red)">Ja ⚠</span>' : '<span style="color:var(--green)">Nej ✓</span>'}</div></div>
            </div>
            <div style="margin-top:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
                <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:8px">
                    <div style="font-size:10px;color:var(--text-muted)">🏇 Trav</div>
                    <div style="font-size:16px;font-weight:700;color:${scoreColor(s.edge_score||0)}">${(s.edge_score||0).toFixed(0)}</div>
                </div>
                <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:8px">
                    <div style="font-size:10px;color:var(--text-muted)">🎯 DSM</div>
                    <div style="font-size:16px;font-weight:700;color:${scoreColor(dsc)}">${dsc.toFixed(0)}</div>
                </div>
                <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:8px">
                    <div style="font-size:10px;color:var(--text-muted)">⚡ ACE</div>
                    <div style="font-size:16px;font-weight:700;color:${scoreColor(asc)}">${asc.toFixed(0)}</div>
                </div>
                <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:8px">
                    <div style="font-size:10px;color:var(--text-muted)">📊 Magic</div>
                    <div style="font-size:16px;font-weight:700;color:${msc != null ? scoreColor(msc) : 'var(--text-muted)'}">${msc != null ? msc.toFixed(0) : '—'}</div>
                </div>
            </div>
        </div>`;
    }

    // ── PRICE CHANGES ──
    const priceFields = [
        ['1D','one_day_change_pct'],['1V','one_week_change_pct'],['1M','one_month_change_pct'],
        ['3M','three_months_change_pct'],['6M','six_months_change_pct'],['YTD','ytd_change_pct'],
        ['1Y','one_year_change_pct'],['3Y','three_years_change_pct'],['5Y','five_years_change_pct'],
        ['10Y','ten_years_change_pct'],['Alltid','infinity_change_pct'],
    ];
    html += `<div class="drawer-section"><div class="drawer-section-title">Prisutveckling</div><div class="drawer-grid-3">${
        priceFields.map(([l,k]) => {
            const v = s[k];
            return `<div class="drawer-item"><div class="drawer-item-label">${l}</div><div class="drawer-item-value ${pctClass(v)}">${fmtPct(v)}</div></div>`;
        }).join('')
    }</div></div>`;

    // ── OWNER CHANGES ──
    const ownerFields = [
        ['1D','owners_change_1d','owners_change_1d_abs'],['1V','owners_change_1w','owners_change_1w_abs'],
        ['1M','owners_change_1m','owners_change_1m_abs'],['3M','owners_change_3m','owners_change_3m_abs'],
        ['YTD','owners_change_ytd','owners_change_ytd_abs'],['1Y','owners_change_1y','owners_change_1y_abs'],
    ];
    html += `<div class="drawer-section"><div class="drawer-section-title">Ägarförändringar (${fmtNum(s.number_of_owners)} ägare)</div><div class="drawer-grid-3">${
        ownerFields.map(([l,pk,ak]) => {
            const v = s[pk]; const abs = s[ak];
            return `<div class="drawer-item"><div class="drawer-item-label">${l}</div>
                <div class="drawer-item-value ${pctClass(v)}">${fmtPct(v)}</div>
                <div style="font-size:11px;color:var(--text-muted)">${abs ? (abs>0?'+':'')+fmtNum(abs)+' st' : ''}</div></div>`;
        }).join('')
    }</div></div>`;

    // ── FUNDAMENTALS ──
    const fmtV = (v,d=1) => v != null ? v.toFixed(d) : '-';
    const fmtM = v => v != null ? (Math.abs(v)>1e9 ? (v/1e9).toFixed(1)+' Md' : (v/1e6).toFixed(0)+' M') : '-';
    const fundItems = [
        ['P/E', s.pe_ratio, v => fmtV(v,1)],
        ['P/B', s.price_book_ratio, v => fmtV(v,2)],
        ['EV/EBIT', s.ev_ebit_ratio, v => fmtV(v,1)],
        ['Direktavk.', s.direct_yield, v => v!=null ? fmtV(v*100,1)+'%' : '-'],
        ['ROE', s.return_on_equity, v => v!=null ? fmtV(v*100,1)+'%' : '-'],
        ['ROA', s.return_on_assets, v => v!=null ? fmtV(v*100,1)+'%' : '-'],
        ['ROCE', s.return_on_capital_employed, v => v!=null ? fmtV(v*100,1)+'%' : '-'],
        ['D/E', s.debt_to_equity_ratio, v => fmtV(v,2)],
        ['ND/EBITDA', s.net_debt_ebitda_ratio, v => fmtV(v,1)],
        ['EPS', s.eps, v => fmtV(v,2)],
        ['OCF', s.operating_cash_flow, v => fmtM(v)],
        ['Nettoresultat', s.net_profit, v => fmtM(v)],
        ['Omsättning', s.sales, v => fmtM(v)],
        ['Börsvärde', s.market_cap, v => v!=null ? (v/1e9).toFixed(2)+' Md' : '-'],
    ];
    html += `<div class="drawer-section"><div class="drawer-section-title">Fundamentala nyckeltal</div><div class="drawer-grid">${
        fundItems.map(([l,v,fmt]) => `<div class="drawer-item"><div class="drawer-item-label">${l}</div><div class="drawer-item-value">${fmt(v)}</div></div>`).join('')
    }</div></div>`;

    // ── TECHNICALS ──
    const price = s.last_price;
    const smaFmt = (smaVal) => {
        if (smaVal == null || smaVal === 0) return '-';
        // sma20/sma50/sma200 are already pct deviations (e.g. -0.07 = -7%)
        const pct = smaVal * 100;
        return `<span class="${pct>0?'num-pos':'num-neg'}">${pct>0?'Över':'Under'} (${Math.abs(pct).toFixed(1)}%)</span>`;
    };
    const techItems = [
        ['RSI (14)', s.rsi14, v => v!=null ? `<span style="color:${v>70?'var(--red)':v<30?'var(--green)':'var(--text)'}">${v.toFixed(0)}</span>` : '-'],
        ['SMA 20', s.sma20, v => smaFmt(v)],
        ['SMA 50', s.sma50, v => smaFmt(v)],
        ['SMA 200', s.sma200, v => smaFmt(v)],
        ['Beta', s.beta, v => fmtV(v,2)],
        ['Volatilitet', s.volatility, v => v!=null ? (v*100).toFixed(0)+'%' : '-'],
        ['MACD', s.macd_histogram, v => v!=null ? `<span class="${v>0?'num-pos':'num-neg'}">${v.toFixed(3)}</span>` : '-'],
        ['Boll. bredd', s.bollinger_distance_upper_to_lower, v => v!=null ? (v*100).toFixed(1)+'%' : '-'],
    ];
    html += `<div class="drawer-section"><div class="drawer-section-title">Tekniska indikatorer</div><div class="drawer-grid">${
        techItems.map(([l,v,fmt]) => `<div class="drawer-item"><div class="drawer-item-label">${l}</div><div class="drawer-item-value">${fmt(v)}</div></div>`).join('')
    }</div></div>`;

    // ── BOKMODELLER (Graham, Buffett, Lynch, Greenblatt, Klarman, Taleb, Kelly m.fl.) ──
    html += renderBookModelSection(s);

    // ── AI ANALYS-KNAPP ──
    html += `<div class="drawer-section">
        <div class="drawer-section-title">🤖 AI-analys (Claude)</div>
        <button id="aiAnalyzeBtn" onclick="analyzeStock()" style="
            width:100%;padding:12px 16px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;
            background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;display:flex;align-items:center;justify-content:center;gap:8px;
            transition:all 0.2s;box-shadow:0 2px 8px rgba(124,58,237,0.3);
        " onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 12px rgba(124,58,237,0.4)'"
           onmouseout="this.style.transform='none';this.style.boxShadow='0 2px 8px rgba(124,58,237,0.3)'">
            🧠 Analysera nyckeltal
        </button>
        <div id="aiAnalysisResult" style="margin-top:12px"></div>
    </div>`;

    // ── INSIDER ──
    if (s.insider_buys > 0 || s.insider_sells > 0) {
        html += `<div class="drawer-section"><div class="drawer-section-title">Insiderhandel (90d)</div><div class="drawer-grid">
            <div class="drawer-item"><div class="drawer-item-label">Köp</div><div class="drawer-item-value" style="color:var(--green)">${s.insider_buys}</div></div>
            <div class="drawer-item"><div class="drawer-item-label">Sälj</div><div class="drawer-item-value" style="color:var(--red)">${s.insider_sells}</div></div>
            ${s.insider_cluster_buy ? '<div class="drawer-item" style="grid-column:span 2;background:var(--green-light)"><div class="drawer-item-value" style="color:var(--green)">🔥 Klusterköp (3+ insiders)</div></div>' : ''}
        </div></div>`;
    }

    document.getElementById('drawerBody').innerHTML = html;
    document.getElementById('stockDrawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeDrawer() {
    document.getElementById('stockDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
    document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

// ── Infinity Scroll ──────────────────────────────────

function showLoadMore() {
    const el = document.getElementById('loadMore');
    if (el) el.innerHTML = '<div class="load-more-spinner"></div>';
}

function setupInfiniteScroll() {
    const target = document.getElementById('loadMore');
    if (!target) return;

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isLoadingMore && allLoadedRows.length < totalResults) {
            currentOffset += PAGE_SIZE;
            fetchData(true);
        }
    }, { threshold: 0.1 });

    observer.observe(target);
}

// ── Morning Brief ─────────────────────────────────

let morningBriefData = null;

async function generateMorningBrief() {
    const btn = document.getElementById('morningBriefBtn');
    const container = document.getElementById('morningBriefResult');
    if (!btn || !container) return;

    btn.disabled = true;
    btn.innerHTML = '<div class="loading-spinner" style="width:18px;height:18px;border-width:2px;margin:0;display:inline-block"></div> Genererar brief...';

    try {
        const res = await fetch('/api/ai-morning-brief', {method: 'POST'});
        const data = await res.json();
        if (data.error) {
            container.innerHTML = `<div style="padding:12px;background:#fee;border-radius:8px;color:var(--red);font-size:13px">❌ ${data.error}</div>`;
            return;
        }
        morningBriefData = data;
        renderMorningBriefResult(container);
    } catch(e) {
        container.innerHTML = `<div style="padding:12px;background:#fee;border-radius:8px;color:var(--red);font-size:13px">❌ ${e.message}</div>`;
    } finally {
        btn.disabled = false;
        btn.innerHTML = '🌅 Generera morgonbrief';
    }
}

async function loadCachedBrief() {
    try {
        const res = await fetch('/api/ai-morning-brief');
        const data = await res.json();
        if (data.cached && data.greeting) {
            morningBriefData = data;
            const container = document.getElementById('morningBriefResult');
            if (container) renderMorningBriefResult(container);
        }
    } catch(e) {}
}

function renderMorningBriefResult(container) {
    const b = morningBriefData;
    if (!b) return;

    const signalColors = {
        'STARK KÖP': '#00a870', 'KÖP': '#22c55e', 'NEUTRAL': '#f59e0b',
        'SÄLJ': '#ef4444', 'STARK SÄLJ': '#991b1b',
        'BULLISH': '#00a870', 'BEARISH': '#ef4444',
    };
    const sigColor = signalColors[b.overall_signal] || '#666';

    const PCFG = {
        trav:  { icon: '🏇', label: 'Trav' },
        magic: { icon: '📊', label: 'Magic Formula' },
        dsm:   { icon: '🎯', label: 'DSM' },
        ace:   { icon: '⚡', label: 'ACE' },
        meta:  { icon: '🧠', label: 'Meta Score' },
    };

    const portfoliosHtml = (b.portfolios || []).map(p => {
        const cfg = PCFG[p.name?.toLowerCase()] || {icon:'📦', label: p.name};
        return `<div class="brief-port-card">
            <div class="brief-port-name">${cfg.icon} ${cfg.label}</div>
            <div class="brief-port-assessment">${p.assessment || ''}</div>
            ${p.action ? `<div style="margin-top:6px;font-size:12px;opacity:0.8">➡️ ${p.action}</div>` : ''}
        </div>`;
    }).join('');

    const stockpick = b.dagens_stockpick || b.stockpick || {};
    const stockpickHtml = stockpick.name ? `
        <div class="brief-stockpick">
            <div style="font-size:12px;opacity:0.7;margin-bottom:4px">🎯 DAGENS STOCKPICK</div>
            <div style="font-size:20px;font-weight:700">${stockpick.name}</div>
            <div style="font-size:13px;margin-top:6px;opacity:0.9">${stockpick.reason || ''}</div>

    const risksHtml = (b.risks || []).map(r => `<div style="font-size:12px;opacity:0.8;padding:2px 0">⚠️ ${r}</div>`).join('');

    container.innerHTML = `
        <div class="brief-card">
            <div class="brief-header">
                <div style="font-size:36px">🌅</div>
                <div>
                    <div class="brief-greeting">${b.greeting || 'God morgon!'}</div>

                </div>

            <div class="brief-grid">${portfoliosHtml}</div>

            <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px">
                <div>
                    <span class="brief-signal-badge" style="background:${sigColor};color:white">${b.overall_signal || '—'}</span>
                </div>
                ${risksHtml ? `<div style="flex:1;margin-left:16px">${risksHtml}</div>` : ''}

        </div>`;
}

function handleDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
    }
}

function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        uploadedImage = e.target.result;
        document.getElementById('imagePreview').innerHTML = `<img src="${uploadedImage}" class="upload-preview">`;
        const btn = document.getElementById('analyzeImageBtn');
        btn.disabled = false;
        btn.style.opacity = '1';
    };
    reader.readAsDataURL(file);
}

async function analyzePortfolioImage() {
    if (!uploadedImage) return;
    const btn = document.getElementById('analyzeImageBtn');
    const resultDiv = document.getElementById('myPortfolioResult');
    btn.disabled = true;
    btn.innerHTML = '<div class="loading-spinner" style="width:16px;height:16px;border-width:2px;margin:0;display:inline-block"></div> Analyserar...';
    resultDiv.innerHTML = '<div class="loading-wrap"><div class="loading-spinner"></div><p style="color:var(--text-muted)">Claude AI analyserar din portfölj... (kan ta 30-60 sek)</p></div>';

    try {
        const base64 = uploadedImage.split(',')[1];
        const res = await fetch('/api/analyze-portfolio', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({image: base64})

            resultDiv.innerHTML = `<div style="padding:16px;background:#fee;border-radius:8px;color:var(--red)">❌ ${data.error}</div>`;

function renderPortfolioAnalysis(data, container) {
    const stocks = data.stocks || [];
    const recs = data.recommendations || [];
    const summary = data.summary || '';

    const recMap = {};
    recs.forEach(r => { recMap[(r.name||'').toLowerCase()] = r; });

    const recColors = {
        'KÖP': {bg:'var(--green-light)',color:'var(--green)',icon:'🟢'},
        'KÖP MER': {bg:'#00a870',color:'white',icon:'🟢🟢'},
        'HÅLL': {bg:'#f5f5f5',color:'var(--text-sec)',icon:'🔵'},
        'SÄLJ': {bg:'var(--red-light)',color:'var(--red)',icon:'🔴'},
        'STARK SÄLJ': {bg:'var(--red)',color:'white',icon:'🔴🔴'},
    };

    const rows = stocks.map((s, i) => {
        const rec = recMap[(s.name||'').toLowerCase()] || {};
        const signal = rec.recommendation || 'HÅLL';
        const rc = recColors[signal] || recColors['HÅLL'];
        const matched = s.matched !== false;
        return `<tr>
            <td>${i+1}</td>
            <td style="font-weight:600">${s.name || '?'}</td>
            <td style="text-align:center">${matched ? '<span style="color:var(--green)">✓</span>' : '<span style="color:var(--text-muted)">—</span>'}</td>
            <td style="text-align:right">${s.current_price ? s.current_price.toFixed(2) : '-'}</td>
            <td style="text-align:right">${s.shares || '-'}</td>
            <td style="text-align:center">${s.meta_score ? '<span style="font-weight:700;color:'+scoreColor(s.meta_score)+'">'+s.meta_score.toFixed(0)+'</span>' : '-'}</td>
            <td style="text-align:center">${s.signal ? signalBadge(s.signal) : '-'}</td>
            <td><span class="badge" style="background:${rc.bg};color:${rc.color};font-size:12px">${rc.icon} ${signal}</span></td>
            <td style="font-size:12px;color:var(--text-sec);max-width:200px">${rec.reason || ''}</td>
        </tr>`;
    }).join('');

    const html = `
        ${summary ? `<div style="background:linear-gradient(135deg,var(--orange-light),#fff8e1);border-radius:var(--radius);padding:16px;margin-bottom:16px;font-size:14px">
            <strong>📋 Sammanfattning:</strong> ${summary}
        </div>` : ''}
        <div class="table-container"><table><thead><tr>
            <th>#</th><th>Aktie</th><th style="text-align:center">Matchad</th>
            <th style="text-align:right">Kurs</th><th style="text-align:right">Antal</th>
            <th style="text-align:center">Meta Score</th><th style="text-align:center">Signal</th>
            <th>Rekommendation</th><th>Motivering</th>
        </tr></thead><tbody>${rows}</tbody></table></div>
    `;
    container.innerHTML = html;
    myPortfolioResult = html;
}

let _dashCache = null;
const _modelToplistCache = {};  // per-modell cache med TTL

async function loadModelTopN(modelKey, limit = 5, expandView = false) {
    const el = document.getElementById('mtl-list-' + modelKey);
    if (!el) return;

    const cacheKey = `${modelKey}|${limit}`;
    const cached = _modelToplistCache[cacheKey];
    if (cached && (Date.now() - cached._ts) < 5 * 60 * 1000) {
        renderModelToplistRows(el, cached.stocks, limit, expandView);
        return;
    }

    el.innerHTML = '<div class="mtl-skel">Laddar…</div>';
    try {
        const r = await fetch(`/api/model-toplist?model=${encodeURIComponent(modelKey)}&limit=${limit}`);
        const data = await r.json();
        _modelToplistCache[cacheKey] = {stocks: data.stocks || [], _ts: Date.now()};
        renderModelToplistRows(el, data.stocks || [], limit, expandView);
        // Cacha även för fetchAll så klick på aktie-namn går till drawer
        (data.stocks || []).forEach(s => { if (!_picksLookup[s.orderbook_id]) _picksLookup[s.orderbook_id] = s; });

        // Om första anropet var 5, visa "Visa topp 20"-knappen ändå
        if (limit === 5) {
            const btn = document.querySelector(`#mtl-${modelKey} .mtl-expand`);
            if (btn) btn.onclick = () => loadModelTopN(modelKey, 20, true);
        } else if (limit >= 20) {
            const btn = document.querySelector(`#mtl-${modelKey} .mtl-expand`);
            if (btn) { btn.textContent = 'Visa topp 5 ↑'; btn.onclick = () => loadModelTopN(modelKey, 5, false); }
        }
    } catch(e) {
        el.innerHTML = '<div class="mtl-err">Kunde inte ladda</div>';
    }
}

function renderModelToplistRows(el, stocks, limit, expandView) {
    if (!stocks.length) {
        el.innerHTML = '<div class="mtl-empty">Inga aktier matchar modellen just nu.</div>';
        return;
    }
    const visible = stocks.slice(0, limit);
    el.innerHTML = visible.map((s, i) => {
        const flag = FLAGS[s.country] || '';
        const sc = s.model_score;
        const scoreColor = sc >= 80 ? 'var(--green-dark)' : sc >= 65 ? 'var(--green)' : sc >= 50 ? '#92400e' : 'var(--text-muted)';
        const pe = s.pe_ratio != null ? `P/E ${s.pe_ratio.toFixed(1)}` : '';
        const dy = s.direct_yield != null && s.direct_yield > 0 ? `${(s.direct_yield*100).toFixed(1)}%` : '';
        const meta = [pe, dy].filter(Boolean).join(' · ');
        return `<div class="mtl-row" onclick='_openPickStock(${s.orderbook_id})'>
            <div class="mtl-rank">${i+1}</div>
            <div class="mtl-body">
                <div class="mtl-stock">${flag} ${s.name}</div>
                <div class="mtl-meta">${s.short_name||''}${meta?' · '+meta:''}</div>
            </div>
            <div class="mtl-score" style="color:${scoreColor}">${sc!=null?sc.toFixed(0):'–'}</div>
        </div>`;
    }).join('');
}

const _picksLookup = {};

async function _openPickStock(orderbookId) {
    // Hämta FULL aktiedata via dedikerad endpoint (annars saknar drawer fundamentala nyckeltal)
    try {
        const r = await fetch(`/api/stock/${orderbookId}`);
        if (r.ok) {
            const s = await r.json();
            if (s && s.orderbook_id) {
                openDrawer(s);
                return;
            }
        }
    } catch(e) { console.warn('stock detail fetch failed', e); }
    // Fallback: slim data från cachen
    const s = _picksLookup[orderbookId];
    if (s) openDrawer(s);
}

function _renderModelDetail(el, d) {
    const fmtKr = n => (n||0).toLocaleString('sv-SE', {maximumFractionDigits:0}) + ' kr';
    const fmtPct = n => ((n||0)*100).toFixed(2) + '%';
    const rc = n => n >= 0 ? 'var(--green)' : 'var(--red)';
    const info = d.info || {};
    const retColor = rc(d.total_return_pct||0);

    // Reason formatter (för trades)
    const reasonLabels = {
        'INITIAL': 'Start', 'NEW_ENTRY': 'Ny signal', 'EXIT_DECEL': 'Exit decel',
        'EXIT_REVERSAL': 'Exit reversal', 'EXIT_WEEKLY': 'Exit vecka',
        'EXIT_INSIDER': 'Exit insider', 'EXIT_DISCOVERY': 'Exit discovery',
        'MF_ROTATION': 'MF rotation',
        'DSM_ROTATION': 'DSM rotation', 'ACE_ROTATION': 'ACE rotation',
        'META_ROTATION': 'Meta rotation', 'REBALANCE': 'Rebalans'
    };
    function fmtReason(raw) {
        if (!raw) return '';
        if (reasonLabels[raw]) return reasonLabels[raw];
        if (raw.indexOf(' · ') === -1) return raw;
        const parts = raw.split(' · ');
        const head = parts[0].replace(/^BOOKS_/,'').replace(/_/g,' ').toLowerCase();
        return `<b>${head}</b> <span style="color:var(--text-muted)">· ${parts.slice(1).join(' · ')}</span>`;
    }

    // Strategy-ruta — stödjer flerradiga regler (newlines → <br>) och extra bok-fält
    function _nl2br(s) {
        if (!s) return '—';
        return String(s).replace(/</g,'&lt;').replace(/\n/g,'<br>');
    }
    const bookSourceRow = info.book_source
        ? `<div class="mdo-strategy-row"><span class="mdo-k">📖 Bokkälla</span><span class="mdo-v" style="font-style:italic">${_nl2br(info.book_source)}</span></div>`
        : '';
    const cadenceRow = info.rebalance_cadence
        ? `<div class="mdo-strategy-row"><span class="mdo-k">🔁 Rebalans-kadens</span><span class="mdo-v"><b>${info.rebalance_cadence}</b></span></div>`
        : '';
    const strategyHtml = `<div class="mdo-strategy">
        <div class="mdo-strategy-row"><span class="mdo-k">Modellens plan</span><span class="mdo-v">${_nl2br(info.thesis)}</span></div>
        ${bookSourceRow}
        <div class="mdo-strategy-row"><span class="mdo-k">Målstorlek</span><span class="mdo-v">${info.target_size||'—'}</span></div>
        <div class="mdo-strategy-row"><span class="mdo-k">Universum</span><span class="mdo-v">${_nl2br(info.universe)}</span></div>
        <div class="mdo-strategy-row"><span class="mdo-k">Köpregel</span><span class="mdo-v">${_nl2br(info.entry_rule)}</span></div>
        <div class="mdo-strategy-row"><span class="mdo-k">Säljregel</span><span class="mdo-v">${_nl2br(info.exit_rule)}</span></div>
        <div class="mdo-strategy-row"><span class="mdo-k">Allokering</span><span class="mdo-v">${_nl2br(info.allocation)}</span></div>
        <div class="mdo-strategy-row"><span class="mdo-k">Tidshorisont</span><span class="mdo-v">${_nl2br(info.horizon)}</span></div>
        ${cadenceRow}
    </div>`;

    // Stats-grid
    const statsHtml = `<div class="mdo-stats">
        <div class="mdo-stat"><div class="mdo-stat-l">Startkapital</div><div class="mdo-stat-v">${fmtKr(d.start_capital)}</div></div>
        <div class="mdo-stat"><div class="mdo-stat-l">Nuvarande värde</div><div class="mdo-stat-v">${fmtKr((d.total_value||0)+(d.cash||0))}</div></div>

            </table>

    // Transaktioner
    const tradesRows = (d.trades||[]).map(t => {

        const gainStr = isSell && t.gain_pct!=null

    const tradesHtml = d.trades&&d.trades.length ? `

            <table class="mdo-table">
                <thead><tr><th>Datum</th><th>Aktie</th><th>Typ</th><th style="text-align:right">Pris</th><th>Anledning</th><th style="text-align:right">Avk %</th></tr></thead>

    el.innerHTML = `
        <div class="mdo-header">
            <div class="mdo-icon">${info.icon||'📊'}</div>
            <div class="mdo-title-wrap">
                <div class="mdo-title">${info.label||d.portfolio}</div>

                </div>
            </div>
            <div class="dash-section">

                <h3 class="dash-heading">Idag på marknaden</h3>
                <div class="dash-today" id="dashToday"></div>
            </div>
        </div>
    `;

    try {
        if (!_dashCache || (Date.now() - _dashCache._ts) > 60000) {
            const r = await fetch('/api/dashboard');
            _dashCache = await r.json();
            _dashCache._ts = Date.now();

function renderDashboardContent(d) {
    // ── Dagens köp-banner ──
    const picks = d.daily_picks || [];
    picks.forEach(p => { if (p.orderbook_id) _picksLookup[p.orderbook_id] = p; });
    const banner = document.getElementById('dailyPicksBanner');
    if (banner) {
        if (picks.length === 0) {
            banner.outerHTML = `<div class="daily-picks-empty">
                <div style="display:flex;align-items:center;gap:10px">
                    <span class="material-symbols-outlined" style="font-size:28px;color:#92400e">hourglass_empty</span>
                    <div>
                        <div style="font-weight:700;color:#92400e">Inga köpkandidater passerar tröskeln idag</div>

                    </div>
                </div>
            </div>`;
        } else {
            const cards = picks.map((p, i) => {
                const flag = FLAGS[p.country] || '';
                const chg = p.one_day_change_pct;
                const chgStr = chg != null ? `<span class="${pctClass(chg)}" style="font-size:12px;font-weight:700">${fmtPct(chg)}</span>` : '';

                const rank = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1);
                // Reasons — render som chips inuti kortet
                const reasons = p.reasons || [];
                const summary = reasons.find(r => r.is_summary);
                const detailReasons = reasons.filter(r => !r.is_summary);
                const reasonChips = detailReasons.length ? `
                    <div class="dp-reasons">
                        <div class="dp-reasons-label">Varför idag:</div>
                        <div class="dp-reasons-list">

                    </div>` : '';
                const headline = summary ? `<div class="dp-headline">${summary.icon} ${summary.title} <span class="dp-headline-sub">— ${summary.text}</span></div>` : '';
                // "Why now"-trigger — prominenta banner-rad så användaren förstår vad som händer just NU
                const trig = p.trigger;
                const triggerBanner = trig ? `
                    <div class="dp-trigger dp-trigger-${trig.kind||'other'}" title="Varför just nu">
                        <span class="dp-trigger-ico">${trig.icon||'⚡'}</span>

                            <div class="dp-trigger-title">${trig.title}</div>
                            <div class="dp-trigger-text">${trig.text}</div>
                        </div>
                    </div>` : '';
                return `<div class="daily-pick-card" data-obid="${p.orderbook_id}">
                    <div class="dp-row" onclick='_openPickStock(${p.orderbook_id})' title="Klicka för att öppna analys">
                        <div class="dp-rank">${rank}</div>
                        <div class="dp-main">
                            <div class="dp-name">${flag} ${p.name}</div>
                            <div class="dp-meta">${p.short_name||''} · ${p.last_price!=null?p.last_price.toFixed(2)+' '+(p.currency||''):'–'} ${chgStr}</div>
                            ${headline}
                        </div>
                        <div class="dp-score" style="color:${scoreColor}">
                            <div style="font-size:24px;font-weight:900;line-height:1">${p.composite_score!=null?p.composite_score.toFixed(0):'–'}</div>
                            <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;opacity:0.8">${p.models_passing}/${p.models_available} pass</div>
                        </div>
                    </div>
                    ${triggerBanner}
                    ${reasonChips}
                </div>`;
            }).join('');
            banner.outerHTML = `<div class="daily-picks-banner">
                <div class="dpb-hd">
                    <span style="font-size:28px">🎯</span>
                    <div>
                        <div class="dpb-title">Dagens köp-rekommendationer</div>
                        <div class="dpb-sub">Bolag där 7+ av 10 bok-modeller säger köp (composite ≥ 70/100). Varje kort visar en <b>"Varför just nu"</b>-trigger — vad som precis hänt (prisrea på kvalitet, momentum, ägar-spike, översåld med bas, tekniskt genombrott m.m.) som gör aktien intressant idag. Uppdateras var 3:e minut.</div>
                    </div>
                    <span class="dpb-live"><span class="live-dot" style="background:#00563B"></span>LIVE</span>
                </div>
                <div class="daily-picks-grid">${cards}</div>
            </div>`;
        }
    }

    // ── Top-listor per modell ──
    const toplistsEl = document.getElementById('dashModelToplists');
    if (toplistsEl) {

            toplistsEl.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:13px">Ingen modelldata ännu.</div>';
        } else {

            toplistsEl.innerHTML = bookModels.map(m => `

function renderMacroTile(m) {
    const capeVal = m.cape != null ? m.cape.toFixed(1) : '–';
    const capeZone = m.cape >= 35 ? {txt:'Spring för livet', col:'#c0392b'} : m.cape >= 25 ? {txt:'Varning', col:'#e67700'} : m.cape >= 15 ? {txt:'Neutral', col:'#888'} : {txt:'Köpsignal', col:'var(--green)'};

    const bi = m.buffett_indicator != null ? m.buffett_indicator.toFixed(0) + '%' : '–';
    const biZone = m.buffett_indicator >= 140 ? {txt:'Farlig bubbla', col:'#c0392b'} : m.buffett_indicator >= 100 ? {txt:'Övervärderat', col:'#e67700'} : m.buffett_indicator >= 70 ? {txt:'Rimligt', col:'#888'} : {txt:'Köp aggressivt', col:'var(--green)'};

    const y10 = m.us_10y != null ? m.us_10y.toFixed(2) + '%' : '–';
    const vix = m.vix != null ? m.vix.toFixed(1) : '–';
    const vixZone = m.vix >= 30 ? {txt:'Rädsla (köpläge)', col:'var(--green)'} : m.vix >= 20 ? {txt:'Osäkerhet', col:'#e67700'} : {txt:'Lugn', col:'#888'};

    const gold = m.gold_ratio != null ? m.gold_ratio.toFixed(1) : '–';
    const sr = m.se_rate != null ? m.se_rate.toFixed(2) + '%' : '–';
    const fg = m.fear_greed != null ? m.fear_greed : '–';
    const fgZone = typeof m.fear_greed === 'number' ? (m.fear_greed >= 75 ? {txt:'Extrem girighet', col:'#c0392b'} : m.fear_greed >= 55 ? {txt:'Girighet', col:'#e67700'} : m.fear_greed >= 45 ? {txt:'Neutral', col:'#888'} : m.fear_greed >= 25 ? {txt:'Rädsla', col:'var(--green)'} : {txt:'Extrem rädsla (KÖP)', col:'var(--green)'}) : {txt:'–',col:'#888'};

    return `
        <div class="macro-card">
            <div class="macro-label">Shillers CAPE <span class="macro-hint">S&P 500</span></div>
            <div class="macro-value">${capeVal}</div>
            <div class="macro-zone" style="color:${capeZone.col}">${capeZone.txt}</div>
            <div class="macro-note">Snitt 1881: 17 · Dotcom-topp: 44 · Shillers formel: 1/CAPE = förv. årsavkastning</div>
        </div>
        <div class="macro-card">
            <div class="macro-label">Buffett-indikatorn <span class="macro-hint">Börsvärde/BNP</span></div>
            <div class="macro-value">${bi}</div>
            <div class="macro-zone" style="color:${biZone.col}">${biZone.txt}</div>
            <div class="macro-note">&lt;70% = köp · 70-100% = rimligt · 100-140% = dyrt · &gt;140% = bubbla</div>
        </div>
        <div class="macro-card">
            <div class="macro-label">US 10y ränta <span class="macro-hint">Riskfri ränta</span></div>
            <div class="macro-value">${y10}</div>
            <div class="macro-zone">SE styrränta: ${sr}</div>
            <div class="macro-note">Dalios regel: Stigande räntor → skuldkris-risk ökar</div>
        </div>
        <div class="macro-card">
            <div class="macro-label">VIX <span class="macro-hint">Rädsloindex</span></div>
            <div class="macro-value">${vix}</div>
            <div class="macro-zone" style="color:${vixZone.col}">${vixZone.txt}</div>
            <div class="macro-note">Marks pendel: &gt;30 = rädsla (köpläge) · &lt;15 = girighet</div>
        </div>
        <div class="macro-card">
            <div class="macro-label">Guld/S&P <span class="macro-hint">Ratio</span></div>
            <div class="macro-value">${gold}</div>
            <div class="macro-zone">Dalios All-Weather</div>
            <div class="macro-note">Hög ratio → aktier dyra relativt guld (riskoff)</div>
        </div>
        <div class="macro-card">
            <div class="macro-label">Fear & Greed <span class="macro-hint">CNN-liknande</span></div>
            <div class="macro-value">${fg}</div>
            <div class="macro-zone" style="color:${fgZone.col}">${fgZone.txt}</div>
            <div class="macro-note">Buffett: "Var rädd när andra är giriga, girig när andra är rädda"</div>
        </div>
    `;
}

function renderMetricsContent(market) {
    const root = document.getElementById('metricsContent');
    const filtered = METRICS_DB.filter(m => m.market === 'BOTH' || m.market === market || market === 'BOTH');

    let html = '<div class="metrics-wrap">';

    // Strategy playbook first
    const playbook = STRATEGY_PLAYBOOK[market] || STRATEGY_PLAYBOOK.BOTH;
    html += `<div class="playbook-section">
        <h3 class="section-heading">📘 Strategier (${market})</h3>
        <div class="playbook-grid">` +
        playbook.map(p => `
            <div class="playbook-card">
                <div class="playbook-name">${p.name}</div>
                <div class="playbook-desc">${p.desc}</div>
                <div class="playbook-weight">${p.weight}</div>
            </div>`).join('') +
        `</div></div>`;

    // Metrics by category
    html += `<h3 class="section-heading" style="margin-top:28px">📊 Nyckeltal</h3>`;
    cats.forEach(cat => {
        const metrics = filtered.filter(m => m.cat === cat);
        html += `<div class="cat-block">
            <div class="cat-heading">${cat}</div>
            <div class="m-table-wrap"><table class="m-table">

                </tr></thead>

                metrics.map(m => `<tr>
                    <td><span class="m-code">${m.code}</span></td>

                    <td class="m-desc">${m.desc}</td>

                    <td class="m-book">${m.book}</td>

    });

    // Tips section
    html += `<h3 class="section-heading" style="margin-top:28px">💡 Tips från mästarna</h3>
    <div class="tips-grid">
        <div class="tip-card"><div class="tip-hd">Graham</div><div class="tip-body">"Kortsiktigt är marknaden en röstmaskin. Långsiktigt är den en våg." — Köp ALDRIG utan ≥25% margin of safety.</div></div>

        <div class="tip-card"><div class="tip-hd">Klarman</div><div class="tip-body">Kassa är AMMUNITION. Aldrig &lt; 15%. När alla panikerar — då slår du till.</div></div>
        <div class="tip-card"><div class="tip-hd">Shiller</div><div class="tip-body">Högt CAPE → låg 10-årsavkastning. Förväntad årsavkastning ≈ 1/CAPE.</div></div>

// ── Prefetch all tabs for instant switching ──────────────

async function prefetchAllTabs() {
    const urls = [
        {tab:'signals', url:'/api/signals?country=SE&sort=meta&order=desc&limit=50&offset=0&min_owners=10&signal=&action=', dataKey:'signals'},
        {tab:'stocks', url:'/api/stocks?q=&country=&sort=owners&order=desc&limit=50&offset=0&min_owners=0', dataKey:'stocks'},
        {tab:'hotmovers', url:'/api/hot-movers?direction=up&lookback=1&limit=50&offset=0&min_owners=100&country=', dataKey:'stocks'},
        {tab:'trending', url:'/api/trending?period=1m&direction=up&limit=50&offset=0&min_owners=10', dataKey:'stocks'},
        {tab:'insiders', url:'/api/insiders?q=&type=&limit=50&offset=0', dataKey:'transactions'},
        {tab:'portfolio', url:'/api/simulation', dataKey:null},
    ];

    const fetches = urls.map(async ({tab, url, dataKey}) => {
        try {
            const data = await (await fetch(url)).json();
            // Build cache keys that match what fetchData() generates
            if (tab === 'signals') {
                const params = {country:'SE', sort:'meta', order:'desc', limit:50, offset:0, min_owners:10, signal:'', action:''};
                setCache(cacheKey('signals', params), data);
            } else if (tab === 'stocks') {
                const params = {q:'', country:'', sort:'owners', order:'desc', limit:50, offset:0, min_owners:0};
                setCache(cacheKey('stocks', params), data);
            } else if (tab === 'hotmovers') {
                const params = {direction:'up', lookback:1, limit:50, offset:0, min_owners:100, country:''};
                setCache(cacheKey('hotmovers', params), data);
            } else if (tab === 'trending') {
                const params = {period:'1m', direction:'up', limit:50, offset:0, min_owners:10};
                setCache(cacheKey('trending', params), data);
            } else if (tab === 'insiders') {
                const params = {q:'', type:'', limit:50, offset:0};
                setCache(cacheKey('insiders', params), data);
            } else if (tab === 'portfolio') {
                setCache(cacheKey('portfolio', {}), data);
            }
        } catch(e) { console.warn('Prefetch ' + tab + ' failed:', e); }
    });
    await Promise.all(fetches);
}

// ── Init ──────────────────────────────────────────

async function init() {
    // Start prefetching ALL tabs in background immediately
    const prefetchPromise = prefetchAllTabs();

    await fetchStatus();

    // Default to Dashboard on page load (no API fetch needed)
    const meta = TAB_META[currentTab] || {title:'',sub:''};
    const pt = document.getElementById('pageTitle'); if (pt) pt.textContent = meta.title;
    const ps = document.getElementById('pageSubtitle'); if (ps) ps.textContent = meta.sub;

    renderFilterBar();
    if (currentTab === 'dashboard') { renderDashboard(); }
    else if (currentTab === 'metrics') { renderMetricsTool(); }
    else {
        await prefetchPromise;
        await fetchData();
    }

    // Auto-refresh: poll varje 60s, only when a market is open
    setInterval(async () => {
        await fetchStatus();
        if (isAnyMarketOpen() && ['signals','portfolio','stocks','trending','ocf','hotmovers'].includes(currentTab)) {
            Object.keys(_tabCache).forEach(k => { if (k.startsWith(currentTab + '|')) delete _tabCache[k]; });
            await fetchData();
        }
    }, 60000);
}
init();
