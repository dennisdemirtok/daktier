<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge Signals — Trav-modellen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #00C281;
            --green-light: #e6f9f1;
            --green-dark: #00a870;
            --red: #FF2B51;
            --red-light: #ffeaee;
            --blue: #0046FF;
            --blue-light: #e8eeff;
            --orange: #FF8A00;
            --orange-light: #fff3e0;
            --purple: #7C3AED;
            --purple-light: #f0e8ff;
            --bg: #f5f5f5;
            --white: #ffffff;
            --text: #1a1a1a;
            --text-sec: #666;
            --text-muted: #999;
            --border: #e5e5e5;
            --border-light: #f0f0f0;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

        /* ── Header ──── */
        .header { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo { width: 32px; height: 32px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; }
        .header h1 { font-size: 18px; font-weight: 700; }
        .header h1 span { color: var(--text-muted); font-weight: 400; font-size: 14px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .update-time { font-size: 13px; color: var(--text-muted); }
        .refresh-btn { background: var(--green); color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .refresh-btn:hover { background: var(--green-dark); }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Layout ──── */
        .container { max-width: 1500px; margin: 0 auto; padding: 20px; }

        /* ── Summary ──── */
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 20px; }
        .card { background: var(--white); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); transition: box-shadow 0.2s; }
        .card:hover { box-shadow: var(--shadow-hover); }
        .card-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .card-value { font-size: 28px; font-weight: 700; margin: 2px 0; }
        .card-sub { font-size: 12px; color: var(--text-sec); }

        /* ── Tabs ──── */
        .tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
        .tab { padding: 10px 20px; background: none; border: none; font-family: inherit; font-size: 14px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }

        /* ── Filter ──── */
        .filter-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
        .search-input { padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; width: 300px; outline: none; transition: border-color 0.2s; }
        .search-input:focus { border-color: var(--green); }
        .filter-chip { padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; background: var(--white); color: var(--text-sec); transition: all 0.2s; font-family: inherit; }
        .filter-chip:hover { border-color: var(--green); color: var(--green); }
        .filter-chip.active { background: var(--green); color: white; border-color: var(--green); }
        .period-chip { padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; background: var(--white); color: var(--text-sec); transition: all 0.2s; font-family: inherit; }
        .period-chip:hover { border-color: var(--blue); color: var(--blue); }
        .period-chip.active { background: var(--blue); color: white; border-color: var(--blue); }
        .dir-chip { padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; background: var(--white); transition: all 0.2s; font-family: inherit; }
        .dir-chip.up { color: var(--green); }
        .dir-chip.down { color: var(--red); }
        .dir-chip.active.up { background: var(--green); color: white; border-color: var(--green); }
        .dir-chip.active.down { background: var(--red); color: white; border-color: var(--red); }
        .signal-chip { padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; background: var(--white); transition: all 0.2s; font-family: inherit; color: var(--text-sec); }
        .signal-chip:hover { border-color: var(--purple); color: var(--purple); }
        .signal-chip.active { background: var(--purple); color: white; border-color: var(--purple); }
        .min-owners-select { padding: 5px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-family: inherit; color: var(--text-sec); background: var(--white); cursor: pointer; }

        /* ── Table ──── */
        .table-container { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead { position: relative; z-index: 2; }
        th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 2px solid var(--border); cursor: pointer; user-select: none; background: var(--white); white-space: nowrap; }
        th:hover { color: var(--text); }
        th.sorted { color: var(--green); }
        td { padding: 10px 14px; border-bottom: 1px solid var(--border-light); font-size: 13px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #fafafa; }
        .stock-name { font-weight: 600; color: var(--text); cursor: pointer; transition: color 0.15s; }
        .stock-name:hover { color: var(--blue); text-decoration: underline; }
        .stock-ticker { font-size: 11px; color: var(--text-muted); }

        /* ── Numbers ──── */
        .num-pos { color: var(--green); font-weight: 600; }
        .num-neg { color: var(--red); font-weight: 600; }
        .num-zero { color: var(--text-muted); }

        /* ── Badges ──── */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .badge-buy { background: var(--green-light); color: var(--green); }
        .badge-sell { background: var(--red-light); color: var(--red); }
        .badge-strong-buy { background: #00a870; color: white; }
        .badge-strong-sell { background: var(--red); color: white; }
        .badge-hold { background: #f5f5f5; color: var(--text-sec); }

        /* ── Score Bar ──── */
        .score-bar { width: 80px; height: 8px; background: #f0f0f0; border-radius: 4px; display: inline-block; vertical-align: middle; position: relative; overflow: hidden; }
        .score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
        .score-value { font-weight: 700; font-size: 14px; min-width: 36px; display: inline-block; }

        /* ── Bar ──── */
        .bar-wrap { width: 70px; height: 6px; background: #f0f0f0; border-radius: 3px; display: inline-block; vertical-align: middle; }
        .bar-fill { height: 100%; border-radius: 3px; }

        /* ── Component Mini Bars ──── */
        .comp-bars { display: flex; gap: 3px; align-items: center; }
        .comp-bar { width: 28px; height: 14px; background: #f0f0f0; border-radius: 3px; position: relative; overflow: hidden; cursor: help; }
        .comp-bar-fill { height: 100%; border-radius: 3px; }
        .comp-label { font-size: 9px; color: var(--text-muted); text-align: center; line-height: 1; margin-top: 1px; }

        /* ── Tooltip ──── */
        .tooltip-wrap { position: relative; }
        .tooltip-wrap:hover .tooltip { display: block; }
        .tooltip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 6px 10px; border-radius: 6px; font-size: 11px; white-space: nowrap; z-index: 10; margin-bottom: 4px; }
        .tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 4px solid transparent; border-top-color: var(--text); }

        /* ── Loading ──── */
        .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; }
        .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .load-more { display: flex; justify-content: center; padding: 20px; }
        .load-more-spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }

        /* ── Footer ──── */
        .table-footer { text-align: center; color: var(--text-muted); font-size: 12px; padding: 12px; }

        /* ── Flags ──── */
        .flag { font-size: 14px; margin-right: 4px; }

        /* ── Info Banner ──── */
        .info-banner { background: linear-gradient(135deg, var(--purple-light), var(--blue-light)); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 12px; }
        .info-banner-icon { font-size: 20px; flex-shrink: 0; }
        .info-banner-text { font-size: 13px; color: var(--text-sec); line-height: 1.6; }
        .info-banner-text strong { color: var(--text); }

        /* ── DD Risk ──── */
        .dd-risk-bar { width: 50px; height: 8px; background: #f0f0f0; border-radius: 4px; display: inline-block; vertical-align: middle; overflow: hidden; }
        .dd-risk-fill { height: 100%; border-radius: 4px; }
        .dd-risk-label { font-size: 10px; display: block; margin-top: 1px; }

        /* ── 7d Trend ──── */
        .trend-7d { font-size: 11px; font-weight: 600; white-space: nowrap; }
        .trend-7d.up { color: var(--green); }
        .trend-7d.strong-up { color: #00a870; }
        .trend-7d.down { color: var(--red); }
        .trend-7d.strong-down { color: #cc0000; }
        .trend-7d.neutral { color: var(--text-muted); }

        /* ── Drawer ──── */
        .drawer-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);z-index:200;opacity:0;visibility:hidden;transition:opacity 0.3s,visibility 0.3s; }
        .drawer-overlay.open { opacity:1;visibility:visible; }
        .drawer { position:fixed;top:0;right:0;bottom:0;width:520px;max-width:92vw;background:var(--white);z-index:201;box-shadow:-4px 0 24px rgba(0,0,0,0.12);transform:translateX(100%);transition:transform 0.3s ease;overflow-y:auto;display:flex;flex-direction:column; }
        .drawer.open { transform:translateX(0); }
        .drawer-header { padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--white);z-index:1; }
        .drawer-close { background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:4px 8px;border-radius:6px; }
        .drawer-close:hover { background:var(--bg);color:var(--text); }
        .drawer-body { padding:0 24px 24px;flex:1; }
        .drawer-section { margin-top:20px; }
        .drawer-section-title { font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border-light); }
        .drawer-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
        .drawer-grid-3 { display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px; }
        .drawer-item { background:var(--bg);border-radius:8px;padding:10px 12px; }
        .drawer-item-label { font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.3px;font-weight:600; }
        .drawer-item-value { font-size:15px;font-weight:700;margin-top:2px; }

        /* ── Market Status ──── */
        .market-status { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 12px; }
        .market-status.open { background: var(--green-light); color: var(--green-dark); }
        .market-status.closed { background: #f5f5f5; color: var(--text-muted); }
        .market-dot { width: 8px; height: 8px; border-radius: 50%; }
        .market-dot.open { background: var(--green); animation: pulse 2s infinite; }
        .market-dot.closed { background: var(--text-muted); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ── Btn Group ──── */
        .btn-group { display: flex; gap: 0; }
        .btn-group .refresh-btn { border-radius: 0; }
        .btn-group .refresh-btn:first-child { border-radius: 20px 0 0 20px; }
        .btn-group .refresh-btn:last-child { border-radius: 0 20px 20px 0; }
        .btn-insider { background: var(--purple); font-size: 11px; padding: 8px 12px; }
        .btn-insider:hover { background: #6d28d9; }

        /* ── Morning Brief ──── */
        .brief-card { background: linear-gradient(135deg, #1e1b4b, #312e81); border-radius: var(--radius); padding: 24px; color: white; margin-bottom: 20px; }
        .brief-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .brief-greeting { font-size: 20px; font-weight: 700; }
        .brief-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin: 16px 0; }
        .brief-port-card { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 14px; backdrop-filter: blur(4px); }
        .brief-port-name { font-size: 12px; opacity: 0.8; margin-bottom: 4px; }
        .brief-port-assessment { font-size: 13px; line-height: 1.5; }
        .brief-stockpick { background: linear-gradient(135deg, rgba(0,194,129,0.2), rgba(0,70,255,0.2)); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 16px; margin: 16px 0; }
        .brief-signal-badge { display: inline-block; padding: 6px 14px; border-radius: 8px; font-size: 14px; font-weight: 700; }
        .brief-btn { background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        .brief-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,58,237,0.4); }
        .brief-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* ── Auto-rebalance Banner ──── */
        .auto-rebal-banner { background: linear-gradient(135deg, #ecfdf5, #f0fdf4); border: 1px solid #86efac; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; }

        /* ── Upload Zone ──── */
        .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--white); }
        .upload-zone:hover, .upload-zone.dragover { border-color: var(--orange); background: var(--orange-light); }
        .upload-zone-icon { font-size: 48px; margin-bottom: 12px; }
        .upload-zone-text { font-size: 14px; color: var(--text-sec); }
        .upload-preview { max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 12px; }

        /* ── AI Score Gauge ──── */
        .ai-gauge { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .ai-gauge-inner { width: 34px; height: 34px; border-radius: 50%; background: var(--white); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; }

        /* ── Owner Maturity Badge ──── */
        .maturity-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
        .maturity-badge.mogen { background: #dcfce7; color: #166534; }
        .maturity-badge.vaxande { background: #fef9c3; color: #854d0e; }
        .maturity-badge.omogen { background: #f3f4f6; color: #6b7280; }
        .maturity-sparkline { display: inline-block; vertical-align: middle; }
        .maturity-sparkline svg { display: block; }
        .drawer-maturity { background: linear-gradient(135deg, #f0fdf4, #ecfccb); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .drawer-maturity-score { font-size: 32px; font-weight: 900; color: #166534; }
        .drawer-maturity-label { font-size: 13px; font-weight: 700; color: #15803d; text-transform: uppercase; letter-spacing: 1px; }
        .consistency-bar { height: 8px; border-radius: 4px; background: #e5e7eb; overflow: hidden; margin-top: 4px; }
        .consistency-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #22c55e, #16a34a); }

        @media (max-width: 768px) {
            .container { padding: 12px; }
            .cards { grid-template-columns: 1fr 1fr; }
            .search-input { width: 100%; }
            .drawer { width:100vw;max-width:100vw; }
            .brief-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="logo">E</div>
        <h1>Edge Signals <span>Trav-modellen</span></h1>
    </div>
    <div class="header-right">
        <div class="market-status closed" id="marketStatus">
            <div class="market-dot closed" id="marketDot"></div>
            <span id="marketLabel">Marknad stängd</span>
        </div>
        <span class="update-time" id="updateTime"></span>
        <div class="btn-group">
            <button class="refresh-btn" id="refreshPricesBtn" onclick="doRefreshPrices()">Uppdatera priser</button>
            <button class="refresh-btn btn-insider" id="refreshInsidersBtn" onclick="doRefreshInsiders()">Insiders</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="cards" id="cards"></div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('signals', this)">Edge Signals</button>
        <button class="tab" onclick="switchTab('stocks', this)">Alla aktier</button>
        <button class="tab" onclick="switchTab('hotmovers', this)" style="background:#FFF3E0;color:#E65100">Hot Movers</button>
        <button class="tab" onclick="switchTab('trending', this)">Trending</button>
        <button class="tab" onclick="switchTab('insiders', this)">Insiders</button>
        <button class="tab" onclick="switchTab('ocf', this)" style="background:var(--green-light);color:var(--green-dark)">Kassaflöde</button>
        <button class="tab" onclick="switchTab('portfolio', this)" style="background:var(--purple-light);color:var(--purple)">Simulering</button>
        <button class="tab" onclick="switchTab('myportfolio', this)" style="background:var(--orange-light);color:var(--orange)">Min Portfölj</button>
        <button class="tab" onclick="switchTab('aitoplist', this)" style="background:linear-gradient(135deg,#f0e8ff,#e8eeff);color:var(--purple)">AI Topplista</button>
    </div>

    <div class="filter-bar" id="filterBar"></div>
    <div id="content">
        <div class="loading-wrap">
            <div class="loading-spinner"></div>
            <p style="color:var(--text-muted)">Laddar data...</p>
        </div>
    </div>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="stockDrawer">
    <div class="drawer-header">
        <div id="drawerHeaderContent"></div>
        <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────
let currentTab = 'signals';
let searchQuery = '';
let countryFilter = '';
let sortCol = 'meta';
let sortOrder = 'desc';
let trendPeriod = '1m';
let trendDirection = 'up';
let minOwners = 0;
let insiderType = '';
let signalFilter = '';
let signalCountry = 'SE';
let actionFilter = '';
let hotLookback = 1;
let hotDirection = 'up';
let hotCountry = '';
let hotDateFrom = '';
let hotDateTo = '';

// Pagination
let currentOffset = 0;
const PAGE_SIZE = 50;
let totalResults = 0;
let isLoadingMore = false;
let allLoadedRows = [];

// Stats cache
let statsData = null;

const FLAGS = {SE:'🇸🇪',US:'🇺🇸',NO:'🇳🇴',DK:'🇩🇰',FI:'🇫🇮',DE:'🇩🇪',FR:'🇫🇷',GB:'🇬🇧',NL:'🇳🇱',IT:'🇮🇹',CH:'🇨🇭',CA:'🇨🇦',JP:'🇯🇵',BE:'🇧🇪',ES:'🇪🇸',PT:'🇵🇹',AT:'🇦🇹',IE:'🇮🇪',HK:'🇭🇰',SG:'🇸🇬'};

// ── Fetch ──────────────────────────────────────────────

async function fetchStatus() {
    try {
        const r = await fetch('/api/status');
        statsData = await r.json();
        renderCards();
        if (statsData.last_stock_update) {
            const d = new Date(statsData.last_stock_update);
            document.getElementById('updateTime').textContent =
                d.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'}) + ' ' +
                d.toLocaleDateString('sv-SE', {day:'numeric', month:'short'});
        }
        // Market status indicator
        const isOpen = statsData.market_open;
        const statusEl = document.getElementById('marketStatus');
        const dotEl = document.getElementById('marketDot');
        const labelEl = document.getElementById('marketLabel');
        if (isOpen) {
            statusEl.className = 'market-status open';
            dotEl.className = 'market-dot open';
            labelEl.textContent = 'Auto-uppdatering aktiv';
        } else {
            statusEl.className = 'market-status closed';
            dotEl.className = 'market-dot closed';
            labelEl.textContent = 'Marknad stängd';
        }

async function fetchData(append = false) {
    if (isLoadingMore) return;
    if (!append) {
        currentOffset = 0;
        allLoadedRows = [];
    }

    isLoadingMore = true;
    if (append) showLoadMore();

    try {
        let data;
        if (currentTab === 'signals') {
            const params = new URLSearchParams({
                country: signalCountry,
                sort: sortCol, order: sortOrder,
                limit: PAGE_SIZE, offset: currentOffset,
                min_owners: minOwners || 10,
                signal: signalFilter,
                action: actionFilter,
            });
            data = await (await fetch('/api/signals?' + params)).json();
            totalResults = data.total;
            allLoadedRows = allLoadedRows.concat(data.signals);
            renderSignalsTable();
        } else if (currentTab === 'stocks') {
            const params = new URLSearchParams({
                q: searchQuery, country: countryFilter,
                sort: sortCol, order: sortOrder,
                limit: PAGE_SIZE, offset: currentOffset,
                min_owners: minOwners,
            });
            data = await (await fetch('/api/stocks?' + params)).json();
            totalResults = data.total;
            allLoadedRows = allLoadedRows.concat(data.stocks);
            renderStocksTable();
        } else if (currentTab === 'hotmovers') {
            const params = new URLSearchParams({
                direction: hotDirection, lookback: hotLookback,
                limit: PAGE_SIZE, offset: currentOffset,
                min_owners: minOwners || 100,
                country: hotCountry,
            });
            data = await (await fetch('/api/hot-movers?' + params)).json();
            totalResults = data.total;
            hotDateFrom = data.date_from;
            hotDateTo = data.date_to;
            allLoadedRows = allLoadedRows.concat(data.stocks);
            renderHotMoversTable();
        } else if (currentTab === 'trending') {
            const params = new URLSearchParams({
                period: trendPeriod, direction: trendDirection,
                limit: PAGE_SIZE, offset: currentOffset,
                min_owners: minOwners || 10,
            });
            data = await (await fetch('/api/trending?' + params)).json();
            totalResults = data.total;
            allLoadedRows = allLoadedRows.concat(data.stocks);
            renderTrendingTable();
        } else if (currentTab === 'insiders') {
            const params = new URLSearchParams({
                q: searchQuery, type: insiderType,
                limit: PAGE_SIZE, offset: currentOffset,
            });
            data = await (await fetch('/api/insiders?' + params)).json();
            totalResults = data.total;
            allLoadedRows = allLoadedRows.concat(data.transactions);
            renderInsidersTable();
        } else if (currentTab === 'ocf') {
            const params = new URLSearchParams({
                q: searchQuery, country: countryFilter || 'SE',
                sort: sortCol, order: sortOrder,
                limit: PAGE_SIZE, offset: currentOffset,
                min_owners: minOwners || 100,
            });
            data = await (await fetch('/api/stocks?' + params)).json();
            totalResults = data.total;
            allLoadedRows = allLoadedRows.concat(data.stocks);
            renderOcfTable();
        } else if (currentTab === 'portfolio') {
            const simData = await (await fetch('/api/simulation')).json();
            if (simData.active) {
                renderSimulation(simData);
            } else {
                data = await (await fetch('/api/portfolio')).json();
                renderPortfolio(data);
                const startCard = `<div style="background:linear-gradient(135deg,#e6f9f1,#e8eeff);border-radius:var(--radius);padding:24px;margin-bottom:20px;text-align:center;box-shadow:var(--shadow)">
                    <div style="font-size:28px;margin-bottom:8px">🚀</div>
                    <div style="font-size:18px;font-weight:700;margin-bottom:8px">Starta portföljsimulering</div>
                    <div style="color:var(--text-sec);margin-bottom:16px">
                        Lås in dagens aktier med <strong>1 000 000 kr</strong> per portfölj.<br>
                        Likaviktad allokering. Avkastning mäts framåt från idag.
                    </div>
                    <button onclick="startSimulation()" style="background:var(--green);color:white;border:none;padding:12px 32px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s">
                        Starta simulering
                    </button>
                </div>`;
                document.getElementById('content').insertAdjacentHTML('afterbegin', startCard);
            }
            return;
        } else if (currentTab === 'myportfolio') {
            renderMyPortfolio();
            return;
        } else if (currentTab === 'aitoplist') {
            await fetchAIToplist();
            return;
        }
    } catch(e) {
        document.getElementById('content').innerHTML =
            `<div class="loading-wrap"><p style="color:var(--red)">Fel: ${e.message}</p></div>`;
    } finally {
        isLoadingMore = false;
    }
}

function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if (el) { el.classList.add('active'); }
    else {
        const tabMap = {portfolio:'Simulering',signals:'Edge Signals',stocks:'Alla aktier',ocf:'Kassaflöde',myportfolio:'Min Portfölj',aitoplist:'AI Topplista',hotmovers:'Hot Movers'};
        const lbl = tabMap[tab];
        if (lbl) document.querySelectorAll('.tab').forEach(t => { if (t.textContent.trim() === lbl) t.classList.add('active'); });
    }
    searchQuery = '';

    if (tab === 'signals') { sortCol = 'meta'; sortOrder = 'desc'; }
    else if (tab === 'stocks') { sortCol = 'owners'; sortOrder = 'desc'; }
    else if (tab === 'trending') { sortCol = 'change_1m'; sortOrder = 'desc'; }
    else if (tab === 'hotmovers') { sortCol = 'hot_diff_pct'; sortOrder = 'desc'; }
    else if (tab === 'ocf') { sortCol = 'ocf'; sortOrder = 'desc'; }
    else { sortCol = 'date'; sortOrder = 'desc'; }

    renderFilterBar();
    fetchData();
}

function maturityBadge(stock) {
    // Discovery signal — Backtest v5 Global: CAGR +12.5%, 64% win, 7/8 profitabla år
    const disc = stock.discovery_score || (stock.components && stock.components.discovery) || 0;
    const owners = stock.number_of_owners || 0;

    // 500-2k: Primär discovery zone
    if (disc >= 70 && owners < 2000) return `<span class="maturity-badge" style="background:#fef3c7;color:#92400e" title="Discovery: ${disc}\nv5 Global: 64% win, CAGR +12.5%\nvel5-20% + cons≥75% + lönsam + P/E<40">🔥 Discovery</span>`;
    if (disc >= 50 && owners < 2000) return `<span class="maturity-badge" style="background:#dbeafe;color:#1e40af" title="Discovery: ${disc}\nSaknar ett kvalitetskriterium">⚡ Discovery</span>`;

    // 2k-10k: Growth Zone ("Nvidia-case")
    if (disc >= 50 && owners >= 2000 && owners < 10000) return `<span class="maturity-badge" style="background:#e0e7ff;color:#3730a3" title="Growth Zone: ${disc}\nCAGR ~8.5%, 56% win">🚀 Growth</span>`;

    // Fallback till mognad-badge för 5000+
    const score = stock.maturity_score || (stock.components && stock.components.owner_maturity) || 0;
    if (score >= 70) return `<span class="maturity-badge mogen" title="Mognad: ${score}">🟢 Mogen</span>`;
    if (score >= 50) return `<span class="maturity-badge vaxande" title="Mognad: ${score}">🟡 Växande</span>`;
    if (score >= 30) return `<span class="maturity-badge omogen" title="Mognad: ${score}">⚪ Omogen</span>`;

    // Tidig tillväxt
    if (disc >= 30) return `<span class="maturity-badge" style="background:#f0fdf4;color:#166534" title="Tidig tillväxt: ${disc}">📈 Tidig</span>`;
    return '<span style="color:var(--text-muted);font-size:11px">-</span>';
}

function componentBars(comp) {
    if (!comp) return '';
    const items = [
        {key: 'owner_momentum', label: 'Mom', color: 'var(--green)'},
        {key: 'accel_sweetspot', label: 'Acc+SS', color: 'var(--blue)'},
        {key: 'kontrarian', label: 'Kontr', color: 'var(--purple)'},
        {key: 'fundamental', label: 'Fund', color: '#2563eb'},
        {key: 'short_squeeze', label: 'Kort', color: 'var(--orange)'},
        {key: 'owner_maturity', label: 'Mognad', color: '#16a34a'},
        {key: 'discovery', label: 'Disc', color: '#d97706'},
    ];
    return `<div class="comp-bars">${items.map(it => {
        const val = comp[it.key] || 0;
        const w = Math.max(2, val);
        return `<div class="tooltip-wrap">
            <div class="comp-bar"><div class="comp-bar-fill" style="width:${w}%;background:${it.color}"></div></div>
            <div class="comp-label">${it.label}</div>
            <div class="tooltip">${it.label}: ${val.toFixed(0)}</div>
        </div>`;
    }).join('')}</div>`;
}

function ddRiskBadge(risk, label) {
    if (risk == null) return '-';
    let color = '#22c55e'; // Grön = låg risk
    if (risk >= 70) color = '#dc2626';
    else if (risk >= 50) color = '#f97316';
    else if (risk >= 30) color = '#eab308';
    return `<div class="tooltip-wrap">
        <div class="dd-risk-bar"><div class="dd-risk-fill" style="width:${risk}%;background:${color}"></div></div>
        <div class="dd-risk-label" style="color:${color}">${label || ''}</div>
        <div class="tooltip">DD-risk: ${risk.toFixed(0)}% — ${label}</div>
    </div>`;
}

function trend7dBadge(trend, sv) {
    if (!trend || trend === 'NEUTRAL') return '<span class="trend-7d neutral">—</span>';
    const map = {
        'STRONG_UP': { cls: 'strong-up', icon: '↑↑' },
        'UP': { cls: 'up', icon: '↑' },
        'DOWN': { cls: 'down', icon: '↓' },
        'STRONG_DOWN': { cls: 'strong-down', icon: '↓↓' },
    };
    const m = map[trend] || { cls: 'neutral', icon: '—' };
    return `<span class="trend-7d ${m.cls}" title="${sv || ''}">${m.icon}</span>`;
}

function insiderBadge(s) {
    const buys = s.insider_buys || 0;
    const sells = s.insider_sells || 0;
    const cluster = s.insider_cluster_buy || false;
    if (buys === 0 && sells === 0) return '<span style="color:var(--text-muted);font-size:11px">—</span>';
    let html = '';
    if (cluster) html += '<span title="Klusterköp: 3+ insiders" style="font-size:12px">🔥</span> ';
    if (buys > 0) html += `<span style="color:var(--green);font-size:11px;font-weight:600">${buys}K</span>`;
    if (buys > 0 && sells > 0) html += '<span style="color:var(--text-muted);font-size:10px">/</span>';
    if (sells > 0) html += `<span style="color:var(--red);font-size:11px;font-weight:600">${sells}S</span>`;
    return html;
}

                <div>Snitt YTD: <strong class="${stats.avg_ytd>0?'num-pos':'num-neg'}">${(stats.avg_ytd*100).toFixed(1)}%</strong></div>
                <div>Snitt 1M: <strong class="${stats.avg_1m>0?'num-pos':'num-neg'}">${(stats.avg_1m*100).toFixed(1)}%</strong></div>
            </div>
        </div>`;
    }

    function stockRow(s, i, type) {
        const ytd = (s.ytd_change_pct||0)*100;
        const m1 = (s.one_month_change_pct||0)*100;
        const oc1m = (s.owners_change_1m||0)*100;
        const roe = s.return_on_equity ? (s.return_on_equity*100).toFixed(0)+'%' : '-';
        const ocf = s.operating_cash_flow ? (s.operating_cash_flow>0?'+':'')+(s.operating_cash_flow/1e6).toFixed(0)+'M' : '-';
        const ev = s.ev_ebit_ratio ? s.ev_ebit_ratio.toFixed(1) : '-';
        const de = s.debt_to_equity_ratio != null ? s.debt_to_equity_ratio.toFixed(1) : '-';

        let extra = '';
        if (type === 'trav') {
            const sc = s.edge_score||0;
            const fund = s.components ? s.components.fundamental : 0;
            extra = `<td style="text-align:center"><span style="font-weight:700;color:${scoreColor(sc)}">${sc.toFixed(0)}</span></td>
                     <td style="text-align:center">${fund?fund.toFixed(0):'-'}</td>`;
        } else {
            extra = `<td style="text-align:center">${s.magic_rank||'-'}</td>
                     <td style="text-align:center">${ev}</td>`;
        }

        const pidx = _portfolioStocks.push(s) - 1;
        return `<tr style="background:${ytd>0?'#f0fdf4':ytd<-10?'#fef2f2':''}">
            <td>${i+1}</td>
            <td><span class="stock-name" onclick="openDrawer(_portfolioStocks[${pidx}])">${s.name}</span></td>
            ${extra}
            <td style="text-align:right">${fmtNum(s.number_of_owners)}</td>
            <td style="text-align:right" class="${oc1m>0?'num-pos':'num-neg'}">${oc1m>0?'+':''}${oc1m.toFixed(1)}%</td>
            <td style="text-align:right">${roe}</td>
            <td style="text-align:right">${ocf}</td>
            <td style="text-align:right">${de}</td>
            <td style="text-align:right;font-weight:600" class="${m1>0?'num-pos':'num-neg'}">${m1>0?'+':''}${m1.toFixed(1)}%</td>
            <td style="text-align:right;font-weight:700" class="${ytd>0?'num-pos':'num-neg'}">${ytd>0?'+':''}${ytd.toFixed(1)}%</td>
        </tr>`;
    }

    const travRows = trav.stocks.map((s,i) => stockRow(s,i,'trav')).join('');
    const magicRows = magic.stocks.map((s,i) => stockRow(s,i,'magic')).join('');

    // Spread beräkning
    const spread_ytd = ((ts.avg_ytd - ms.avg_ytd)*100).toFixed(1);
    const spread_1m = ((ts.avg_1m - ms.avg_1m)*100).toFixed(1);
    const spreadColor = spread_ytd > 0 ? 'var(--green)' : 'var(--red)';

    document.getElementById('content').innerHTML = `
        <div class="info-banner" style="background:linear-gradient(135deg,#f0e8ff,#e8eeff)">
            <div class="info-banner-icon">🏇 vs 📊</div>
            <div class="info-banner-text">
                <strong>Walk-Forward Simulering</strong> — Startdatum: ${data.date}. Portföljerna uppdateras dagligen.
                Data sparas i Supabase. Resultat mäts 1v, 1m, 3m efter varje signal.<br>
                <strong>Trav-modellen:</strong> Ägardriven — köp när ägare ökar i sweet spot (200-5000) + OCF-kvalitet.<br>
                <strong>Magic Formula:</strong> EV/EBIT + ROCE ranking (Greenblatt). Top 20 billigaste kvalitetsbolag.<br>
                <strong style="color:${spreadColor}">Spread YTD: ${spread_ytd}pp · Spread 1M: ${spread_1m}pp</strong>
                (OBS: YTD är bakåtblickande, walk-forward börjar ${data.date})
            </div>
        </div>

        <div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap">
            ${statCard('Trav-modellen (ENTRY)', ts, 'var(--green)', '🏇')}
            ${statCard('Magic Formula (Top 20)', ms, 'var(--purple)', '📊')}
            <div style="background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-left:4px solid ${spreadColor};flex:1;min-width:280px">
                <div style="font-size:20px;margin-bottom:8px">📈 <strong>Spread (Trav - Magic)</strong></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:14px">
                    <div>YTD spread: <strong style="color:${spreadColor}">${spread_ytd}pp</strong></div>
                    <div>1M spread: <strong style="color:${spread_1m>0?'var(--green)':'var(--red)'}">${spread_1m}pp</strong></div>
                    <div>Win YTD Trav: <strong>${(ts.win_ytd*100).toFixed(0)}%</strong></div>
                    <div>Win YTD Magic: <strong>${(ms.win_ytd*100).toFixed(0)}%</strong></div>
                </div>
            </div>
        </div>

        <h3 style="margin:20px 0 10px;font-size:16px">🏇 Trav-modellen — ${trav.stocks.length} aktier</h3>
        <div class="table-container">
            <table><thead><tr>
                <th>#</th><th>Aktie</th><th>Score</th><th>Fund</th>
                <th style="text-align:right">Ägare</th><th style="text-align:right">Äg 1M</th>
                <th style="text-align:right">ROE</th><th style="text-align:right">OCF</th>
                <th style="text-align:right">D/E</th>
                <th style="text-align:right">Pris 1M</th><th style="text-align:right">Pris YTD</th>
            </tr></thead><tbody>${travRows}</tbody></table>
        </div>

        <h3 style="margin:30px 0 10px;font-size:16px">📊 Magic Formula — Top ${magic.stocks.length}</h3>
        <div class="table-container">
            <table><thead><tr>
                <th>#</th><th>Aktie</th><th>MF Rank</th><th>EV/EBIT</th>
                <th style="text-align:right">Ägare</th><th style="text-align:right">Äg 1M</th>
                <th style="text-align:right">ROE</th><th style="text-align:right">OCF</th>
                <th style="text-align:right">D/E</th>
                <th style="text-align:right">Pris 1M</th><th style="text-align:right">Pris YTD</th>
            </tr></thead><tbody>${magicRows}</tbody></table>
        </div>

        <div class="table-footer">Simulering startad ${data.date} · Walk-forward resultat mäts efter 1v/1m/3m · Data sparas dagligen i Supabase</div>
    `;
}

// ── Simulation ─────────────────────────────────────

async function startSimulation() {
    if (!confirm('Starta simulering med 1 000 000 kr per portfölj?\nDagens aktier och priser låses in.')) return;
    document.getElementById('content').innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
    await fetch('/api/simulation', {method: 'POST'});
    fetchData();
}

async function resetSimulation() {
    if (!confirm('Nollställ simuleringen? Alla data raderas och du kan starta en ny.')) return;
    await fetch('/api/simulation', {method: 'DELETE'});
    fetchData();
}

async function rebalanceSimulation() {
    if (!confirm('Rebalansera alla 5 portföljerna?\n\nTrav: Säljer EXIT-aktier, köper nya ENTRY\nMagic: Roterar om top 20 ändrats\nDSM: Roterar om top 15 ändrats\nACE: Roterar om top 25 ändrats\nMeta: Roterar om top 20 ändrats')) return;
    document.getElementById('content').innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div style="margin-top:12px;color:var(--text-sec)">Rebalanserar portföljerna...</div></div>';
    try {
        const res = await fetch('/api/simulation/rebalance', {method: 'POST'});
        const data = await res.json();
        const changes = data.rebalance_changes || [];
        if (changes.length > 0) {
            const sells = changes.filter(c => c.type === 'SELL');
            const buys = changes.filter(c => c.type === 'BUY');
            const totalGain = sells.reduce((s, c) => s + (c.gain_kr || 0), 0);
            alert(`✅ Rebalansering klar!\n\n${sells.length} sålda aktier\n${buys.length} nya köp\nRealiserat: ${totalGain >= 0 ? '+' : ''}${Math.round(totalGain).toLocaleString('sv-SE')} kr`);
        } else {
            alert('Inga ändringar behövdes — alla aktier har samma signaler.');
        }
    } catch (e) {
        alert('Fel vid rebalansering: ' + e.message);
    }
    fetchData();
}

function renderSimulation(simData) {
    _portfolioStocks = [];
    const portfolios = simData.portfolios || {};
    const portKeys = Object.keys(portfolios);
    const trades = simData.trades || [];
    const realized = simData.realized || {};
    const cash = simData.cash || {};

    const PCFG = {
        trav:  { icon: '🏇', label: 'Trav-modellen',       color: 'var(--green)',  borderColor: 'var(--green)' },
        magic: { icon: '📊', label: 'Magic Formula',        color: 'var(--purple)', borderColor: 'var(--purple)' },
        dsm:   { icon: '🎯', label: 'DSM (Dennis Signal)',  color: 'var(--blue)',   borderColor: 'var(--blue)' },
        ace:   { icon: '⚡', label: 'ACE (Alpha Engine)',    color: 'var(--orange)', borderColor: 'var(--orange)' },
        meta:  { icon: '🧠', label: 'Meta Score (Combo)',   color: '#e91e63',       borderColor: '#e91e63' },
    };

    function fmtKr(n) { return n.toLocaleString('sv-SE', {minimumFractionDigits: 0, maximumFractionDigits: 0}) + ' kr'; }
    function fmtRet(n) { return (n >= 0 ? '+' : '') + (n * 100).toFixed(2) + '%'; }
    function rc(n) { return n >= 0 ? 'var(--green)' : 'var(--red)'; }
    function rcClass(n) { return n >= 0 ? 'num-pos' : 'num-neg'; }

    function statLine(label, value, color) {
        return `<div style="display:flex;justify-content:space-between;align-items:baseline;padding:3px 0">
            <span style="font-size:11px;color:var(--text-muted)">${label}</span>
            <span style="font-size:13px;font-weight:600;color:${color||'var(--text)'}">${value}</span>
        </div>`;
    }

    function bigCard(label, icon, color, port, portKey) {
        if (!port) return '';
        const val = port.total_current_value;
        const gain = port.total_gain;
        const ret = port.total_return_pct;
        const r = realized[portKey] || {total_sells:0, wins:0, losses:0, win_rate:0, total_gain_kr:0};
        const c = cash[portKey] || 0;

        return `<div style="background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border-left:4px solid ${color};flex:1;min-width:260px">
            <div style="font-size:16px;font-weight:700;margin-bottom:12px">${icon} ${label}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
                <div><div style="font-size:10px;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.5px">Startkapital</div>
                     <div style="font-size:18px;font-weight:700">${fmtKr(port.start_capital)}</div></div>
                <div><div style="font-size:10px;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.5px">Nuvarande</div>
                     <div style="font-size:18px;font-weight:700;color:${rc(gain)}">${fmtKr(val)}</div></div>
                <div><div style="font-size:10px;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.5px">Avkastning</div>
                     <div style="font-size:18px;font-weight:700;color:${rc(ret)}">${fmtRet(ret)}</div></div>
                <div><div style="font-size:10px;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.5px">Aktier / Dagar</div>
                     <div style="font-size:18px;font-weight:700">${port.holdings.length} / ${port.days_active}</div></div>
            </div>
            <div style="border-top:1px solid var(--border-light);padding-top:8px">
                ${statLine('Realiserat', r.total_gain_kr !== 0 ? (r.total_gain_kr>=0?'+':'')+fmtKr(r.total_gain_kr) : '—', r.total_gain_kr !== 0 ? rc(r.total_gain_kr) : 'var(--text-muted)')}
                ${statLine('Orealiserat', gain !== 0 ? (gain>=0?'+':'')+fmtKr(gain) : '—', gain !== 0 ? rc(gain) : 'var(--text-muted)')}
                ${statLine('Win rate', r.total_sells > 0 ? r.wins+'/'+r.total_sells+' ('+(r.win_rate*100).toFixed(0)+'%)' : 'Inga sälj', r.total_sells > 0 ? (r.win_rate >= 0.5 ? 'var(--green)' : 'var(--red)') : 'var(--text-muted)')}
                ${statLine('Kassa', fmtKr(c), c > 0 ? 'var(--blue)' : 'var(--text-muted)')}
            </div>
        </div>`;
    }

    // Jämförelse-kort: ranking alla portföljer
    let compareHtml = '';
    if (portKeys.length >= 2) {
        const sorted = portKeys
            .filter(k => portfolios[k])
            .map(k => ({ key: k, ret: portfolios[k].total_return_pct, val: portfolios[k].total_current_value, n: portfolios[k].holdings.length }))
            .sort((a,b) => b.ret - a.ret);
        const best = sorted[0];
        const worst = sorted[sorted.length - 1];
        const bestCfg = PCFG[best.key] || {};
        const worstCfg = PCFG[worst.key] || {};
        const spreadPct = best.ret - worst.ret;

        compareHtml = `<div style="background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);border-left:4px solid ${spreadPct >= 0 ? 'var(--green)' : 'var(--red)'};flex:1;min-width:260px">
            <div style="font-size:16px;font-weight:700;margin-bottom:12px">📈 Ranking</div>
            ${sorted.map((s, i) => {
                const cfg = PCFG[s.key] || {icon:'', label:s.key};
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#'+(i+1);
                return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-light)">
                    <span style="font-size:13px">${medal} ${cfg.icon} ${cfg.label}</span>
                    <span style="font-size:14px;font-weight:700;color:${rc(s.ret)}">${fmtRet(s.ret)}</span>
                </div>`;
            }).join('')}
            <div style="margin-top:8px;text-align:center;font-size:11px;color:var(--text-muted)">
                Spread: <strong style="color:${rc(spreadPct)}">${fmtRet(spreadPct)}</strong>
                (${bestCfg.icon||''} vs ${worstCfg.icon||''})
            </div>
        </div>`;
    }

    function holdingsTable(port, label, icon) {
        if (!port || !port.holdings.length) return `<h3 style="margin:24px 0 10px;font-size:16px">${icon} ${label} — inga aktier</h3>`;
        const winners = port.holdings.filter(h => h.return_pct > 0).length;
        const losers = port.holdings.filter(h => h.return_pct < 0).length;
        const winPct = (winners / port.holdings.length * 100).toFixed(0);
        const rows = port.holdings.map((h, i) => {
            const pidx = _portfolioStocks.push(h) - 1;
            return `<tr style="background:${h.gain>0?'#f0fdf4':h.gain<0?'#fef2f2':''}">
                <td>${i+1}</td>
                <td><span class="stock-name" onclick="openDrawer(allLoadedRows.find(r=>String(r.orderbook_id)===String(_portfolioStocks[${pidx}].orderbook_id))||_portfolioStocks[${pidx}])">${h.name}</span></td>
                <td style="text-align:right">${h.entry_price.toFixed(2)}</td>
                <td style="text-align:right;font-weight:600">${h.current_price.toFixed(2)}</td>
                <td style="text-align:right;color:var(--text-sec)">${h.shares.toFixed(0)}</td>
                <td style="text-align:right;color:var(--text-sec)">${fmtKr(h.allocation)}</td>
                <td style="text-align:right;font-weight:600" class="${rcClass(h.gain)}">${h.gain>=0?'+':''}${fmtKr(h.gain)}</td>
                <td style="text-align:right;font-weight:700" class="${rcClass(h.return_pct)}">${fmtRet(h.return_pct)}</td>
            </tr>`;
        }).join('');

        return `<h3 style="margin:24px 0 10px;font-size:16px">${icon} ${label} — ${port.holdings.length} aktier <span style="font-weight:400;font-size:13px;color:var(--text-muted)">(${winners} vinnare · ${losers} förlorare · ${winPct}% win)</span></h3>
        <div class="table-container"><table><thead><tr>
            <th>#</th><th>Aktie</th>
            <th style="text-align:right">Köpkurs</th>
            <th style="text-align:right">Nuv. kurs</th>
            <th style="text-align:right">Antal</th>
            <th style="text-align:right">Allokering</th>
            <th style="text-align:right">Avk. kr</th>
            <th style="text-align:right">Avk. %</th>
        </tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    // ── Handelshistorik ──
    function tradesTable() {
        if (!trades.length) return '';
        const reasonLabels = {
            'INITIAL': 'Start', 'NEW_ENTRY': 'Ny signal', 'EXIT_DECEL': 'Exit decel',
            'EXIT_REVERSAL': 'Exit reversal', 'EXIT_WEEKLY': 'Exit vecka',
            'EXIT_INSIDER': 'Exit insider', 'EXIT_DISCOVERY': 'Exit discovery',
            'MF_ROTATION': 'MF rotation',
            'DSM_ROTATION': 'DSM rotation', 'ACE_ROTATION': 'ACE rotation',
            'META_ROTATION': 'Meta rotation', 'REBALANCE': 'Rebalans'
        };
        const portIcons = Object.fromEntries(Object.entries(PCFG).map(([k,v]) => [k, v.icon]));

        const rows = trades.map(t => {
            const isSell = t.trade_type === 'SELL';
            const bg = isSell ? (t.gain_kr > 0 ? '#f0fdf4' : '#fef2f2') : '';
            const gainStr = isSell && t.gain_pct != null ? `<span class="${t.gain_kr >= 0 ? 'num-pos' : 'num-neg'}">${t.gain_kr>=0?'+':''}${(t.gain_pct*100).toFixed(1)}%</span>` : '<span style="color:var(--text-muted)">—</span>';
            const gainKrStr = isSell && t.gain_kr != null ? `<span class="${t.gain_kr >= 0 ? 'num-pos' : 'num-neg'}">${t.gain_kr>=0?'+':''}${fmtKr(t.gain_kr)}</span>` : '';
            const typeColor = isSell ? 'var(--red)' : 'var(--green)';
            const typeBg = isSell ? 'var(--red-light)' : 'var(--green-light)';
            const dateStr = t.trade_date ? t.trade_date.slice(5) : '';

            return `<tr style="background:${bg}">
                <td style="font-size:12px;color:var(--text-sec);white-space:nowrap">${dateStr}</td>
                <td style="font-size:12px">${portIcons[t.portfolio]||''} ${t.portfolio}</td>
                <td style="font-weight:600">${t.name}</td>
                <td><span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:${typeBg};color:${typeColor}">${t.trade_type === 'BUY' ? 'KÖP' : 'SÄLJ'}</span></td>
                <td style="text-align:right">${t.price.toFixed(2)}</td>
                <td style="text-align:right;font-size:12px">${fmtKr(t.value)}</td>
                <td style="font-size:12px;color:var(--text-sec)">${reasonLabels[t.reason] || t.reason || ''}</td>
                <td style="text-align:right">${gainStr}</td>
                <td style="text-align:right;font-size:12px">${gainKrStr}</td>
            </tr>`;
        }).join('');

        const totalSells = trades.filter(t => t.trade_type === 'SELL');
        const totalGain = totalSells.reduce((s, t) => s + (t.gain_kr || 0), 0);

        return `<h3 style="margin:30px 0 10px;font-size:16px;display:flex;align-items:center;gap:8px">
            📋 Handelshistorik <span style="font-weight:400;font-size:13px;color:var(--text-muted)">(${trades.length} transaktioner${totalSells.length > 0 ? ' · Realiserat: '+(totalGain>=0?'+':'')+fmtKr(totalGain) : ''})</span>
        </h3>
        <div class="table-container"><table><thead><tr>
            <th>Datum</th><th>Portfölj</th><th>Aktie</th><th>Typ</th>
            <th style="text-align:right">Pris</th><th style="text-align:right">Värde</th>
            <th>Anledning</th><th style="text-align:right">Avk. %</th><th style="text-align:right">Avk. kr</th>
        </tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    const firstPort = portfolios[portKeys[0]];
    const startDate = firstPort ? firstPort.start_date : '—';

    // Rebalanserings-banner
    const rebalanceTrades = trades.filter(t => t.reason !== 'INITIAL');
    let rebalBanner = '';
    if (rebalanceTrades.length > 0) {
        const lastDate = rebalanceTrades[0]?.trade_date || '';
        const lastSells = rebalanceTrades.filter(t => t.trade_type === 'SELL' && t.trade_date === lastDate);
        const lastBuys = rebalanceTrades.filter(t => t.trade_type === 'BUY' && t.trade_date === lastDate);
        const lastGain = lastSells.reduce((s, t) => s + (t.gain_kr || 0), 0);
        rebalBanner = `<div style="background:linear-gradient(135deg,#fffbe6,#fff3e0);border:1px solid #ffe0b2;border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:13px">
            ⚡ <strong>Senaste rebalansering (${lastDate.slice(5)}):</strong>
            ${lastSells.length} sålda${lastSells.length>0?` (${lastSells.map(s=>s.reason).filter((v,i,a)=>a.indexOf(v)===i).join(', ')})`:''},
            ${lastBuys.length} nya köp
            ${lastSells.length > 0 ? ' · Realiserat: <strong style="color:'+rc(lastGain)+'">'+(lastGain>=0?'+':'')+fmtKr(lastGain)+'</strong>' : ''}
        </div>`;
    }

    // Dynamiska portföljkort
    const cardsHtml = portKeys.map(k => {
        const cfg = PCFG[k] || {icon:'📦', label:k, color:'var(--text)'};
        return bigCard(cfg.label, cfg.icon, cfg.color, portfolios[k], k);
    }).join('');

    // Dynamiska holdings-tabeller
    const holdingsHtml = portKeys.map(k => {
        const cfg = PCFG[k] || {icon:'📦', label:k};
        return holdingsTable(portfolios[k], cfg.label, cfg.icon);
    }).join('');

    // Auto-rebalance banner
    let autoRebalHtml = '';
    if (statsData && statsData.last_rebalance_date) {
        const rebalChanges = statsData.last_rebalance_changes_count || 0;
        if (rebalChanges > 0) {
            autoRebalHtml = `<div class="auto-rebal-banner">
                <span style="font-size:16px">✅</span>
                <span><strong>Auto-rebalansering kördes ${statsData.last_rebalance_date}</strong> — ${rebalChanges} ändringar genomförda automatiskt</span>
            </div>`;
        }

    document.getElementById('content').innerHTML = `

function renderOcfTable() {
    const infoBanner = `<div class="info-banner" style="background:linear-gradient(135deg,var(--green-light),#e0f7fa)">
        <div class="info-banner-icon">💰</div>
        <div class="info-banner-text">
            <strong>Kassaflöde-topplistan:</strong> Aktier rankade efter operativt kassaflöde (OCF).<br>
            <strong>OCF > Nettoresultat</strong> = hög vinstkvalitet (kassaflöde ljuger inte).<br>
            <strong style="color:var(--green)">★</strong> = OCF överstiger nettoresultat ·
            <strong style="color:var(--green)">●</strong> = positivt OCF ·
            <strong style="color:var(--red)">●</strong> = negativt OCF
        </div>
    </div>`;

    const rows = allLoadedRows.map((s, i) => {
        const flag = FLAGS[s.country] || '';
        const ocf = s.operating_cash_flow;
        const np = s.net_profit;
        let qualityIcon = '';
        if (ocf != null && np != null) {
            if (ocf > 0 && np > 0 && ocf > np) qualityIcon = '<span title="OCF > Nettoresultat" style="color:var(--green);font-weight:700">★</span>';
            else if (ocf > 0 && np > 0) qualityIcon = '<span title="Positivt OCF" style="color:var(--green)">●</span>';
            else if (ocf > 0) qualityIcon = '<span title="OCF positivt trots förlust" style="color:var(--orange)">◐</span>';
            else qualityIcon = '<span title="Negativt OCF" style="color:var(--red)">●</span>';
        } else if (ocf != null) {
            qualityIcon = ocf > 0 ? '<span style="color:var(--green)">●</span>' : '<span style="color:var(--red)">●</span>';
        }
        const fmtM = v => v != null ? (Math.abs(v)>1e9 ? (v/1e9).toFixed(1)+' Md' : (v/1e6).toFixed(0)+' M') : '-';
        const bgColor = ocf != null && ocf > 0 && np != null && np > 0 && ocf > np ? '#f0fdf4' : ocf != null && ocf < 0 ? '#fef2f2' : '';
        return `<tr style="background:${bgColor}">
            <td>${i+1}</td>
            <td>${flag} <span class="stock-name" onclick="openDrawer(allLoadedRows[${i}])">${s.name}</span><br><span class="stock-ticker">${s.short_name || ''}</span></td>
            <td style="text-align:right;font-weight:700" class="${ocf>0?'num-pos':ocf<0?'num-neg':''}">${fmtM(ocf)}</td>
            <td style="text-align:center">${qualityIcon}</td>
            <td style="text-align:right" class="${np>0?'num-pos':np<0?'num-neg':''}">${fmtM(np)}</td>
            <td style="text-align:right">${s.return_on_equity != null ? (s.return_on_equity*100).toFixed(1)+'%' : '-'}</td>
            <td style="text-align:right">${s.return_on_capital_employed != null ? (s.return_on_capital_employed*100).toFixed(1)+'%' : '-'}</td>
            <td style="text-align:right">${s.debt_to_equity_ratio != null ? s.debt_to_equity_ratio.toFixed(2) : '-'}</td>
            <td style="text-align:right">${s.pe_ratio != null && s.pe_ratio > 0 ? s.pe_ratio.toFixed(1) : '-'}</td>
            <td style="text-align:right;font-weight:600" class="${pctClass(s.ytd_change_pct)}">${fmtPct(s.ytd_change_pct)}</td>
            <td style="text-align:right">${fmtNum(s.number_of_owners)}</td>
        </tr>`;
    }).join('');

    document.getElementById('content').innerHTML = `
        ${infoBanner}
        <div class="table-container">
            <table><thead><tr>
                <th style="width:40px">#</th>
                <th onclick="doSort('name')" class="${thClass('name')}">Aktie${sortArrow('name')}</th>
                <th onclick="doSort('ocf')" class="${thClass('ocf')}" style="text-align:right">OCF${sortArrow('ocf')}</th>
                <th style="text-align:center" title="★=OCF>Nettoresultat ●=positivt/negativt">Kval</th>
                <th style="text-align:right">Nettores.</th>
                <th onclick="doSort('roe')" class="${thClass('roe')}" style="text-align:right">ROE${sortArrow('roe')}</th>
                <th onclick="doSort('roce')" class="${thClass('roce')}" style="text-align:right">ROCE${sortArrow('roce')}</th>
                <th style="text-align:right">D/E</th>
                <th onclick="doSort('pe')" class="${thClass('pe')}" style="text-align:right">P/E${sortArrow('pe')}</th>
                <th onclick="doSort('price_ytd')" class="${thClass('price_ytd')}" style="text-align:right">Pris YTD${sortArrow('price_ytd')}</th>
                <th onclick="doSort('owners')" class="${thClass('owners')}" style="text-align:right">Ägare${sortArrow('owners')}</th>
            </tr></thead><tbody>${rows}</tbody></table>
        </div>
        ${allLoadedRows.length < totalResults ? '<div class="load-more" id="loadMore"><div class="load-more-spinner"></div></div>' : ''}
        <div class="table-footer">Visar ${allLoadedRows.length} av ${totalResults.toLocaleString('sv')} aktier sorterade efter operativt kassaflöde</div>
    `;
    setupInfiniteScroll();
}
