let _currentDrawerStock = null;

async function analyzeStock() {
    const s = _currentDrawerStock;
    if (!s) return;

    const btn = document.getElementById('aiAnalyzeBtn');
    const resultDiv = document.getElementById('aiAnalysisResult');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block"></span> Analyserar...';
    btn.style.opacity = '0.7';
    resultDiv.innerHTML = '';

    try {
        const payload = {
            name: s.name, country: s.country, last_price: s.last_price,
            pe_ratio: s.pe_ratio, ps_ratio: s.price_sales_ratio, pb_ratio: s.price_to_book_value,
            ev_ebit_ratio: s.ev_ebit_ratio, ev_sales_ratio: s.ev_sales_ratio,
            dividend_yield: s.dividend_yield,
            return_on_capital_employed: s.return_on_capital_employed,
            return_on_equity: s.return_on_equity,
            net_margin: s.net_margin, gross_margin: s.gross_margin,
            sales: s.sales, net_profit: s.net_profit,
            operating_cash_flow: s.operating_cash_flow,
            debt_to_equity_ratio: s.debt_to_equity_ratio,
            beta: s.beta, volatility: s.volatility,
            short_percent: s.short_percent_of_capital, dd_risk: s.dd_risk,
            rsi14: s.rsi14, macd_histogram: s.macd_histogram,
            sma20: s.sma20, sma50: s.sma50, sma200: s.sma200,
            bollinger_width: s.bollinger_distance_upper_to_lower,
            number_of_owners: s.number_of_owners,
            owners_7d_change: s.seven_days_change_pct,
            owners_30d_change: s.thirty_days_change_pct,
            owners_90d_change: s.three_months_change_pct,
            one_week_change: s.one_week_change_pct,
            one_month_change: s.one_month_change_pct,
            three_months_change: s.three_months_change_pct,
            ytd_change: s.year_to_date_change_pct,
            one_year_change: s.one_year_change_pct,
            edge_score: s.edge_score, dsm_score: s.dsm_score,
            ace_score: s.ace_score, magic_score: s.magic_score,
            meta_score: s.meta_score,
        };

        const resp = await fetch('/api/analyze-stock', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await resp.json();

        if (data.error) {
            resultDiv.innerHTML = `<div style="padding:12px;background:#fee;border-radius:8px;color:var(--red);font-size:13px">❌ ${data.error}</div>`;
            return;
        }

        const a = data.analysis;
        const scoreColor = a.score >= 80 ? '#00563B' : a.score >= 60 ? '#00a870' : a.score >= 40 ? '#f59e0b' : a.score >= 20 ? '#ef4444' : '#991b1b';
        const signalMap = {
            'STARK KÖP': {bg:'#00563B',txt:'white'},
            'KÖP': {bg:'#00a870',txt:'white'},
            'NEUTRAL': {bg:'#f59e0b',txt:'white'},
            'SÄLJ': {bg:'#ef4444',txt:'white'},
            'STARK SÄLJ': {bg:'#991b1b',txt:'white'},
        };
        const sig = signalMap[a.signal] || {bg:'#888',txt:'white'};

        resultDiv.innerHTML = `
            <div style="background:var(--bg);border-radius:12px;padding:16px;border-left:4px solid ${scoreColor}">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
                    <div style="width:56px;height:56px;border-radius:50%;background:conic-gradient(${scoreColor} ${a.score*3.6}deg, #e5e7eb ${a.score*3.6}deg);display:flex;align-items:center;justify-content:center">
                        <div style="width:44px;height:44px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:${scoreColor}">${a.score}</div>
                    </div>
                    <div>
                        <span style="display:inline-block;padding:4px 10px;border-radius:6px;background:${sig.bg};color:${sig.txt};font-size:12px;font-weight:700">${a.signal}</span>
                        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">Claude AI-bedömning</div>
                    </div>
                </div>
                <div style="font-size:13px;line-height:1.5;margin-bottom:12px">${a.summary}</div>
                <div style="font-size:12px;padding:10px;background:rgba(124,58,237,0.06);border-radius:8px;margin-bottom:10px;font-style:italic;color:#7c3aed">
                    💡 ${a.key_insight}
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                    <div>
                        <div style="font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;margin-bottom:4px">✅ Fördelar</div>
                        ${a.pros.map(p => `<div style="font-size:12px;line-height:1.6;color:var(--text)">• ${p}</div>`).join('')}
                    </div>
                    <div>
                        <div style="font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;margin-bottom:4px">⚠️ Risker</div>
                        ${a.cons.map(c => `<div style="font-size:12px;line-height:1.6;color:var(--text)">• ${c}</div>`).join('')}
                    </div>
                </div>
            </div>`;

    } catch (err) {
        resultDiv.innerHTML = `<div style="padding:12px;background:#fee;border-radius:8px;color:var(--red);font-size:13px">❌ Fel: ${err.message}</div>`;
    } finally {
        btn.disabled = false;
        btn.innerHTML = '🧠 Analysera nyckeltal';
        btn.style.opacity = '1';
    }
}

function openDrawer(s) {
    if (!s) return;
    _currentDrawerStock = s;
    const flag = FLAGS[s.country] || '';

    // Header
    document.getElementById('drawerHeaderContent').innerHTML = `
        <div>
            <div style="font-size:20px;font-weight:700">${flag} ${s.name}</div>
            <div style="font-size:13px;color:var(--text-muted)">${s.short_name || ''} · ${s.country || ''} · ${s.market_place || ''}</div>
            <div style="font-size:24px;font-weight:700;margin-top:6px">${s.last_price != null ? s.last_price.toFixed(2) + ' ' + (s.currency || 'SEK') : '-'}</div>
        </div>
    `;

    let html = '';

    // ── EDGE MODEL (if available) ──
    if (s.edge_score != null) {
        const sc = scoreColor(s.edge_score);
        html += `<div class="drawer-section">
            <div class="drawer-section-title">Edge Model</div>
            <div class="drawer-grid">
                <div class="drawer-item"><div class="drawer-item-label">Edge Score</div><div class="drawer-item-value" style="color:${sc}">${s.edge_score.toFixed(1)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Signal</div><div class="drawer-item-value">${signalBadge(s.signal)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Action</div><div class="drawer-item-value">${actionBadge(s.action)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Fas</div><div class="drawer-item-value">${phaseBadge(s.phase)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">DD Risk</div><div class="drawer-item-value">${ddRiskBadge(s.dd_risk, s.dd_risk_label)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">7d Trend</div><div class="drawer-item-value">${trend7dBadge(s.trend_7d, s.trend_7d_sv)}</div></div>
            </div>
        </div>`;
        if (s.components) {
            const comps = [
                ['Momentum', s.components.owner_momentum, 'var(--green)'],
                ['Accel+SS', s.components.accel_sweetspot, 'var(--blue)'],
                ['Kontrarian', s.components.kontrarian, 'var(--purple)'],
                ['Fundamental', s.components.fundamental, '#2563eb'],
                ['Short Squeeze', s.components.short_squeeze, 'var(--orange)'],
                ['Ägarmognad', s.components.owner_maturity, '#16a34a'],
            ];
            html += `<div class="drawer-section"><div class="drawer-section-title">Modellkomponenter</div><div class="drawer-grid">${
                comps.map(([l,v,c]) => `<div class="drawer-item"><div class="drawer-item-label">${l}</div><div class="drawer-item-value" style="color:${c}">${v!=null?v.toFixed(0):'-'}</div></div>`).join('')
            }</div></div>`;
        }
    }

    // ── DISCOVERY SIGNAL (backtestad: 66-87% win rate, +45% 1Y) ──
    const disc = s.discovery_score || (s.components && s.components.discovery) || 0;
    if (disc >= 30) {
        const discColor = disc >= 70 ? '#92400e' : disc >= 50 ? '#1e40af' : '#166534';
        const discBg = disc >= 70 ? 'linear-gradient(135deg, #fef3c7, #fde68a)' : disc >= 50 ? 'linear-gradient(135deg, #dbeafe, #bfdbfe)' : 'linear-gradient(135deg, #f0fdf4, #dcfce7)';
        const discEmoji = disc >= 70 ? '🔥' : disc >= 50 ? '⚡' : '📈';
        const discLabel = disc >= 70 ? 'Stark Discovery' : disc >= 50 ? 'Discovery' : 'Tidig tillväxt';
        const gc = s.growth_consistency || 0;
        const qp = s.quarters_positive || 0;
        const qt = s.quarters_total || 0;
        const vel = s.vel_13w ? (s.vel_13w * 100).toFixed(1) : '0';
        const strk = s.streak || 0;
        html += `<div class="drawer-section" style="background:${discBg};border-radius:12px;padding:16px">
            <div class="drawer-section-title" style="color:${discColor}">${discEmoji} Discovery Signal</div>
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
                <div style="font-size:36px;font-weight:900;color:${discColor}">${disc}</div>
                <div>
                    <div style="font-size:14px;font-weight:700;color:${discColor}">${discLabel}</div>
                    <div style="font-size:12px;color:var(--text-muted)">Backtest: 66% win, +45% snitt 1Y</div>
                </div>
            </div>
            <div class="consistency-bar"><div class="consistency-bar-fill" style="width:${gc * 100}%;background:${discColor}"></div></div>
            <div class="drawer-grid" style="margin-top:12px">
                <div class="drawer-item"><div class="drawer-item-label">Kvartalstillväxt</div><div class="drawer-item-value" style="color:${discColor}">${vel}%</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Streak</div><div class="drawer-item-value" style="color:${strk>=8?'var(--green)':'var(--text-muted)'}">${strk}v</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Konsistens</div><div class="drawer-item-value">${qp}/${qt} Q</div></div>
            </div>
        </div>`;
    }

    // ── ÄGARMOGNAD (5000+ aktier) ──
    if (s.maturity_score > 0 && disc < 30) {
        const ms = s.maturity_score;
        const ml = s.maturity_label || '';
        const gc = s.growth_consistency || 0;
        const qp = s.quarters_positive || 0;
        const qt = s.quarters_total || 0;
        const c5k = s.crossed_5000_date;
        const ov = s.owner_velocity || 0;
        const msColor = ms >= 70 ? '#166534' : ms >= 50 ? '#854d0e' : '#6b7280';
        const bgColor = ms >= 70 ? 'linear-gradient(135deg, #f0fdf4, #ecfccb)' : ms >= 50 ? 'linear-gradient(135deg, #fefce8, #fef9c3)' : '#f9fafb';
        html += `<div class="drawer-section" style="background:${bgColor};border-radius:12px;padding:16px">
            <div class="drawer-section-title" style="color:${msColor}">Ägarmognad</div>
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
                <div style="font-size:36px;font-weight:900;color:${msColor}">${ms.toFixed(0)}</div>
                <div>
                    <div style="font-size:14px;font-weight:700;color:${msColor}">${ml}</div>
                    <div style="font-size:12px;color:var(--text-muted)">Tillväxtkonsistens: ${qp}/${qt} kvartal</div>
                </div>
            </div>
            <div class="consistency-bar"><div class="consistency-bar-fill" style="width:${gc * 100}%"></div></div>
            <div class="drawer-grid" style="margin-top:12px">
                <div class="drawer-item"><div class="drawer-item-label">Velocity</div><div class="drawer-item-value" style="color:${ov>0?'var(--green)':'var(--red)'}">${ov.toFixed(2)}%/v</div></div>
                ${c5k ? `<div class="drawer-item"><div class="drawer-item-label">Korsade 5000</div><div class="drawer-item-value">${c5k}</div></div>` : ''}
            </div>
        </div>`;
    }

    // ── META SCORE (alla 4 modeller) ──
    if (s.meta_score != null) {
        const mc = scoreColor(s.meta_score);
        const dsc = s.dsm_score || 0;
        const asc = s.ace_score || 0;
        const msc = s.magic_score;
        html += `<div class="drawer-section">
            <div class="drawer-section-title">🎯 Meta Score (4 modeller)</div>
            <div class="drawer-grid">
                <div class="drawer-item"><div class="drawer-item-label">Meta Score</div><div class="drawer-item-value" style="font-size:20px;color:${mc}">${s.meta_score.toFixed(1)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Meta Signal</div><div class="drawer-item-value">${metaSignalBadge(s.meta_signal)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Enighet</div><div class="drawer-item-value">${modelAgreementBadge(s.model_agreement, s.model_agreement_total)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">DD Blockerad</div><div class="drawer-item-value">${s.dd_blocked ? '<span style="color:var(--red)">Ja ⚠</span>' : '<span style="color:var(--green)">Nej ✓</span>'}</div></div>
            </div>
            <div style="margin-top:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
                <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:8px">
                    <div style="font-size:10px;color:var(--text-muted)">🏇 Trav</div>
                    <div style="font-size:16px;font-weight:700;color:${scoreColor(s.edge_score||0)}">${(s.edge_score||0).toFixed(0)}</div>
                </div>
                <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:8px">
                    <div style="font-size:10px;color:var(--text-muted)">🎯 DSM</div>
                    <div style="font-size:16px;font-weight:700;color:${scoreColor(dsc)}">${dsc.toFixed(0)}</div>
                </div>
                <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:8px">
                    <div style="font-size:10px;color:var(--text-muted)">⚡ ACE</div>
                    <div style="font-size:16px;font-weight:700;color:${scoreColor(asc)}">${asc.toFixed(0)}</div>
                </div>
                <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:8px">
                    <div style="font-size:10px;color:var(--text-muted)">📊 Magic</div>
                    <div style="font-size:16px;font-weight:700;color:${msc != null ? scoreColor(msc) : 'var(--text-muted)'}">${msc != null ? msc.toFixed(0) : '—'}</div>
                </div>
            </div>
        </div>`;
    }

    // ── PRICE CHANGES ──
    const priceFields = [
        ['1D','one_day_change_pct'],['1V','one_week_change_pct'],['1M','one_month_change_pct'],
        ['3M','three_months_change_pct'],['6M','six_months_change_pct'],['YTD','ytd_change_pct'],
        ['1Y','one_year_change_pct'],['3Y','three_years_change_pct'],['5Y','five_years_change_pct'],
        ['10Y','ten_years_change_pct'],['Alltid','infinity_change_pct'],
    ];
    html += `<div class="drawer-section"><div class="drawer-section-title">Prisutveckling</div><div class="drawer-grid-3">${
        priceFields.map(([l,k]) => {
            const v = s[k];
            return `<div class="drawer-item"><div class="drawer-item-label">${l}</div><div class="drawer-item-value ${pctClass(v)}">${fmtPct(v)}</div></div>`;
        }).join('')
    }</div></div>`;

    // ── OWNER CHANGES ──
    const ownerFields = [
        ['1D','owners_change_1d','owners_change_1d_abs'],['1V','owners_change_1w','owners_change_1w_abs'],
        ['1M','owners_change_1m','owners_change_1m_abs'],['3M','owners_change_3m','owners_change_3m_abs'],
        ['YTD','owners_change_ytd','owners_change_ytd_abs'],['1Y','owners_change_1y','owners_change_1y_abs'],
    ];
    html += `<div class="drawer-section"><div class="drawer-section-title">Ägarförändringar (${fmtNum(s.number_of_owners)} ägare)</div><div class="drawer-grid-3">${
        ownerFields.map(([l,pk,ak]) => {
            const v = s[pk]; const abs = s[ak];
            return `<div class="drawer-item"><div class="drawer-item-label">${l}</div>
                <div class="drawer-item-value ${pctClass(v)}">${fmtPct(v)}</div>
                <div style="font-size:11px;color:var(--text-muted)">${abs ? (abs>0?'+':'')+fmtNum(abs)+' st' : ''}</div></div>`;
        }).join('')
    }</div></div>`;

    // ── FUNDAMENTALS ──
    const fmtV = (v,d=1) => v != null ? v.toFixed(d) : '-';
    const fmtM = v => v != null ? (Math.abs(v)>1e9 ? (v/1e9).toFixed(1)+' Md' : (v/1e6).toFixed(0)+' M') : '-';
    const fundItems = [
        ['P/E', s.pe_ratio, v => fmtV(v,1)],
        ['P/B', s.price_book_ratio, v => fmtV(v,2)],
        ['EV/EBIT', s.ev_ebit_ratio, v => fmtV(v,1)],
        ['Direktavk.', s.direct_yield, v => v!=null ? fmtV(v*100,1)+'%' : '-'],
        ['ROE', s.return_on_equity, v => v!=null ? fmtV(v*100,1)+'%' : '-'],
        ['ROA', s.return_on_assets, v => v!=null ? fmtV(v*100,1)+'%' : '-'],
        ['ROCE', s.return_on_capital_employed, v => v!=null ? fmtV(v*100,1)+'%' : '-'],
        ['D/E', s.debt_to_equity_ratio, v => fmtV(v,2)],
        ['ND/EBITDA', s.net_debt_ebitda_ratio, v => fmtV(v,1)],
        ['EPS', s.eps, v => fmtV(v,2)],
        ['OCF', s.operating_cash_flow, v => fmtM(v)],
        ['Nettoresultat', s.net_profit, v => fmtM(v)],
        ['Omsättning', s.sales, v => fmtM(v)],
        ['Börsvärde', s.market_cap, v => v!=null ? (v/1e9).toFixed(2)+' Md' : '-'],
    ];
    html += `<div class="drawer-section"><div class="drawer-section-title">Fundamentala nyckeltal</div><div class="drawer-grid">${
        fundItems.map(([l,v,fmt]) => `<div class="drawer-item"><div class="drawer-item-label">${l}</div><div class="drawer-item-value">${fmt(v)}</div></div>`).join('')
    }</div></div>`;

    // ── TECHNICALS ──
    const price = s.last_price;
    const smaFmt = (smaVal) => {
        if (smaVal == null || smaVal === 0) return '-';
        // sma20/sma50/sma200 are already pct deviations (e.g. -0.07 = -7%)
        const pct = smaVal * 100;
        return `<span class="${pct>0?'num-pos':'num-neg'}">${pct>0?'Över':'Under'} (${Math.abs(pct).toFixed(1)}%)</span>`;
    };
    const techItems = [
        ['RSI (14)', s.rsi14, v => v!=null ? `<span style="color:${v>70?'var(--red)':v<30?'var(--green)':'var(--text)'}">${v.toFixed(0)}</span>` : '-'],
        ['SMA 20', s.sma20, v => smaFmt(v)],
        ['SMA 50', s.sma50, v => smaFmt(v)],
        ['SMA 200', s.sma200, v => smaFmt(v)],
        ['Beta', s.beta, v => fmtV(v,2)],
        ['Volatilitet', s.volatility, v => v!=null ? (v*100).toFixed(0)+'%' : '-'],
        ['MACD', s.macd_histogram, v => v!=null ? `<span class="${v>0?'num-pos':'num-neg'}">${v.toFixed(3)}</span>` : '-'],
        ['Boll. bredd', s.bollinger_distance_upper_to_lower, v => v!=null ? (v*100).toFixed(1)+'%' : '-'],
    ];
    html += `<div class="drawer-section"><div class="drawer-section-title">Tekniska indikatorer</div><div class="drawer-grid">${
        techItems.map(([l,v,fmt]) => `<div class="drawer-item"><div class="drawer-item-label">${l}</div><div class="drawer-item-value">${fmt(v)}</div></div>`).join('')
    }</div></div>`;

    // ── AI ANALYS-KNAPP ──
    html += `<div class="drawer-section">
        <div class="drawer-section-title">🤖 AI-analys (Claude)</div>
        <button id="aiAnalyzeBtn" onclick="analyzeStock()" style="
            width:100%;padding:12px 16px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;
            background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;display:flex;align-items:center;justify-content:center;gap:8px;
            transition:all 0.2s;box-shadow:0 2px 8px rgba(124,58,237,0.3);
        " onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 12px rgba(124,58,237,0.4)'"
           onmouseout="this.style.transform='none';this.style.boxShadow='0 2px 8px rgba(124,58,237,0.3)'">
            🧠 Analysera nyckeltal
        </button>
        <div id="aiAnalysisResult" style="margin-top:12px"></div>
    </div>`;

    // ── INSIDER ──
    if (s.insider_buys > 0 || s.insider_sells > 0) {
        html += `<div class="drawer-section"><div class="drawer-section-title">Insiderhandel (90d)</div><div class="drawer-grid">
            <div class="drawer-item"><div class="drawer-item-label">Köp</div><div class="drawer-item-value" style="color:var(--green)">${s.insider_buys}</div></div>
            <div class="drawer-item"><div class="drawer-item-label">Sälj</div><div class="drawer-item-value" style="color:var(--red)">${s.insider_sells}</div></div>
            ${s.insider_cluster_buy ? '<div class="drawer-item" style="grid-column:span 2;background:var(--green-light)"><div class="drawer-item-value" style="color:var(--green)">🔥 Klusterköp (3+ insiders)</div></div>' : ''}
        </div></div>`;
    }

    document.getElementById('drawerBody').innerHTML = html;
    document.getElementById('stockDrawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

    document.getElementById('stockDrawer').classList.remove('open');

function showLoadMore() {
    const el = document.getElementById('loadMore');
    if (el) el.innerHTML = '<div class="load-more-spinner"></div>';
}

function setupInfiniteScroll() {
    const target = document.getElementById('loadMore');
    if (!target) return;

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isLoadingMore && allLoadedRows.length < totalResults) {
            currentOffset += PAGE_SIZE;
            fetchData(true);
        }
    }, { threshold: 0.1 });

    observer.observe(target);
}

function handleDrop(e) {

function handleFile(file) {

    const reader = new FileReader();
    reader.onload = (e) => {
        uploadedImage = e.target.result;
        document.getElementById('imagePreview').innerHTML = `<img src="${uploadedImage}" class="upload-preview">`;
        const btn = document.getElementById('analyzeImageBtn');
        btn.disabled = false;
        btn.style.opacity = '1';

    reader.readAsDataURL(file);
}

            Claude AI läser alla nyckeltal och ger varje aktie ett AI Score (0-100) + signal.
            Jämför mot Meta Score för att hitta diskrepanser — aktier där AI ser mer potential.
            ${analysisDate ? '<br>Senast uppdaterad: <strong>'+analysisDate+'</strong>' : ''}
        </div>
    </div>`;

    const btnHtml = `<div style="margin-bottom:16px">
        <button id="aiToplistBtn" onclick="generateAIToplist()" class="brief-btn" ${loading ? 'disabled' : ''}>
            ${loading ? '<div class="loading-spinner" style="width:16px;height:16px;border-width:2px;margin:0;display:inline-block"></div> Analyserar...' : '🧠 Uppdatera AI-analys'}
        </button>
    </div>`;

    if (scores.length === 0) {
        document.getElementById('content').innerHTML = `
            ${infoBanner}${btnHtml}
            <div style="text-align:center;padding:60px;color:var(--text-muted)">
                <div style="font-size:64px;margin-bottom:16px">🧠</div>
                <div style="font-size:18px;font-weight:600;margin-bottom:8px">Ingen AI-analys ännu</div>
                <div>Klicka "Uppdatera AI-analys" för att låta Claude analysera top 50 aktier.</div>
            </div>`;
        return;
    }

    const rows = scores.map((s, i) => {
        const aiScore = s.ai_score || 0;
        const metaScore = s.meta_score || 0;
        const diff = aiScore - metaScore;
        const diffColor = diff > 10 ? 'var(--green)' : diff < -10 ? 'var(--red)' : 'var(--text-muted)';
        const aiColor = scoreColor(aiScore);

        const aiSignalMap = {
            'STARK_KOP': {bg:'#00563B',txt:'white',lbl:'STARK KÖP'},
            'STARK KÖP': {bg:'#00563B',txt:'white',lbl:'STARK KÖP'},
            'KOP': {bg:'#00a870',txt:'white',lbl:'KÖP'},
            'KÖP': {bg:'#00a870',txt:'white',lbl:'KÖP'},
            'NEUTRAL': {bg:'#f5f5f5',txt:'var(--text-sec)',lbl:'NEUTRAL'},
            'SALJ': {bg:'var(--red-light)',txt:'var(--red)',lbl:'SÄLJ'},
            'SÄLJ': {bg:'var(--red-light)',txt:'var(--red)',lbl:'SÄLJ'},
            'STARK_SALJ': {bg:'var(--red)',txt:'white',lbl:'STARK SÄLJ'},
            'STARK SÄLJ': {bg:'var(--red)',txt:'white',lbl:'STARK SÄLJ'},
        };
        const sig = aiSignalMap[s.ai_signal] || {bg:'#f5f5f5',txt:'var(--text-sec)',lbl:s.ai_signal||'—'};

        return `<tr style="${Math.abs(diff) > 15 ? 'background:#fffbeb' : ''}">
            <td style="font-weight:600;color:var(--text-muted)">${i+1}</td>
            <td style="font-weight:600">${s.stock_name || ''}</td>
            <td style="text-align:center">
                <div class="ai-gauge" style="background:conic-gradient(${aiColor} ${aiScore*3.6}deg, #e5e7eb ${aiScore*3.6}deg);margin:0 auto">
                    <div class="ai-gauge-inner" style="color:${aiColor}">${aiScore}</div>
                </div>
            </td>
            <td style="text-align:center"><span class="badge" style="background:${sig.bg};color:${sig.txt};font-size:11px">${sig.lbl}</span></td>
            <td style="text-align:center"><span style="font-weight:700;color:${scoreColor(metaScore)}">${metaScore.toFixed(0)}</span></td>
            <td style="text-align:center"><span style="font-weight:600;color:var(--text-muted)">${s.model_agreement || '—'}</span></td>
            <td style="text-align:center;font-weight:700;color:${diffColor}">${diff > 0 ? '+' : ''}${diff.toFixed(0)}</td>
            <td style="font-size:12px;color:var(--text-sec);max-width:250px">${s.ai_summary || ''}</td>
        </tr>`;
    }).join('');

    document.getElementById('content').innerHTML = `
        ${infoBanner}${btnHtml}
        <div class="table-container"><table><thead><tr>
            <th style="width:40px">#</th>
            <th>Aktie</th>
            <th style="text-align:center;min-width:60px">AI Score</th>
            <th style="text-align:center">AI Signal</th>
            <th style="text-align:center">Meta Score</th>
            <th style="text-align:center">Enighet</th>
            <th style="text-align:center">Diff (AI-Meta)</th>
            <th>AI Sammanfattning</th>
        </tr></thead><tbody>${rows}</tbody></table></div>
        <div class="table-footer">AI Topplista — ${scores.length} aktier analyserade av Claude AI · ${analysisDate || 'ej analyserade'}</div>
    `;
}

// ── Init ──────────────────────────────────────────

async function init() {
    await fetchStatus();
    renderFilterBar();
    await fetchData();

    // Auto-refresh: poll varje 60 sekunder
    setInterval(async () => {
        await fetchStatus();
        // Om vi är på en flik som visar live-data, uppdatera
        if (['signals','portfolio','stocks','trending','ocf'].includes(currentTab)) {
            await fetchData();
        }
    }, 60000);
}
init();
</script>

</body>
</html>
