function renderQuarterlyTrendsSection(s) {
    // Visar vinst-, försäljnings- och marginal-utveckling per kvartal
    // (Avanza levererar ej FCF/cash flow per kvartal — vi visar net_profit som proxy)
    const quarterly = s.historical_quarterly || [];
    if (!quarterly.length) return '';

    // Sortera nyaste först — kvartal kan vara "Q1", "Q2" osv, kombinerat med år
    const qOrder = (r) => (r.financial_year || 0) * 10 + (parseInt((r.quarter || 'Q0').replace(/\D/g,'')) || 0);
    const sortedDesc = [...quarterly].sort((a, b) => qOrder(b) - qOrder(a));
    const recent = sortedDesc.slice(0, 10);          // 10 senaste kvartal
    const sortedAsc = [...recent].reverse();          // för sparkline

    const latest = sortedDesc[0];
    const prevQ = sortedDesc[1];                       // föregående kvartal (QoQ)
    const yoyQ = sortedDesc.find(r =>
        r.quarter === latest.quarter && r.financial_year === (latest.financial_year || 0) - 1
    );

    function fmtMoney(v) {
        if (v == null) return '–';
        const a = Math.abs(v);
        if (a >= 1e9) return (v / 1e9).toFixed(2) + ' Md';
        if (a >= 1e6) return (v / 1e6).toFixed(0) + ' M';
        if (a >= 1e3) return (v / 1e3).toFixed(0) + ' k';
        return v.toFixed(0);
    }
    function fmtPct(v) { return v == null ? '–' : (v * 100).toFixed(1) + '%'; }
    function deltaPct(curr, prev) {
        if (curr == null || prev == null || prev === 0) return null;
        return (curr - prev) / Math.abs(prev);
    }
    function deltaTag(d, label) {
        if (d == null) return '<span style="color:var(--text-muted);font-size:11px">— ingen ' + label + ' —</span>';
        const pct = (d * 100);
        const cls = d > 0.005 ? '#00a870' : d < -0.005 ? '#c0392b' : '#888';
        const arrow = d > 0.005 ? '▲' : d < -0.005 ? '▼' : '●';
        return `<span style="color:${cls};font-weight:700">${arrow} ${pct >= 0 ? '+' : ''}${pct.toFixed(1)}%</span> <span style="color:var(--text-muted);font-size:11px">${label}</span>`;
    }

    // Sparkline-helper för en serie
    function spark(values, color, height=44) {
        const nn = values.filter(v => v != null && !isNaN(v));
        if (nn.length < 2) return '';
        const min = Math.min(...nn), max = Math.max(...nn);
        const range = max - min || 1;
        const w = 240, pad = 3;
        const step = (w - 2*pad) / (values.length - 1);
        const baseline = (min < 0 && max > 0) ? height - pad - ((0 - min) / range) * (height - 2*pad) : null;
        const pts = values.map((v, i) => {
            if (v == null || isNaN(v)) return null;
            const x = pad + i * step;
            const y = height - pad - ((v - min) / range) * (height - 2*pad);
            return [x, y];
        });
        const path = pts.filter(p => p).map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
        // Fill area under linjen
        const valid = pts.filter(p => p);
        const area = valid.length >= 2 ? `${path} L${valid[valid.length-1][0].toFixed(1)},${height-pad} L${valid[0][0].toFixed(1)},${height-pad} Z` : '';
        return `<svg viewBox="0 0 ${w} ${height}" style="width:100%;height:${height}px;display:block">
            ${baseline != null ? `<line x1="0" y1="${baseline}" x2="${w}" y2="${baseline}" stroke="#ccc" stroke-dasharray="2,2"/>` : ''}
            ${area ? `<path d="${area}" fill="${color}" opacity="0.12"/>` : ''}
            <path d="${path}" fill="none" stroke="${color}" stroke-width="1.8"/>
            ${valid.map(p => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2" fill="${color}"/>`).join('')}
        </svg>`;
    }

    // Hade bolaget förlust som vänts till vinst?
    const profitSeries = sortedAsc.map(r => r.net_profit);
    const negCount = profitSeries.filter(v => v != null && v < 0).length;
    const posCount = profitSeries.filter(v => v != null && v > 0).length;
    let turnaroundBadge = '';
    if (negCount >= 2 && profitSeries.length >= 4 && profitSeries.slice(-2).every(v => v != null && v > 0)) {
        turnaroundBadge = '<span style="background:#d1fae5;color:#065f46;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:700">🔄 Turnaround: vinst senaste 2 kvartalen</span>';
    } else if (posCount === profitSeries.filter(v => v != null).length && profitSeries.length >= 4) {
        turnaroundBadge = '<span style="background:#dbeafe;color:#1e40af;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:700">✓ Konsekvent vinst</span>';
    }

    const profitQoQ = deltaPct(latest.net_profit, prevQ?.net_profit);
    const profitYoY = deltaPct(latest.net_profit, yoyQ?.net_profit);
    const salesQoQ = deltaPct(latest.sales, prevQ?.sales);
    const salesYoY = deltaPct(latest.sales, yoyQ?.sales);
    const marginQoQ = latest.profit_margin != null && prevQ?.profit_margin != null ? latest.profit_margin - prevQ.profit_margin : null;

    function bigStat(label, value, color, qoq, yoy, sparkData) {
        return `<div style="background:#f9fafb;border-radius:10px;padding:14px;flex:1;min-width:0">
            <div style="font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">${label}</div>
            <div style="font-size:24px;font-weight:700;color:${color};line-height:1.1">${value}</div>
            <div style="font-size:11px;margin-top:6px;display:flex;flex-direction:column;gap:2px">
                <div>${deltaTag(qoq, 'QoQ')}</div>
                <div>${deltaTag(yoy, 'YoY')}</div>
            </div>
            <div style="margin-top:8px">${spark(sparkData, color)}</div>
        </div>`;
    }

    // Tabell med 8 senaste kvartalen
    const tableRows = recent.slice(0, 8).map(r => {
        const np = r.net_profit;
        const sales = r.sales;
        const margin = r.profit_margin;
        const npCol = np == null ? '#888' : np > 0 ? '#00a870' : '#c0392b';
        return `<tr>
            <td style="padding:6px 10px;font-weight:600">${r.quarter} ${r.financial_year}</td>
            <td style="padding:6px 10px;text-align:right">${fmtMoney(sales)}</td>
            <td style="padding:6px 10px;text-align:right;color:${npCol};font-weight:600">${fmtMoney(np)}</td>
            <td style="padding:6px 10px;text-align:right">${fmtPct(margin)}</td>
        </tr>`;
    }).join('');

    return `<div class="drawer-section">
        <div class="drawer-section-title">📈 Vinst- och tillväxtutveckling per kvartal</div>
        ${turnaroundBadge ? `<div style="margin-bottom:10px">${turnaroundBadge}</div>` : ''}
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px">
            ${bigStat('Nettoresultat', fmtMoney(latest.net_profit), latest.net_profit > 0 ? '#00a870' : '#c0392b', profitQoQ, profitYoY, sortedAsc.map(r => r.net_profit))}
            ${bigStat('Omsättning', fmtMoney(latest.sales), '#3b82f6', salesQoQ, salesYoY, sortedAsc.map(r => r.sales))}
            ${bigStat('Vinstmarginal', fmtPct(latest.profit_margin), '#8b5cf6', marginQoQ, null, sortedAsc.map(r => r.profit_margin))}
        </div>
        <div style="background:white;border:1px solid var(--border);border-radius:10px;overflow:hidden">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
                <thead style="background:#f9fafb">
                    <tr style="border-bottom:1px solid var(--border)">
                        <th style="text-align:left;padding:8px 10px">Kvartal</th>
                        <th style="text-align:right;padding:8px 10px">Omsättning</th>
                        <th style="text-align:right;padding:8px 10px">Nettoresultat</th>
                        <th style="text-align:right;padding:8px 10px">Marginal</th>
                    </tr>
                </thead>
                <tbody>${tableRows}</tbody>
            </table>
        </div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:8px;font-style:italic">
            ⓘ Avanza levererar ej FCF/cash flow per kvartal — vi visar nettoresultat som proxy för lönsamhetsutveckling. ${latest.financial_year ? 'Senaste rapport: ' + latest.quarter + ' ' + latest.financial_year : ''}
        </div>
    </div>`;
}

function renderHistoricalSection(s) {
    const annual = s.historical_annual || [];
    const ctx = s.historical_context || {};
    if (!annual.length) {
        return `<div class="drawer-section">
            <div class="drawer-section-title">📊 10-års historik</div>
            <div style="padding:16px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:10px;font-size:13px;color:#78350f">
                <div style="font-weight:600;margin-bottom:6px">⏳ Historisk data hämtas i bakgrunden</div>
                <div style="font-size:12px;line-height:1.5">
                    Vi synkar 10 års historik från Avanza för alla bolag (~10-15 min totalt).
                    Försök igen om några minuter — eller klicka <a href="#" onclick="event.preventDefault(); checkHistSyncStatus()" style="color:#1e40af;font-weight:600">visa sync-status</a>.
                </div>
                <div style="font-size:11px;color:#92400e;margin-top:6px;font-style:italic">
                    Composite-score, buy-zone och vinst-historik är begränsade tills datan är klar.
                </div>
            </div>
        </div>`;
    }

    // Sortera stigande på år
    const sorted = [...annual].sort((a, b) => (a.financial_year||0) - (b.financial_year||0));
    const years = sorted.map(r => r.financial_year);
    const eps = sorted.map(r => r.eps);
    const roe = sorted.map(r => r.return_on_equity != null ? (Math.abs(r.return_on_equity) > 1.5 ? r.return_on_equity : r.return_on_equity * 100) : null);
    const sales = sorted.map(r => r.sales);
    const divs = sorted.map(r => r.dividend_per_share);

    // Enkel sparkline-SVG
    function sparkline(data, color, fmt) {
        const vals = data.map(v => v == null ? null : Number(v));
        const nn = vals.filter(v => v != null && !isNaN(v));
        if (nn.length < 2) return '<div style="color:var(--text-muted);font-size:11px">Otillräcklig data</div>';
        const min = Math.min(...nn), max = Math.max(...nn);
        const range = max - min || 1;
        const w = 360, h = 50, pad = 4;
        const step = (w - 2*pad) / (vals.length - 1);
        const pts = vals.map((v, i) => {
            if (v == null || isNaN(v)) return null;
            const x = pad + i * step;
            const y = h - pad - ((v - min) / range) * (h - 2*pad);
            return `${x},${y}`;
        }).filter(p => p);
        const baselineY = min < 0 && max > 0 ? h - pad - ((0 - min) / range) * (h - 2*pad) : null;
        return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px">
            ${baselineY != null ? `<line x1="0" y1="${baselineY}" x2="${w}" y2="${baselineY}" stroke="#ccc" stroke-dasharray="2,2"/>` : ''}
            <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2"/>
            ${vals.map((v, i) => {
                if (v == null) return '';
                const x = pad + i * step;
                const y = h - pad - ((v - min) / range) * (h - 2*pad);
                return `<circle cx="${x}" cy="${y}" r="2.5" fill="${color}"/>`;
            }).join('')}
        </svg>`;
    }

    function miniRow(label, data, color, fmtFn) {
        const latest = data[data.length - 1];
        const latestStr = latest != null ? fmtFn(latest) : '-';
        return `<div style="padding:10px 12px;background:#f9fafb;border-radius:8px;margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
                <span style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">${label}</span>
                <span style="font-size:14px;font-weight:700;color:${color}">${latestStr}</span>
            </div>
            ${sparkline(data, color, fmtFn)}
            <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-muted);margin-top:2px">
                <span>${years[0] || ''}</span>
                <span>${years[years.length-1] || ''}</span>
            </div>
        </div>`;
    }

    const fmtEps = v => v.toFixed(2);
    const fmtRoe = v => v.toFixed(1) + '%';
    const fmtSales = v => {
        if (Math.abs(v) > 1e9) return (v/1e9).toFixed(1) + ' Mdr';
        if (Math.abs(v) > 1e6) return (v/1e6).toFixed(0) + ' M';
        return v.toFixed(0);
    };
    const fmtDiv = v => v.toFixed(2);

    // Kontext-kort
    let contextPills = [];
    if (ctx.eps_7y_avg != null) contextPills.push(`<span style="padding:3px 8px;background:#dbeafe;color:#1e40af;border-radius:12px;font-size:11px;font-weight:600">7Y avg EPS: ${ctx.eps_7y_avg.toFixed(2)}</span>`);
    if (ctx.roe_10y_median != null) contextPills.push(`<span style="padding:3px 8px;background:#dbeafe;color:#1e40af;border-radius:12px;font-size:11px;font-weight:600">10Y median ROE: ${(ctx.roe_10y_median*100).toFixed(1)}%</span>`);
    if (ctx.revenue_cagr_5y != null) {
        const cagrColor = ctx.revenue_cagr_5y > 0 ? '#065f46' : '#991b1b';
        const cagrBg = ctx.revenue_cagr_5y > 0 ? '#d1fae5' : '#fee2e2';
        contextPills.push(`<span style="padding:3px 8px;background:${cagrBg};color:${cagrColor};border-radius:12px;font-size:11px;font-weight:600">5Y rev CAGR: ${(ctx.revenue_cagr_5y*100).toFixed(1)}%</span>`);
    }
    if (ctx.eps_loss_years != null && ctx.eps_years) {
        const stable = ctx.eps_loss_years === 0;
        contextPills.push(`<span style="padding:3px 8px;background:${stable?'#d1fae5':'#fef3c7'};color:${stable?'#065f46':'#92400e'};border-radius:12px;font-size:11px;font-weight:600">${ctx.eps_loss_years} förlustår / ${ctx.eps_years} år</span>`);
    }
    if (ctx.dividend_years_paid != null) {
        contextPills.push(`<span style="padding:3px 8px;background:#f3e8ff;color:#6b21a8;border-radius:12px;font-size:11px;font-weight:600">Utdelning ${ctx.dividend_years_paid} av 10 år</span>`);
    }
    if (ctx.peak_ratio_eps != null && ctx.peak_ratio_eps > 1.5) {
        const peak = ctx.peak_ratio_eps;
        const peakColor = peak > 2.5 ? '#991b1b' : '#92400e';
        const peakBg = peak > 2.5 ? '#fee2e2' : '#fef3c7';
        contextPills.push(`<span style="padding:3px 8px;background:${peakBg};color:${peakColor};border-radius:12px;font-size:11px;font-weight:600">⚠️ Peak EPS: ${peak.toFixed(1)}× 7Y-median</span>`);
    }

    return `<div class="drawer-section">
        <div class="drawer-section-title">📊 10-års historik (Avanza)</div>
        ${contextPills.length ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${contextPills.join('')}</div>` : ''}
        ${miniRow('EPS per aktie', eps, '#3b82f6', fmtEps)}
        ${miniRow('Return on Equity', roe, '#10b981', fmtRoe)}
        ${miniRow('Omsättning', sales, '#8b5cf6', fmtSales)}
        ${miniRow('Utdelning per aktie', divs, '#f59e0b', fmtDiv)}
    </div>`;
}

    }

    // ── ⭐ SMART SCORE (sammanvägd, nya hjältescoren) ──
    if (s.smart_score != null) {
        const ss = s.smart_score;
        const ssLabel = s.smart_score_label || (ss >= 80 ? 'STARK KÖP' : ss >= 70 ? 'KÖP' : ss >= 55 ? 'OK' : ss >= 40 ? 'VÄNTA' : 'UNDVIK');

        const sd = s.smart_score_change;
        const sdHtml = sd == null ? '<span style="color:#888;font-size:14px;font-weight:500">— ingen historik ännu —</span>'
            : sd > 0.5 ? `<span style="color:#00a870;font-weight:700;font-size:18px">▲ ${sd.toFixed(1)}p sedan igår</span>`
            : sd < -0.5 ? `<span style="color:#c0392b;font-weight:700;font-size:18px">▼ ${Math.abs(sd).toFixed(1)}p sedan igår</span>`
            : `<span style="color:#888;font-size:14px">● Oförändrad sedan igår</span>`;
        const ssBg = ss >= 70 ? 'linear-gradient(135deg, #ecfdf5, #d1fae5)' : ss >= 55 ? 'linear-gradient(135deg, #f9fafb, #f3f4f6)' : ss >= 40 ? 'linear-gradient(135deg, #fef3c7, #fde68a)' : 'linear-gradient(135deg, #fee2e2, #fecaca)';
        html += `<div class="drawer-section" style="background:${ssBg};border-radius:12px;padding:18px;margin-bottom:14px">
            <div style="display:flex;align-items:baseline;justify-content:space-between;gap:14px">
                <div>
                    <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:700">⭐ Smart Score</div>
                    <div style="font-size:42px;font-weight:800;color:${ssColor};line-height:1">${ss.toFixed(0)}</div>
                    <div style="font-size:14px;color:${ssColor};font-weight:700;margin-top:2px">${ssLabel}</div>
                </div>
                <div style="text-align:right">
                    <div style="font-size:11px;color:var(--text-muted)">Förändring</div>
                    ${sdHtml}
                    <div style="font-size:10px;color:var(--text-muted);margin-top:4px">50% Meta + 50% Bok-composite</div>
                </div>
            </div>
        </div>`;
    }

    // ── EDGE MODEL (if available) ──
    if (s.edge_score != null) {
        const sc = scoreColor(s.edge_score);
        html += `<div class="drawer-section">
            <div class="drawer-section-title">Edge Model</div>
            <div class="drawer-grid">
                <div class="drawer-item"><div class="drawer-item-label">Edge Score</div><div class="drawer-item-value" style="color:${sc}">${s.edge_score.toFixed(1)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Signal</div><div class="drawer-item-value">${signalBadge(s.signal)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Action</div><div class="drawer-item-value">${actionBadge(s.action)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Fas</div><div class="drawer-item-value">${phaseBadge(s.phase)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">DD Risk</div><div class="drawer-item-value">${ddRiskBadge(s.dd_risk, s.dd_risk_label)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">7d Trend</div><div class="drawer-item-value">${trend7dBadge(s.trend_7d, s.trend_7d_sv)}</div></div>
            </div>
        </div>`;
        if (s.components) {
            const comps = [
                ['Momentum', s.components.owner_momentum, 'var(--green)'],
                ['Accel+SS', s.components.accel_sweetspot, 'var(--blue)'],
                ['Kontrarian', s.components.kontrarian, 'var(--purple)'],
                ['Fundamental', s.components.fundamental, '#2563eb'],
                ['Short Squeeze', s.components.short_squeeze, 'var(--orange)'],
                ['Ägarmognad', s.components.owner_maturity, '#16a34a'],
            ];
            html += `<div class="drawer-section"><div class="drawer-section-title">Modellkomponenter</div><div class="drawer-grid">${
                comps.map(([l,v,c]) => `<div class="drawer-item"><div class="drawer-item-label">${l}</div><div class="drawer-item-value" style="color:${c}">${v!=null?v.toFixed(0):'-'}</div></div>`).join('')
            }</div></div>`;
        }
    }

    // ── DISCOVERY SIGNAL (backtestad: 66-87% win rate, +45% 1Y) ──
    const disc = s.discovery_score || (s.components && s.components.discovery) || 0;
    if (disc >= 30) {
        const discColor = disc >= 70 ? '#92400e' : disc >= 50 ? '#1e40af' : '#166534';
        const discBg = disc >= 70 ? 'linear-gradient(135deg, #fef3c7, #fde68a)' : disc >= 50 ? 'linear-gradient(135deg, #dbeafe, #bfdbfe)' : 'linear-gradient(135deg, #f0fdf4, #dcfce7)';
        const discEmoji = disc >= 70 ? '🔥' : disc >= 50 ? '⚡' : '📈';
        const discLabel = disc >= 70 ? 'Stark Discovery' : disc >= 50 ? 'Discovery' : 'Tidig tillväxt';
        const gc = s.growth_consistency || 0;
        const qp = s.quarters_positive || 0;
        const qt = s.quarters_total || 0;
        const vel = s.vel_13w ? (s.vel_13w * 100).toFixed(1) : '0';
        const strk = s.streak || 0;
        html += `<div class="drawer-section" style="background:${discBg};border-radius:12px;padding:16px">
            <div class="drawer-section-title" style="color:${discColor}">${discEmoji} Discovery Signal</div>
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
                <div style="font-size:36px;font-weight:900;color:${discColor}">${disc}</div>
                <div>
                    <div style="font-size:14px;font-weight:700;color:${discColor}">${discLabel}</div>
                    <div style="font-size:12px;color:var(--text-muted)">Backtest: 66% win, +45% snitt 1Y</div>
                </div>
            </div>
            <div class="consistency-bar"><div class="consistency-bar-fill" style="width:${gc * 100}%;background:${discColor}"></div></div>
            <div class="drawer-grid" style="margin-top:12px">
                <div class="drawer-item"><div class="drawer-item-label">Kvartalstillväxt</div><div class="drawer-item-value" style="color:${discColor}">${vel}%</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Streak</div><div class="drawer-item-value" style="color:${strk>=8?'var(--green)':'var(--text-muted)'}">${strk}v</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Konsistens</div><div class="drawer-item-value">${qp}/${qt} Q</div></div>
            </div>
        </div>`;
    }

    // ── ÄGARMOGNAD (5000+ aktier) ──
    if (s.maturity_score > 0 && disc < 30) {
        const ms = s.maturity_score;
        const ml = s.maturity_label || '';
        const gc = s.growth_consistency || 0;
        const qp = s.quarters_positive || 0;
        const qt = s.quarters_total || 0;
        const c5k = s.crossed_5000_date;
        const ov = s.owner_velocity || 0;
        const msColor = ms >= 70 ? '#166534' : ms >= 50 ? '#854d0e' : '#6b7280';
        const bgColor = ms >= 70 ? 'linear-gradient(135deg, #f0fdf4, #ecfccb)' : ms >= 50 ? 'linear-gradient(135deg, #fefce8, #fef9c3)' : '#f9fafb';
        html += `<div class="drawer-section" style="background:${bgColor};border-radius:12px;padding:16px">
            <div class="drawer-section-title" style="color:${msColor}">Ägarmognad</div>
            <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
                <div style="font-size:36px;font-weight:900;color:${msColor}">${ms.toFixed(0)}</div>
                <div>
                    <div style="font-size:14px;font-weight:700;color:${msColor}">${ml}</div>
                    <div style="font-size:12px;color:var(--text-muted)">Tillväxtkonsistens: ${qp}/${qt} kvartal</div>
                </div>
            </div>
            <div class="consistency-bar"><div class="consistency-bar-fill" style="width:${gc * 100}%"></div></div>
            <div class="drawer-grid" style="margin-top:12px">
                <div class="drawer-item"><div class="drawer-item-label">Velocity</div><div class="drawer-item-value" style="color:${ov>0?'var(--green)':'var(--red)'}">${ov.toFixed(2)}%/v</div></div>
                ${c5k ? `<div class="drawer-item"><div class="drawer-item-label">Korsade 5000</div><div class="drawer-item-value">${c5k}</div></div>` : ''}
            </div>
        </div>`;
    }

    // ── META SCORE (alla 4 modeller) ──
    if (s.meta_score != null) {
        const mc = scoreColor(s.meta_score);
        const dsc = s.dsm_score || 0;
        const asc = s.ace_score || 0;
        const msc = s.magic_score;
        html += `<div class="drawer-section">
            <div class="drawer-section-title">🎯 Meta Score (4 modeller)</div>
            <div class="drawer-grid">
                <div class="drawer-item"><div class="drawer-item-label">Meta Score</div><div class="drawer-item-value" style="font-size:20px;color:${mc}">${s.meta_score.toFixed(1)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Meta Signal</div><div class="drawer-item-value">${metaSignalBadge(s.meta_signal)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">Enighet</div><div class="drawer-item-value">${modelAgreementBadge(s.model_agreement, s.model_agreement_total)}</div></div>
                <div class="drawer-item"><div class="drawer-item-label">DD Blockerad</div><div class="drawer-item-value">${s.dd_blocked ? '<span style="color:var(--red)">Ja ⚠</span>' : '<span style="color:var(--green)">Nej ✓</span>'}</div></div>
            </div>
            <div style="margin-top:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
                <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:8px">
                    <div style="font-size:10px;color:var(--text-muted)">🏇 Trav</div>
                    <div style="font-size:16px;font-weight:700;color:${scoreColor(s.edge_score||0)}">${(s.edge_score||0).toFixed(0)}</div>
                </div>
                <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:8px">
                    <div style="font-size:10px;color:var(--text-muted)">🎯 DSM</div>
                    <div style="font-size:16px;font-weight:700;color:${scoreColor(dsc)}">${dsc.toFixed(0)}</div>
                </div>
                <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:8px">
                    <div style="font-size:10px;color:var(--text-muted)">⚡ ACE</div>
                    <div style="font-size:16px;font-weight:700;color:${scoreColor(asc)}">${asc.toFixed(0)}</div>
                </div>
                <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:8px">
                    <div style="font-size:10px;color:var(--text-muted)">📊 Magic</div>
                    <div style="font-size:16px;font-weight:700;color:${msc != null ? scoreColor(msc) : 'var(--text-muted)'}">${msc != null ? msc.toFixed(0) : '—'}</div>
                </div>
            </div>
        </div>`;
    }

    // ── PRICE CHANGES ──
    const priceFields = [
        ['1D','one_day_change_pct'],['1V','one_week_change_pct'],['1M','one_month_change_pct'],
        ['3M','three_months_change_pct'],['6M','six_months_change_pct'],['YTD','ytd_change_pct'],
        ['1Y','one_year_change_pct'],['3Y','three_years_change_pct'],['5Y','five_years_change_pct'],
        ['10Y','ten_years_change_pct'],['Alltid','infinity_change_pct'],
    ];
    html += `<div class="drawer-section"><div class="drawer-section-title">Prisutveckling</div><div class="drawer-grid-3">${
        priceFields.map(([l,k]) => {
            const v = s[k];
            return `<div class="drawer-item"><div class="drawer-item-label">${l}</div><div class="drawer-item-value ${pctClass(v)}">${fmtPct(v)}</div></div>`;
        }).join('')
    }</div></div>`;

    // ── OWNER CHANGES ──
    const ownerFields = [
        ['1D','owners_change_1d','owners_change_1d_abs'],['1V','owners_change_1w','owners_change_1w_abs'],
        ['1M','owners_change_1m','owners_change_1m_abs'],['3M','owners_change_3m','owners_change_3m_abs'],
        ['YTD','owners_change_ytd','owners_change_ytd_abs'],['1Y','owners_change_1y','owners_change_1y_abs'],
    ];
    html += `<div class="drawer-section"><div class="drawer-section-title">Ägarförändringar (${fmtNum(s.number_of_owners)} ägare)</div><div class="drawer-grid-3">${
        ownerFields.map(([l,pk,ak]) => {
            const v = s[pk]; const abs = s[ak];
            return `<div class="drawer-item"><div class="drawer-item-label">${l}</div>
                <div class="drawer-item-value ${pctClass(v)}">${fmtPct(v)}</div>
                <div style="font-size:11px;color:var(--text-muted)">${abs ? (abs>0?'+':'')+fmtNum(abs)+' st' : ''}</div></div>`;
        }).join('')
    }</div></div>`;

    // ── FUNDAMENTALS ──
    const fmtV = (v,d=1) => v != null ? v.toFixed(d) : '-';
    const fmtM = v => v != null ? (Math.abs(v)>1e9 ? (v/1e9).toFixed(1)+' Md' : (v/1e6).toFixed(0)+' M') : '-';
    const fundItems = [
        ['P/E', s.pe_ratio, v => fmtV(v,1)],
        ['P/B', s.price_book_ratio, v => fmtV(v,2)],
        ['EV/EBIT', s.ev_ebit_ratio, v => fmtV(v,1)],
        ['Direktavk.', s.direct_yield, v => v!=null ? fmtV(v*100,1)+'%' : '-'],
        ['ROE', s.return_on_equity, v => v!=null ? fmtV(v*100,1)+'%' : '-'],
        ['ROA', s.return_on_assets, v => v!=null ? fmtV(v*100,1)+'%' : '-'],
        ['ROCE', s.return_on_capital_employed, v => v!=null ? fmtV(v*100,1)+'%' : '-'],
        ['D/E', s.debt_to_equity_ratio, v => fmtV(v,2)],
        ['ND/EBITDA', s.net_debt_ebitda_ratio, v => fmtV(v,1)],
        ['EPS', s.eps, v => fmtV(v,2)],
        ['OCF', s.operating_cash_flow, v => fmtM(v)],
        ['Nettoresultat', s.net_profit, v => fmtM(v)],
        ['Omsättning', s.sales, v => fmtM(v)],
        ['Börsvärde', s.market_cap, v => v!=null ? (v/1e9).toFixed(2)+' Md' : '-'],
    ];
    html += `<div class="drawer-section"><div class="drawer-section-title">Fundamentala nyckeltal</div><div class="drawer-grid">${
        fundItems.map(([l,v,fmt]) => `<div class="drawer-item"><div class="drawer-item-label">${l}</div><div class="drawer-item-value">${fmt(v)}</div></div>`).join('')
    }</div></div>`;

    // ── TECHNICALS ──
    const price = s.last_price;
    const smaFmt = (smaVal) => {
        if (smaVal == null || smaVal === 0) return '-';
        // sma20/sma50/sma200 are already pct deviations (e.g. -0.07 = -7%)
        const pct = smaVal * 100;
        return `<span class="${pct>0?'num-pos':'num-neg'}">${pct>0?'Över':'Under'} (${Math.abs(pct).toFixed(1)}%)</span>`;
    };
    const techItems = [
        ['RSI (14)', s.rsi14, v => v!=null ? `<span style="color:${v>70?'var(--red)':v<30?'var(--green)':'var(--text)'}">${v.toFixed(0)}</span>` : '-'],
        ['SMA 20', s.sma20, v => smaFmt(v)],
        ['SMA 50', s.sma50, v => smaFmt(v)],
        ['SMA 200', s.sma200, v => smaFmt(v)],
        ['Beta', s.beta, v => fmtV(v,2)],
        ['Volatilitet', s.volatility, v => v!=null ? (v*100).toFixed(0)+'%' : '-'],
        ['MACD', s.macd_histogram, v => v!=null ? `<span class="${v>0?'num-pos':'num-neg'}">${v.toFixed(3)}</span>` : '-'],
        ['Boll. bredd', s.bollinger_distance_upper_to_lower, v => v!=null ? (v*100).toFixed(1)+'%' : '-'],
    ];
    html += `<div class="drawer-section"><div class="drawer-section-title">Tekniska indikatorer</div><div class="drawer-grid">${
        techItems.map(([l,v,fmt]) => `<div class="drawer-item"><div class="drawer-item-label">${l}</div><div class="drawer-item-value">${fmt(v)}</div></div>`).join('')
    }</div></div>`;

    // ── BOKMODELLER (Graham, Buffett, Lynch, Greenblatt, Klarman, Taleb, Kelly m.fl.) ──
    html += renderBookModelSection(s);

    // ── KÖPZON (simulerat riktpris) ──
    html += renderBuyZoneSection(s);

    // ── VINST/TILLVÄXT PER KVARTAL (Avanza har ej FCF — vi visar nettoresultat) ──
    html += renderQuarterlyTrendsSection(s);

    // ── 10-års HISTORIK (Avanza /analysis) ──
    html += renderHistoricalSection(s);

    // ── AI ANALYS-KNAPP ──
    html += `<div class="drawer-section">
        <div class="drawer-section-title">🤖 AI-analys (Claude)</div>
        <button id="aiAnalyzeBtn" onclick="analyzeStock()" style="
            width:100%;padding:12px 16px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;
            background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;display:flex;align-items:center;justify-content:center;gap:8px;
            transition:all 0.2s;box-shadow:0 2px 8px rgba(124,58,237,0.3);
        " onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 4px 12px rgba(124,58,237,0.4)'"
           onmouseout="this.style.transform='none';this.style.boxShadow='0 2px 8px rgba(124,58,237,0.3)'">
            🧠 Analysera nyckeltal
        </button>
        <div id="aiAnalysisResult" style="margin-top:12px"></div>
    </div>`;

    // ── INSIDER ──
    if (s.insider_buys > 0 || s.insider_sells > 0) {
        html += `<div class="drawer-section"><div class="drawer-section-title">Insiderhandel (90d)</div><div class="drawer-grid">
            <div class="drawer-item"><div class="drawer-item-label">Köp</div><div class="drawer-item-value" style="color:var(--green)">${s.insider_buys}</div></div>
            <div class="drawer-item"><div class="drawer-item-label">Sälj</div><div class="drawer-item-value" style="color:var(--red)">${s.insider_sells}</div></div>
            ${s.insider_cluster_buy ? '<div class="drawer-item" style="grid-column:span 2;background:var(--green-light)"><div class="drawer-item-value" style="color:var(--green)">🔥 Klusterköp (3+ insiders)</div></div>' : ''}
        </div></div>`;
    }

    document.getElementById('drawerBody').innerHTML = html;
    document.getElementById('stockDrawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeDrawer() {
    document.getElementById('stockDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
    document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

// ── Infinity Scroll ──────────────────────────────────

function showLoadMore() {
    const el = document.getElementById('loadMore');
    if (el) el.innerHTML = '<div class="load-more-spinner"></div>';
}

function setupInfiniteScroll() {
    const target = document.getElementById('loadMore');
    if (!target) return;

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !isLoadingMore && allLoadedRows.length < totalResults) {
            currentOffset += PAGE_SIZE;
            fetchData(true);
        }
    }, { threshold: 0.1 });

    observer.observe(target);
}

// ── Morning Brief ─────────────────────────────────

let morningBriefData = null;

async function generateMorningBrief() {
    const btn = document.getElementById('morningBriefBtn');
    const container = document.getElementById('morningBriefResult');
    if (!btn || !container) return;

    btn.disabled = true;
    btn.innerHTML = '<div class="loading-spinner" style="width:18px;height:18px;border-width:2px;margin:0;display:inline-block"></div> Genererar brief...';

    try {
        const res = await fetch('/api/ai-morning-brief', {method: 'POST'});
        const data = await res.json();
        if (data.error) {
            container.innerHTML = `<div style="padding:12px;background:#fee;border-radius:8px;color:var(--red);font-size:13px">❌ ${data.error}</div>`;
            return;
        }
        morningBriefData = data;
        renderMorningBriefResult(container);
    } catch(e) {
        container.innerHTML = `<div style="padding:12px;background:#fee;border-radius:8px;color:var(--red);font-size:13px">❌ ${e.message}</div>`;
    } finally {
        btn.disabled = false;
        btn.innerHTML = '🌅 Generera morgonbrief';
    }
}

async function loadCachedBrief() {
    try {
        const res = await fetch('/api/ai-morning-brief');
        const data = await res.json();
        if (data.cached && data.greeting) {
            morningBriefData = data;
            const container = document.getElementById('morningBriefResult');
            if (container) renderMorningBriefResult(container);
        }
    } catch(e) {}
}

    const PCFG = {
        trav:  { icon: '🏇', label: 'Trav' },

        ace:   { icon: '⚡', label: 'ACE' },

    const portfoliosHtml = (b.portfolios || []).map(p => {

function handleDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
    }
}

function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        uploadedImage = e.target.result;
        document.getElementById('imagePreview').innerHTML = `<img src="${uploadedImage}" class="upload-preview">`;
        const btn = document.getElementById('analyzeImageBtn');
        btn.disabled = false;
        btn.style.opacity = '1';
    };
    reader.readAsDataURL(file);
}

async function analyzePortfolioImage() {
    if (!uploadedImage) return;
    const btn = document.getElementById('analyzeImageBtn');
    const resultDiv = document.getElementById('myPortfolioResult');
    btn.disabled = true;
    btn.innerHTML = '<div class="loading-spinner" style="width:16px;height:16px;border-width:2px;margin:0;display:inline-block"></div> Analyserar...';
    resultDiv.innerHTML = '<div class="loading-wrap"><div class="loading-spinner"></div><p style="color:var(--text-muted)">Claude AI analyserar din portfölj... (kan ta 30-60 sek)</p></div>';

    try {
        const base64 = uploadedImage.split(',')[1];
        const res = await fetch('/api/analyze-portfolio', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({image: base64})
        });
        const data = await res.json();
        if (data.error) {
            resultDiv.innerHTML = `<div style="padding:16px;background:#fee;border-radius:8px;color:var(--red)">❌ ${data.error}</div>`;

        resultDiv.innerHTML = `<div style="padding:16px;background:#fee;border-radius:8px;color:var(--red)">❌ ${e.message}</div>`;

function renderPortfolioAnalysis(data, container) {
    const stocks = data.stocks || [];
    const recs = data.recommendations || [];
    const summary = data.summary || '';

    const recMap = {};
    recs.forEach(r => { recMap[(r.name||'').toLowerCase()] = r; });

    const recColors = {
        'KÖP': {bg:'var(--green-light)',color:'var(--green)',icon:'🟢'},
        'KÖP MER': {bg:'#00a870',color:'white',icon:'🟢🟢'},
        'HÅLL': {bg:'#f5f5f5',color:'var(--text-sec)',icon:'🔵'},
        'SÄLJ': {bg:'var(--red-light)',color:'var(--red)',icon:'🔴'},
        'STARK SÄLJ': {bg:'var(--red)',color:'white',icon:'🔴🔴'},
    };

    const rows = stocks.map((s, i) => {
        const rec = recMap[(s.name||'').toLowerCase()] || {};
        const signal = rec.recommendation || 'HÅLL';
        const rc = recColors[signal] || recColors['HÅLL'];
        const matched = s.matched !== false;
        return `<tr>
            <td>${i+1}</td>
            <td style="font-weight:600">${s.name || '?'}</td>
            <td style="text-align:center">${matched ? '<span style="color:var(--green)">✓</span>' : '<span style="color:var(--text-muted)">—</span>'}</td>
            <td style="text-align:right">${s.current_price ? s.current_price.toFixed(2) : '-'}</td>
            <td style="text-align:right">${s.shares || '-'}</td>
            <td style="text-align:center">${s.meta_score ? '<span style="font-weight:700;color:'+scoreColor(s.meta_score)+'">'+s.meta_score.toFixed(0)+'</span>' : '-'}</td>
            <td style="text-align:center">${s.signal ? signalBadge(s.signal) : '-'}</td>
            <td><span class="badge" style="background:${rc.bg};color:${rc.color};font-size:12px">${rc.icon} ${signal}</span></td>
            <td style="font-size:12px;color:var(--text-sec);max-width:200px">${rec.reason || ''}</td>
        </tr>`;
    }).join('');

    const html = `
        ${summary ? `<div style="background:linear-gradient(135deg,var(--orange-light),#fff8e1);border-radius:var(--radius);padding:16px;margin-bottom:16px;font-size:14px">
            <strong>📋 Sammanfattning:</strong> ${summary}
        </div>` : ''}
        <div class="table-container"><table><thead><tr>
            <th>#</th><th>Aktie</th><th style="text-align:center">Matchad</th>
            <th style="text-align:right">Kurs</th><th style="text-align:right">Antal</th>
            <th style="text-align:center">Meta Score</th><th style="text-align:center">Signal</th>
            <th>Rekommendation</th><th>Motivering</th>
        </tr></thead><tbody>${rows}</tbody></table></div>
    `;
    container.innerHTML = html;
    myPortfolioResult = html;
}

async function generateAIToplist() {
    const btn = document.getElementById('aiToplistBtn');
    if (!btn) return;
    btn.disabled = true;
    btn.innerHTML = '<div class="loading-spinner" style="width:16px;height:16px;border-width:2px;margin:0;display:inline-block"></div> Analyserar 50 aktier...';

    try {
        await fetch('/api/ai-toplist', {method: 'POST'});
        // Poll for completion
        const poll = setInterval(async () => {
            const st = await (await fetch('/api/status')).json();
            const topRes = await (await fetch('/api/ai-toplist')).json();
            if (topRes.loading) {
                btn.innerHTML = '<div class="loading-spinner" style="width:16px;height:16px;border-width:2px;margin:0;display:inline-block"></div> ' + (topRes.progress || 'Analyserar...');
            } else {
                clearInterval(poll);
                btn.disabled = false;
                btn.innerHTML = '🧠 Uppdatera AI-analys';
                aiToplistData = topRes;
                renderAIToplist();
            }
        }, 3000);
    } catch(e) {
        btn.disabled = false;
        btn.innerHTML = '🧠 Uppdatera AI-analys';
        alert('Fel: ' + e.message);
    }
}

function renderAIToplist() {
    const data = aiToplistData || {};
    const scores = data.scores || [];
    const loading = data.loading || false;
    const analysisDate = data.date || data.analysis_date || '';

    const infoBanner = `<div class="info-banner" style="background:linear-gradient(135deg,#f0e8ff,#e8eeff)">
        <div class="info-banner-icon">🧠</div>
        <div class="info-banner-text">
            <strong>AI Topplista — Claude analyserar top 50 aktier</strong><br>
            Claude AI läser alla nyckeltal och ger varje aktie ett AI Score (0-100) + signal.
            Jämför mot Meta Score för att hitta diskrepanser — aktier där AI ser mer potential.
            ${analysisDate ? '<br>Senast uppdaterad: <strong>'+analysisDate+'</strong>' : ''}
        </div>
    </div>`;

    const btnHtml = `<div style="margin-bottom:16px">
        <button id="aiToplistBtn" onclick="generateAIToplist()" class="brief-btn" ${loading ? 'disabled' : ''}>
            ${loading ? '<div class="loading-spinner" style="width:16px;height:16px;border-width:2px;margin:0;display:inline-block"></div> Analyserar...' : '🧠 Uppdatera AI-analys'}
        </button>
    </div>`;

    if (scores.length === 0) {
        document.getElementById('content').innerHTML = `
            ${infoBanner}${btnHtml}
            <div style="text-align:center;padding:60px;color:var(--text-muted)">
                <div style="font-size:64px;margin-bottom:16px">🧠</div>
                <div style="font-size:18px;font-weight:600;margin-bottom:8px">Ingen AI-analys ännu</div>
                <div>Klicka "Uppdatera AI-analys" för att låta Claude analysera top 50 aktier.</div>
            </div>`;
        return;
    }

    const rows = scores.map((s, i) => {
        const aiScore = s.ai_score || 0;
        const metaScore = s.meta_score || 0;
        const diff = aiScore - metaScore;
        const diffColor = diff > 10 ? 'var(--green)' : diff < -10 ? 'var(--red)' : 'var(--text-muted)';
        const aiColor = scoreColor(aiScore);

        const aiSignalMap = {
            'STARK_KOP': {bg:'#00563B',txt:'white',lbl:'STARK KÖP'},
            'STARK KÖP': {bg:'#00563B',txt:'white',lbl:'STARK KÖP'},
            'KOP': {bg:'#00a870',txt:'white',lbl:'KÖP'},
            'KÖP': {bg:'#00a870',txt:'white',lbl:'KÖP'},
            'NEUTRAL': {bg:'#f5f5f5',txt:'var(--text-sec)',lbl:'NEUTRAL'},
            'SALJ': {bg:'var(--red-light)',txt:'var(--red)',lbl:'SÄLJ'},
            'SÄLJ': {bg:'var(--red-light)',txt:'var(--red)',lbl:'SÄLJ'},
            'STARK_SALJ': {bg:'var(--red)',txt:'white',lbl:'STARK SÄLJ'},
            'STARK SÄLJ': {bg:'var(--red)',txt:'white',lbl:'STARK SÄLJ'},
        };
        const sig = aiSignalMap[s.ai_signal] || {bg:'#f5f5f5',txt:'var(--text-sec)',lbl:s.ai_signal||'—'};

        return `<tr style="${Math.abs(diff) > 15 ? 'background:#fffbeb' : ''}">
            <td style="font-weight:600;color:var(--text-muted)">${i+1}</td>
            <td style="font-weight:600">${s.stock_name || ''}</td>
            <td style="text-align:center">
                <div class="ai-gauge" style="background:conic-gradient(${aiColor} ${aiScore*3.6}deg, #e5e7eb ${aiScore*3.6}deg);margin:0 auto">
                    <div class="ai-gauge-inner" style="color:${aiColor}">${aiScore}</div>
                </div>
            </td>
            <td style="text-align:center"><span class="badge" style="background:${sig.bg};color:${sig.txt};font-size:11px">${sig.lbl}</span></td>
            <td style="text-align:center"><span style="font-weight:700;color:${scoreColor(metaScore)}">${metaScore.toFixed(0)}</span></td>
            <td style="text-align:center"><span style="font-weight:600;color:var(--text-muted)">${s.model_agreement || '—'}</span></td>
            <td style="text-align:center;font-weight:700;color:${diffColor}">${diff > 0 ? '+' : ''}${diff.toFixed(0)}</td>
            <td style="font-size:12px;color:var(--text-sec);max-width:250px">${s.ai_summary || ''}</td>
        </tr>`;
    }).join('');

    document.getElementById('content').innerHTML = `
        ${infoBanner}${btnHtml}
        <div class="table-container"><table><thead><tr>
            <th style="width:40px">#</th>
            <th>Aktie</th>
            <th style="text-align:center;min-width:60px">AI Score</th>
            <th style="text-align:center">AI Signal</th>
            <th style="text-align:center">Meta Score</th>
            <th style="text-align:center">Enighet</th>
            <th style="text-align:center">Diff (AI-Meta)</th>
            <th>AI Sammanfattning</th>
        </tr></thead><tbody>${rows}</tbody></table></div>
        <div class="table-footer">AI Topplista — ${scores.length} aktier analyserade av Claude AI · ${analysisDate || 'ej analyserade'}</div>
    `;
}

function renderAgentTurn(h, idx) {
    if (h.role === 'user') {
        let txt = '';
        let imgHtml = '';
        if (Array.isArray(h.content)) {
            for (const c of h.content) {
                if (c.type === 'text') txt += c.text + '\n';
                if (c.type === 'image' && c.source?.data) {
                    imgHtml = `<img src="data:${c.source.media_type};base64,${c.source.data}" class="agent-msg-img"/>`;
                }
            }
        } else txt = h.content || '';
        return `<div class="agent-msg user">
            <div class="agent-msg-bubble">${imgHtml}${escapeHtml(txt).replace(/\n/g,'<br>')}</div>
            <div class="agent-avatar user">D</div>
        </div>`;
    } else {
        // assistant
        const isStreaming = h.streaming === true;
        const text = typeof h.content === 'string' ? h.content : '';
        const tools = h.tools || [];
        const usage = h.usage || {};

        const toolsHtml = tools.map(t => {
            const meta = TOOL_LABELS[t.name] || { icon: '⚙️', label: t.name };
            const cls = t.status === 'running' ? 'running' : '';
            return `<span class="agent-tool-pill ${cls}">${meta.icon} ${meta.label}</span>`;
        }).join('');

        const md = text ? formatAgentText(text) : (isStreaming ? '<span style="color:var(--text-muted)">Tänker...</span>' : '');

        let footer = '';
        const footParts = [];
        if (usage.cache_read_input_tokens > 0) footParts.push(`⚡ ${(usage.cache_read_input_tokens).toLocaleString('sv')} tokens från cache`);
        if (usage.output_tokens) footParts.push(`📤 ${usage.output_tokens} tokens svar`);
        if (footParts.length) footer = `<div class="agent-foot">${footParts.join(' · ')}</div>`;
        // v2.2 Gate 2 — visa förbjudna sentiment-mönster om upptäckta
        if (h.v22_violations && h.v22_violations.length) {
            const list = h.v22_violations.map(v => `<li><strong>${v.rule}:</strong> "${escapeHtml(v.sample)}"</li>`).join('');
            footer += `<div style="background:#fee2e2;color:#991b1b;border-radius:8px;padding:8px 12px;margin-top:8px;font-size:11px">
                <strong>🚫 v2.2 Sentiment-regelbrott upptäckt (${h.v22_violations.length}):</strong>
                <ul style="margin:4px 0 0 16px;padding:0">${list}</ul>
                <div style="margin-top:4px;font-size:10px;font-style:italic">Disclaimer-prefix räddar inte regeln. Slutsatsen ska INTE förlita sig på dessa källor.</div>
            </div>`;
        }

        return `<div class="agent-msg ai">
            <div class="agent-avatar ai">E</div>
            <div class="agent-msg-bubble ${isStreaming ? 'streaming' : ''}">
                <div class="agent-tools-container" style="${toolsHtml ? 'margin-bottom:8px' : ''}">${toolsHtml}</div>
                <div class="agent-md">${md}</div>
                ${footer}
            </div>
        </div>`;
    }
}

function escapeHtml(s) {
    return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatAgentText(s) {
    // Använd marked.js för full GFM-rendering med tabeller
    if (typeof marked !== 'undefined') {
        try {
            return marked.parse(String(s || ''));
        } catch (e) {
            console.warn('marked parse failed', e);
        }
    }
    // Fallback: enkel manuell markdown
    let t = escapeHtml(s);
    t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
    t = t.replace(/\n\n/g, '</p><p>');
    return '<p>' + t + '</p>';
}

function agentHandleImage(ev) {
    const f = ev.target.files?.[0];
    if (!f) return;
    if (f.size > 5 * 1024 * 1024) { alert('Max 5 MB'); return; }
    const fr = new FileReader();
    fr.onload = e => {
        const dataUrl = e.target.result;
        const idx = dataUrl.indexOf(',');
        _agentImage = {
            b64: dataUrl.slice(idx + 1),
            media_type: f.type || 'image/png',
            name: f.name,
        };
        renderAgent();
    };
    fr.readAsDataURL(f);
}

let _agentAbortController = null;

function agentCancel() {
    if (_agentAbortController) {
        _agentAbortController.abort();
        _agentAbortController = null;
    }
    _agentLoading = false;
    renderAgent();

async function agentSend() {
    const inp = document.getElementById('agentInput');
    const text = (inp?.value || '').trim();
    if (!text && !_agentImage) return;
    if (_agentLoading) return;

    const userContent = [];
    if (_agentImage) userContent.push({
        type: 'image',
        source: { type: 'base64', media_type: _agentImage.media_type, data: _agentImage.b64 },
    });
    if (text) userContent.push({ type: 'text', text });
    _agentHistory.push({ role: 'user', content: userContent });

    // Förbered streaming-bubbla för assistent
    const assistantTurn = { role: 'assistant', content: '', tools: [], usage: {}, streaming: true };
    _agentHistory.push(assistantTurn);

    const payload = {
        message: text,
        history: _agentHistory.slice(0, -2).map(h => ({  // utan senaste user+streaming-assistant
            role: h.role,
            content: h.content,
        })),
    };
    if (_agentImage) {
        payload.image_b64 = _agentImage.b64;
        payload.image_media_type = _agentImage.media_type;
    }

    _agentLoading = true;
    if (inp) inp.value = '';
    _agentImage = null;
    renderAgent();

    // ── Hitta strömmnings-bubblans MD-element en gång — sedan in-place mutation
    // Detta undviker hackandet från full re-render var 100ms. Browsers kan inte
    // hänga med när 5KB+ HTML byggs om kontinuerligt.
    const msgsEl = document.getElementById('agentMsgs');
    const lastMsg = msgsEl ? msgsEl.lastElementChild : null;
    const streamingMd = lastMsg ? lastMsg.querySelector('.agent-md') : null;
    const streamingBubble = lastMsg ? lastMsg.querySelector('.agent-msg-bubble') : null;
    const streamingToolsContainer = (() => {
        if (!streamingBubble) return null;
        let c = streamingBubble.querySelector('.agent-tools-container');
        if (!c) {
            c = document.createElement('div');
            c.className = 'agent-tools-container';
            c.style.marginBottom = '8px';
            streamingBubble.insertBefore(c, streamingBubble.firstChild);
        }
        return c;
    })();

    let scheduledRaf = null;
    function scheduleStreamRender() {
        if (scheduledRaf) return;
        scheduledRaf = requestAnimationFrame(() => {
            scheduledRaf = null;
            // 1) Markdown — bara skriv om om innehållet ändrats
            if (streamingMd && assistantTurn.content) {
                const newHtml = formatAgentText(assistantTurn.content);
                if (streamingMd.innerHTML !== newHtml) {
                    streamingMd.innerHTML = newHtml;
                }
            }
            // 2) Tool-pills
            if (streamingToolsContainer) {
                const html = (assistantTurn.tools || []).map(t => {
                    const meta = TOOL_LABELS[t.name] || { icon: '⚙️', label: t.name };
                    const cls = t.status === 'running' ? 'running' : '';
                    return `<span class="agent-tool-pill ${cls}">${meta.icon} ${meta.label}</span>`;
                }).join('');
                if (streamingToolsContainer.innerHTML !== html) {
                    streamingToolsContainer.innerHTML = html;
                }
            }
            // 3) Smart scroll: bara om vi är nära botten (annars stör vi läsaren som scrollat upp)
            if (msgsEl) {
                const distFromBottom = msgsEl.scrollHeight - (msgsEl.scrollTop + msgsEl.clientHeight);
                if (distFromBottom < 100) {
                    msgsEl.scrollTop = msgsEl.scrollHeight;
                }
            }
        });
    }

    _agentAbortController = new AbortController();
    try {
        const r = await fetch('/api/agent/chat/stream', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload),
            signal: _agentAbortController.signal,
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);

        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const events = buffer.split('\n\n');
            buffer = events.pop() || '';
            for (const ev of events) {
                if (!ev.startsWith('data:')) continue;
                let data;
                try { data = JSON.parse(ev.slice(5).trim()); } catch { continue; }
                handleAgentSSE(data, assistantTurn);
            }
            // Schemalagd in-place re-render i nästa animation frame
            scheduleStreamRender();
        }
    } catch (e) {
        if (e.name !== 'AbortError') {
            assistantTurn.content = (assistantTurn.content || '') + '\n\n⚠ Fel: ' + e.message;
        }
    } finally {
        if (scheduledRaf) { cancelAnimationFrame(scheduledRaf); scheduledRaf = null; }
        assistantTurn.streaming = false;
        _agentLoading = false;
        _agentAbortController = null;
        // Sista re-render gör full rebuild så footer/usage etc kommer in
        renderAgent();
    }
}

function handleAgentSSE(ev, turn) {
    if (!ev || !ev.type) return;
    switch (ev.type) {
        case 'v22_violation':
            // Visa varning post-stream om förbjudna sentiment-mönster hittades
            turn.v22_violations = ev.violations || [];
            break;
        case 'text_delta':
            turn.content = (turn.content || '') + (ev.text || '');
            break;
        case 'tool_use_start':
            turn.tools.push({ name: ev.name, status: 'running' });
            break;
        case 'tool_running':
            // Markera senaste matching tool som running
            for (let i = turn.tools.length - 1; i >= 0; i--) {
                if (turn.tools[i].name === ev.name && turn.tools[i].status === 'running') break;
            }
            break;
        case 'tool_result':
            // Markera senaste matching tool som klar
            for (let i = turn.tools.length - 1; i >= 0; i--) {
                if (turn.tools[i].name === ev.name) {
                    turn.tools[i].status = ev.is_error ? 'error' : 'done';
                    break;
                }
            }
            break;
        case 'usage':
            turn.usage = {
                input_tokens: ev.input_tokens,
                output_tokens: ev.output_tokens,
                cache_read_input_tokens: ev.cache_read_input_tokens,
                cache_creation_input_tokens: ev.cache_creation_input_tokens,
            };
            break;
        case 'done':
            turn.model = ev.model;
            break;
        case 'error':
            turn.content = (turn.content || '') + '\n\n⚠ ' + (ev.error || 'Okänt fel');
            break;
        case 'info':
            // Statusmeddelande, t.ex. modellbyte
            break;
    }
}

let _dashCache = null;
const _modelToplistCache = {};  // per-modell cache med TTL

async function loadModelTopN(modelKey, limit = 5, expandView = false) {
    const el = document.getElementById('mtl-list-' + modelKey);
    if (!el) return;

    const cacheKey = `${modelKey}|${limit}`;
    const cached = _modelToplistCache[cacheKey];
    if (cached && (Date.now() - cached._ts) < 5 * 60 * 1000) {
        renderModelToplistRows(el, cached.stocks, limit, expandView);
        return;
    }

    el.innerHTML = '<div class="mtl-skel">Laddar…</div>';
    try {
        const r = await fetch(`/api/model-toplist?model=${encodeURIComponent(modelKey)}&limit=${limit}`);
        const data = await r.json();
        _modelToplistCache[cacheKey] = {stocks: data.stocks || [], _ts: Date.now()};
        renderModelToplistRows(el, data.stocks || [], limit, expandView);
        // Cacha även för fetchAll så klick på aktie-namn går till drawer
        (data.stocks || []).forEach(s => { if (!_picksLookup[s.orderbook_id]) _picksLookup[s.orderbook_id] = s; });

        // Om första anropet var 5, visa "Visa topp 20"-knappen ändå
        if (limit === 5) {
            const btn = document.querySelector(`#mtl-${modelKey} .mtl-expand`);
            if (btn) btn.onclick = () => loadModelTopN(modelKey, 20, true);
        } else if (limit >= 20) {
            const btn = document.querySelector(`#mtl-${modelKey} .mtl-expand`);
            if (btn) { btn.textContent = 'Visa topp 5 ↑'; btn.onclick = () => loadModelTopN(modelKey, 5, false); }
        }
    } catch(e) {
        el.innerHTML = '<div class="mtl-err">Kunde inte ladda</div>';
    }
}

function renderModelToplistRows(el, stocks, limit, expandView) {
    if (!stocks.length) {
        el.innerHTML = '<div class="mtl-empty">Inga aktier matchar modellen just nu.</div>';
        return;
    }
    const visible = stocks.slice(0, limit);
    el.innerHTML = visible.map((s, i) => {
        const flag = FLAGS[s.country] || '';
        const sc = s.model_score;
        const scoreColor = sc >= 80 ? 'var(--green-dark)' : sc >= 65 ? 'var(--green)' : sc >= 50 ? '#92400e' : 'var(--text-muted)';
        const pe = s.pe_ratio != null ? `P/E ${s.pe_ratio.toFixed(1)}` : '';
        const dy = s.direct_yield != null && s.direct_yield > 0 ? `${(s.direct_yield*100).toFixed(1)}%` : '';
        const meta = [pe, dy].filter(Boolean).join(' · ');
        return `<div class="mtl-row" onclick='_openPickStock(${s.orderbook_id})'>
            <div class="mtl-rank">${i+1}</div>
            <div class="mtl-body">
                <div class="mtl-stock">${flag} ${s.name}</div>
                <div class="mtl-meta">${s.short_name||''}${meta?' · '+meta:''}</div>
            </div>
            <div class="mtl-score" style="color:${scoreColor}">${sc!=null?sc.toFixed(0):'–'}</div>
        </div>`;
    }).join('');
}

                    <span>Smart ${s.smart_score?.toFixed(0) ?? '–'}</span>
                </div>
            </div>`;
        }).join('');
        el.innerHTML = `
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">
                <strong>${setupMeta?.label}:</strong> ${setupMeta?.desc} · ${stocks.length} aktier matchar

async function loadBuyZoneWatchlist() {
    const el = document.getElementById('buyZoneWatchBanner');
    if (!el) return;
    try {
        const r = await fetch('/api/watchlist/near-buy-zone?limit=12&min_owners=200&min_composite=55&max_distance=10');
        const data = await r.json();
        const items = data.results || [];
        if (items.length === 0) {
            el.outerHTML = `<div class="daily-picks-empty">
                <div style="display:flex;align-items:center;gap:10px">
                    <span class="material-symbols-outlined" style="font-size:28px;color:#92400e">radar</span>
                    <div>
                        <div style="font-weight:700;color:#92400e">Inga aktier inom 10% från köpzon just nu</div>
                        <div style="font-size:12px;color:var(--text-muted)">Ingen övervakad aktie ligger tillräckligt nära sitt beräknade köpzonspris (där composite ≥ 75).</div>
                    </div>
                </div>
            </div>`;
            return;
        }
        items.forEach(p => { if (p.orderbook_id) _picksLookup[p.orderbook_id] = p; });
        const cards = items.map(p => {
            const bz = p.buy_zone || {};
            const flag = FLAGS[p.country] || '';
            const d1 = p.one_day_change_pct;
            const d1Str = d1 != null ? `<span class="${pctClass(d1)}" style="font-size:12px;font-weight:700">${fmtPct(d1)}</span>` : '';
            const inZone = bz.in_buy_zone;
            const urgency = p.buy_zone_urgency;
            const curPrice = bz.current_price != null ? bz.current_price.toFixed(2) : '–';
            const zonePrice = bz.buy_zone_price != null ? bz.buy_zone_price.toFixed(2) : '–';
            const dist = bz.distance_pct;

            let badgeColor = '#92400e', badgeText = 'Nära zon', badgeIcon = '⏳';
            if (inZone || urgency === 'in_zone') {
                badgeColor = '#166534'; badgeText = 'I KÖPZON'; badgeIcon = '🎯';
            } else if (urgency === 'crossed_today') {
                badgeColor = '#166534'; badgeText = 'KORSADE IDAG'; badgeIcon = '🎯';
            } else if (urgency === 'approaching_today') {
                badgeColor = '#c2410c'; badgeText = 'Faller mot zon'; badgeIcon = '⚡';
            }
            const distText = inZone
                ? `<span style="color:#166534;font-weight:700">Redan i köpzon</span>`
                : dist != null
                  ? `<span>Faller <b>${dist.toFixed(1)}%</b> → köpläge vid <b>${zonePrice} ${p.currency||''}</b></span>`
                  : '';
            const compScore = p.composite_score != null ? p.composite_score.toFixed(0) : '–';
            return `<div class="daily-pick-card" data-obid="${p.orderbook_id}" onclick='_openPickStock(${p.orderbook_id})' title="Klicka för analys">
                <div class="dp-row">
                    <div class="dp-rank" style="background:${badgeColor};color:#fff;min-width:48px;font-size:10px;line-height:1.1;padding:4px 6px;text-align:center;border-radius:6px">
                        <div style="font-size:16px">${badgeIcon}</div>
                        <div style="font-weight:800">${badgeText}</div>
                    </div>
                    <div class="dp-main">
                        <div class="dp-name">${flag} ${p.name}</div>
                        <div class="dp-meta">${p.short_name||''} · ${curPrice} ${p.currency||''} ${d1Str}</div>
                        <div class="dp-headline" style="font-size:12px;margin-top:4px">${distText}</div>
                    </div>
                    <div class="dp-score" style="color:${badgeColor}">
                        <div style="font-size:22px;font-weight:900;line-height:1">${compScore}</div>
                        <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;opacity:0.8">composite</div>
                    </div>
                </div>
            </div>`;
        }).join('');
        el.outerHTML = `<div class="daily-picks-banner" style="background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%)">
            <div class="dpb-hd">
                <span style="font-size:28px">🎯</span>
                <div>
                    <div class="dpb-title">Nära köpzon idag</div>
                    <div class="dpb-sub">Aktier där composite är nära 75 — om priset faller under <b>köpzon-priset</b> idag blir de köpläge. Bevaka intraday.</div>
                </div>
                <span class="dpb-live"><span class="live-dot" style="background:#c2410c"></span>BEVAKA</span>
            </div>

    } catch(e) {

    }
}

async function _openPickStock(orderbookId) {
    // Hämta FULL aktiedata via dedikerad endpoint (annars saknar drawer fundamentala nyckeltal)
    try {
        const r = await fetch(`/api/stock/${orderbookId}`);
        if (r.ok) {
            const s = await r.json();
            if (s && s.orderbook_id) {
                openDrawer(s);
                return;
            }
        }
    } catch(e) { console.warn('stock detail fetch failed', e); }
    // Fallback: slim data från cachen
    const s = _picksLookup[orderbookId];
    if (s) openDrawer(s);
}

async function showModelDetail(portfolioKey) {
    // Bygg overlay om den inte redan finns
    let ov = document.getElementById('modelDetailOverlay');
    if (!ov) {
        ov = document.createElement('div');
        ov.id = 'modelDetailOverlay';
        ov.className = 'model-detail-overlay';
        ov.innerHTML = `<div class="mdo-backdrop" onclick="closeModelDetail()"></div>
            <div class="mdo-panel">
                <div class="mdo-close" onclick="closeModelDetail()" title="Stäng">
                    <span class="material-symbols-outlined">close</span>
                </div>
                <div id="mdoBody" class="mdo-body">Laddar...</div>
            </div>`;
        document.body.appendChild(ov);
    }
    ov.classList.add('open');

    body.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted)"><span class="material-symbols-outlined" style="font-size:32px;animation:spin 1s linear infinite">progress_activity</span><div style="margin-top:8px">Laddar modelldetaljer...</div></div>';

function _renderModelDetail(el, d) {
    const fmtKr = n => (n||0).toLocaleString('sv-SE', {maximumFractionDigits:0}) + ' kr';
    const fmtPct = n => ((n||0)*100).toFixed(2) + '%';
    const rc = n => n >= 0 ? 'var(--green)' : 'var(--red)';
    const info = d.info || {};
    const retColor = rc(d.total_return_pct||0);

    // Reason formatter (för trades)
    const reasonLabels = {
        'INITIAL': 'Start', 'NEW_ENTRY': 'Ny signal', 'EXIT_DECEL': 'Exit decel',
        'EXIT_REVERSAL': 'Exit reversal', 'EXIT_WEEKLY': 'Exit vecka',
        'EXIT_INSIDER': 'Exit insider', 'EXIT_DISCOVERY': 'Exit discovery',
        'MF_ROTATION': 'MF rotation',
        'DSM_ROTATION': 'DSM rotation', 'ACE_ROTATION': 'ACE rotation',
        'META_ROTATION': 'Meta rotation', 'REBALANCE': 'Rebalans'
    };
    function fmtReason(raw) {
        if (!raw) return '';
        if (reasonLabels[raw]) return reasonLabels[raw];
        if (raw.indexOf(' · ') === -1) return raw;
        const parts = raw.split(' · ');
        const head = parts[0].replace(/^BOOKS_/,'').replace(/_/g,' ').toLowerCase();
        return `<b>${head}</b> <span style="color:var(--text-muted)">· ${parts.slice(1).join(' · ')}</span>`;
    }

    // Strategy-ruta — stödjer flerradiga regler (newlines → <br>) och extra bok-fält
    function _nl2br(s) {
        if (!s) return '—';
        return String(s).replace(/</g,'&lt;').replace(/\n/g,'<br>');
    }
    const bookSourceRow = info.book_source
        ? `<div class="mdo-strategy-row"><span class="mdo-k">📖 Bokkälla</span><span class="mdo-v" style="font-style:italic">${_nl2br(info.book_source)}</span></div>`
        : '';
    const cadenceRow = info.rebalance_cadence
        ? `<div class="mdo-strategy-row"><span class="mdo-k">🔁 Rebalans-kadens</span><span class="mdo-v"><b>${info.rebalance_cadence}</b></span></div>`
        : '';
    const strategyHtml = `<div class="mdo-strategy">
        <div class="mdo-strategy-row"><span class="mdo-k">Modellens plan</span><span class="mdo-v">${_nl2br(info.thesis)}</span></div>
        ${bookSourceRow}
        <div class="mdo-strategy-row"><span class="mdo-k">Målstorlek</span><span class="mdo-v">${info.target_size||'—'}</span></div>
        <div class="mdo-strategy-row"><span class="mdo-k">Universum</span><span class="mdo-v">${_nl2br(info.universe)}</span></div>
        <div class="mdo-strategy-row"><span class="mdo-k">Köpregel</span><span class="mdo-v">${_nl2br(info.entry_rule)}</span></div>
        <div class="mdo-strategy-row"><span class="mdo-k">Säljregel</span><span class="mdo-v">${_nl2br(info.exit_rule)}</span></div>
        <div class="mdo-strategy-row"><span class="mdo-k">Allokering</span><span class="mdo-v">${_nl2br(info.allocation)}</span></div>
        <div class="mdo-strategy-row"><span class="mdo-k">Tidshorisont</span><span class="mdo-v">${_nl2br(info.horizon)}</span></div>
        ${cadenceRow}
    </div>`;

    // Stats-grid
    const statsHtml = `<div class="mdo-stats">
        <div class="mdo-stat"><div class="mdo-stat-l">Startkapital</div><div class="mdo-stat-v">${fmtKr(d.start_capital)}</div></div>
        <div class="mdo-stat"><div class="mdo-stat-l">Nuvarande värde</div><div class="mdo-stat-v">${fmtKr((d.total_value||0)+(d.cash||0))}</div></div>
        <div class="mdo-stat"><div class="mdo-stat-l">Total avkastning</div><div class="mdo-stat-v" style="color:${retColor}">${fmtPct(d.total_return_pct)}</div></div>
        <div class="mdo-stat"><div class="mdo-stat-l">Realiserat P&amp;L</div><div class="mdo-stat-v" style="color:${rc(d.realized_pnl)}">${fmtKr(d.realized_pnl)}</div></div>
        <div class="mdo-stat"><div class="mdo-stat-l">Orealiserat</div><div class="mdo-stat-v" style="color:${rc(d.unrealized_pnl)}">${fmtKr(d.unrealized_pnl)}</div></div>
        <div class="mdo-stat"><div class="mdo-stat-l">Kassa</div><div class="mdo-stat-v">${fmtKr(d.cash)}</div></div>
        <div class="mdo-stat"><div class="mdo-stat-l">Antal aktier</div><div class="mdo-stat-v">${d.holdings_count||0}</div></div>
        <div class="mdo-stat"><div class="mdo-stat-l">Transaktioner</div><div class="mdo-stat-v">${d.trade_count||0}</div></div>
        <div class="mdo-stat"><div class="mdo-stat-l">Win-rate</div><div class="mdo-stat-v">${d.sell_count>0?(d.win_rate*100).toFixed(0)+'% ('+d.win_count+'/'+d.sell_count+')':'—'}</div></div>
        <div class="mdo-stat"><div class="mdo-stat-l">Dagar aktiv</div><div class="mdo-stat-v">${d.days_active||0}</div></div>
    </div>`;

    // Innehav
    const holdingsRows = (d.holdings||[]).map((h,i) => `
        <tr>
            <td>${i+1}</td>
            <td>${h.name}</td>
            <td style="text-align:right">${(h.entry_price||0).toFixed(2)}</td>
            <td style="text-align:right">${(h.current_price||0).toFixed(2)}</td>
            <td style="text-align:right;color:var(--text-sec)">${h.buy_date||''}</td>
            <td style="text-align:right;font-weight:700;color:${rc(h.return_pct)}">${fmtPct(h.return_pct)}</td>
        </tr>`).join('');
    const holdingsHtml = d.holdings&&d.holdings.length ? `
        <div class="mdo-table-wrap">
            <table class="mdo-table">
                <thead><tr><th>#</th><th>Aktie</th><th style="text-align:right">Köp</th><th style="text-align:right">Nu</th><th style="text-align:right">Köpdatum</th><th style="text-align:right">Avk %</th></tr></thead>
                <tbody>${holdingsRows}</tbody>
            </table>
        </div>` : '<div style="color:var(--text-muted);text-align:center;padding:24px">Inga aktier i portföljen.</div>';

    // Transaktioner
    const tradesRows = (d.trades||[]).map(t => {
        const isSell = t.trade_type === 'SELL';
        const typeColor = isSell ? 'var(--red)' : 'var(--green)';
        const typeBg = isSell ? 'var(--red-light)' : 'var(--green-light)';
        const gainStr = isSell && t.gain_pct!=null
            ? `<span style="color:${rc(t.gain_kr)};font-weight:700">${fmtPct(t.gain_pct)}</span>`
            : '<span style="color:var(--text-muted)">—</span>';
        const dateStr = t.trade_date ? t.trade_date.slice(5) : '';
        return `<tr>
            <td style="color:var(--text-sec)">${dateStr}</td>
            <td>${t.name}</td>
            <td><span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;background:${typeBg};color:${typeColor}">${isSell?'SÄLJ':'KÖP'}</span></td>
            <td style="text-align:right">${(t.price||0).toFixed(2)}</td>
            <td style="font-size:11px;color:var(--text-sec)">${fmtReason(t.reason)}</td>
            <td style="text-align:right">${gainStr}</td>
        </tr>`;
    }).join('');
    const tradesHtml = d.trades&&d.trades.length ? `
        <div class="mdo-table-wrap">
            <table class="mdo-table">
                <thead><tr><th>Datum</th><th>Aktie</th><th>Typ</th><th style="text-align:right">Pris</th><th>Anledning</th><th style="text-align:right">Avk %</th></tr></thead>
                <tbody>${tradesRows}</tbody>
            </table>
        </div>` : '<div style="color:var(--text-muted);text-align:center;padding:24px">Inga transaktioner ännu.</div>';

    el.innerHTML = `
        <div class="mdo-header">
            <div class="mdo-icon">${info.icon||'📊'}</div>
            <div class="mdo-title-wrap">
                <div class="mdo-title">${info.label||d.portfolio}</div>
                <div class="mdo-sub">${d.holdings_count||0} aktier · start ${d.start_date||'—'} · <span style="color:${retColor};font-weight:700">${fmtPct(d.total_return_pct)}</span> total</div>
            </div>
        </div>

        <h4 class="mdo-section-h">📋 Strategi &amp; plan</h4>
        ${strategyHtml}

        <h4 class="mdo-section-h">📈 Prestanda</h4>
        ${statsHtml}

        <h4 class="mdo-section-h">💼 Nuvarande innehav</h4>
        ${holdingsHtml}

        <h4 class="mdo-section-h">📝 Transaktioner med anledning</h4>
        ${tradesHtml}
    `;
}

let _macroHistData = null;
let _macroHistOpen = false;

async function toggleMacroHistory() {
    const panel = document.getElementById('macroHistPanel');
    const btn = document.getElementById('macroHistToggle');
    if (!panel) return;
    _macroHistOpen = !_macroHistOpen;
    if (!_macroHistOpen) {

        if (btn) btn.textContent = '📊 Visa historik';
        return;

    if (btn) btn.textContent = '✕ Dölj historik';

    try {
        if (!_macroHistData) {
            const r = await fetch('/api/macro/history?period_type=yearly&limit=100');
            _macroHistData = await r.json();
        }
