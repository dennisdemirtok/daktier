<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge Signals — DAKTIER</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Markdown rendering för AI Agent -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <style>
        :root {
            --green: #00C281;
            --green-light: rgba(0,194,129,0.08);
            --green-dark: #006c46;
            --red: #be0033;
            --red-light: rgba(190,0,51,0.08);
            --blue: #0035c7;
            --blue-light: rgba(0,53,199,0.08);
            --orange: #FF8A00;
            --orange-light: rgba(255,138,0,0.08);
            --purple: #7C3AED;
            --purple-light: rgba(124,58,237,0.08);
            --bg: #f8f9fa;
            --white: #ffffff;
            --text: #191c1d;
            --text-sec: #3c4a41;
            --text-muted: #6c7b70;
            --border: transparent;
            --border-light: transparent;
            --shadow: none;
            --shadow-hover: 0 12px 32px rgba(25,28,29,0.04);
            --radius: 12px;
            --surface-low: #f3f4f5;
            --surface-high: #e8e8e8;
            --sidebar-w: 240px;
            --header-h: 56px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }

        /* ── Header ──── */
        .header { background: rgba(255,255,255,0.82); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-bottom: none; padding: 0 32px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; right: 0; height: var(--header-h); z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { width: 34px; height: 34px; background: linear-gradient(135deg, var(--green-dark), var(--green)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 16px; }
        .header h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
        .header h1 span { color: var(--text-muted); font-weight: 400; font-size: 13px; margin-left: 2px; }
        .header-center { display: flex; align-items: center; gap: 16px; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .update-time { font-size: 12px; color: var(--text-muted); font-weight: 500; font-variant-numeric: tabular-nums; }
        .refresh-btn { background: linear-gradient(135deg, var(--green-dark), var(--green)); color: white; border: none; padding: 7px 18px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .refresh-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .header-icon-btn { background: none; border: none; padding: 6px; border-radius: 8px; cursor: pointer; color: var(--text-muted); transition: all 0.15s; display: flex; align-items: center; }
        .header-icon-btn:hover { background: var(--surface-low); color: var(--text); }

        /* ── Sidebar ──── */
        .sidebar { position: fixed; left: 0; top: var(--header-h); bottom: 0; width: var(--sidebar-w); background: var(--surface-low); display: flex; flex-direction: column; padding: 20px 12px; z-index: 90; overflow-y: auto; transition: transform 0.25s ease; }
        .sidebar-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--green); padding: 0 12px; margin-bottom: 8px; }
        .sidebar-sublabel { font-size: 10px; color: var(--text-muted); padding: 0 12px; margin-bottom: 16px; opacity: 0.7; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
        .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.15s; border: none; background: none; font-family: inherit; text-align: left; width: 100%; }
        .sidebar-item:hover { background: rgba(255,255,255,0.6); color: var(--text); transform: translateX(2px); }
        .sidebar-item.active { background: var(--white); color: var(--green-dark); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .sidebar-item .material-symbols-outlined { font-size: 20px; }
        .sidebar-divider { height: 1px; background: var(--surface-high); margin: 12px 8px; opacity: 0.5; }
        .sidebar-footer { margin-top: auto; padding: 16px 12px; }
        .sidebar-footer-card { background: rgba(0,108,70,0.06); border-radius: 12px; padding: 14px; }
        .sidebar-footer-label { font-size: 10px; font-weight: 700; color: var(--green-dark); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .sidebar-footer-btn { width: 100%; padding: 8px; background: linear-gradient(135deg, var(--green-dark), var(--green)); color: white; border: none; border-radius: 8px; font-size: 11px; font-weight: 700; font-family: inherit; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ── Layout ──── */
        .main-content { margin-left: var(--sidebar-w); padding-top: var(--header-h); min-height: 100vh; transition: margin-left 0.25s ease; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

        /* ── Summary ──── */
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .card { background: var(--white); border-radius: var(--radius); padding: 20px; transition: all 0.2s; }
        .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
        .card-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }
        .card-value { font-size: 28px; font-weight: 800; margin: 4px 0; letter-spacing: -0.5px; }
        .card-sub { font-size: 12px; color: var(--text-sec); }

        /* ── Tabs (inside content area) ──── */
        .tabs, .tab { display: none; }
        .page-header { display:flex; align-items:flex-end; justify-content:space-between; margin:4px 0 20px; gap:16px; flex-wrap:wrap; }
        .page-header-left { display:flex; flex-direction:column; gap:4px; }
        .page-title { font-size:26px; font-weight:700; letter-spacing:-0.02em; color:var(--text); margin:0; }
        .page-subtitle { font-size:13px; color:var(--text-muted); margin:0; font-weight:400; }

        /* ── Filter ──── */
        .filter-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; background: rgba(255,255,255,0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); padding: 10px 12px; border-radius: 14px; }
        .filter-group { display: inline-flex; align-items: center; gap: 4px; background: var(--surface-low); padding: 4px; border-radius: 10px; }
        .filter-group.tight { gap: 2px; }
        .filter-label { font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 0 6px 0 10px; white-space: nowrap; }
        .filter-divider { width: 1px; height: 20px; background: var(--surface-high); margin: 0 2px; opacity: 0.6; }
        .search-input { padding: 8px 14px 8px 34px; border: none; border-radius: 10px; font-family: inherit; font-size: 13px; width: 280px; outline: none; transition: all 0.2s; background: var(--surface-low) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236c7b70'><path d='M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19zM9.5 14A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14'/></svg>") no-repeat 10px center; background-size: 16px; color: var(--text); }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { background-color: var(--white); box-shadow: 0 0 0 2px rgba(0,194,129,0.18); }
        .filter-chip, .period-chip, .dir-chip, .signal-chip { padding: 6px 12px; border: none; border-radius: 7px; font-size: 11px; cursor: pointer; background: transparent; color: var(--text-sec); transition: all 0.15s; font-family: inherit; font-weight: 600; letter-spacing: 0.1px; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
        .filter-chip:hover, .period-chip:hover, .signal-chip:hover, .dir-chip:hover { background: rgba(255,255,255,0.7); color: var(--text); }
        .filter-chip.active { background: var(--green); color: white; box-shadow: 0 1px 2px rgba(0,108,70,0.2); }
        .period-chip.active { background: var(--blue); color: white; box-shadow: 0 1px 2px rgba(0,53,199,0.2); }
        .signal-chip.active { background: var(--purple); color: white; box-shadow: 0 1px 2px rgba(124,58,237,0.25); }
        .dir-chip.up { color: var(--green-dark); }
        .dir-chip.down { color: var(--red); }
        .dir-chip.active.up { background: var(--green); color: white; box-shadow: 0 1px 2px rgba(0,108,70,0.2); }
        .dir-chip.active.down { background: var(--red); color: white; box-shadow: 0 1px 2px rgba(190,0,51,0.2); }
        .min-owners-select { padding: 7px 28px 7px 12px; border: none; border-radius: 10px; font-size: 11px; font-family: inherit; color: var(--text-sec); background: var(--surface-low) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236c7b70'><path d='M7 10l5 5 5-5z'/></svg>") no-repeat right 6px center; background-size: 14px; cursor: pointer; font-weight: 600; appearance: none; -webkit-appearance: none; -moz-appearance: none; outline: none; transition: all 0.15s; }
        .min-owners-select:hover { background-color: var(--surface-high); color: var(--text); }
        .min-owners-select:focus { box-shadow: 0 0 0 2px rgba(0,194,129,0.18); background-color: var(--white); }
        .filter-count { font-size: 10px; color: var(--text-muted); font-weight: 600; margin-left: auto; padding: 0 8px; font-variant-numeric: tabular-nums; }
        .filter-reset { background: none; border: none; color: var(--text-muted); font-size: 11px; font-family: inherit; font-weight: 600; cursor: pointer; padding: 6px 10px; border-radius: 8px; transition: all 0.15s; display: inline-flex; align-items: center; gap: 4px; }
        .filter-reset:hover { background: var(--red-light); color: var(--red); }
        .filter-reset .material-symbols-outlined { font-size: 14px; }

        /* ── Live indicator ──── */
        .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #E65100; display: inline-block; box-shadow: 0 0 0 0 rgba(230,81,0,0.6); animation: live-pulse 1.6s ease-out infinite; }
        @keyframes live-pulse { 0% { box-shadow: 0 0 0 0 rgba(230,81,0,0.55);} 70% { box-shadow: 0 0 0 8px rgba(230,81,0,0);} 100% { box-shadow: 0 0 0 0 rgba(230,81,0,0);} }

        /* ── Model Verdict cards (Bokmodeller i drawer) ──── */
        .mv-stack { display: flex; flex-direction: column; gap: 6px; }
        .model-verdict { background: var(--bg); border-radius: 10px; padding: 10px 12px; border-left: 3px solid var(--surface-high); }
        .model-verdict.v-pass { border-left-color: var(--green); background: rgba(0,194,129,0.04); }
        .model-verdict.v-warn { border-left-color: #f59e0b; background: rgba(245,158,11,0.05); }
        .model-verdict.v-fail { border-left-color: var(--red); background: rgba(190,0,51,0.03); }
        .mv-head { display: flex; align-items: center; gap: 10px; }
        .mv-icon { font-size: 18px; flex-shrink: 0; }
        .mv-title-wrap { flex: 1; min-width: 0; }
        .mv-title { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.2; }
        .mv-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; line-height: 1.2; }
        .mv-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 5px; white-space: nowrap; background: var(--white); flex-shrink: 0; }
        .v-pass .mv-badge { color: var(--green-dark); }
        .v-warn .mv-badge { color: #92400e; }
        .v-fail .mv-badge { color: var(--red); }
        .mv-metric { font-size: 11px; color: var(--text-sec); margin-top: 6px; padding-left: 28px; font-variant-numeric: tabular-nums; }
        .mv-meter { height: 4px; background: rgba(0,0,0,0.06); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .mv-meter-fill { height: 100%; transition: width 0.4s ease; }

        /* ── Table ──── */
        .table-container { background: var(--white); border-radius: var(--radius); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead { position: relative; z-index: 2; }
        th { padding: 14px 14px; text-align: left; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: none; cursor: pointer; user-select: none; background: var(--surface-low); white-space: nowrap; }
        th:first-child { border-radius: var(--radius) 0 0 0; }
        th:last-child { border-radius: 0 var(--radius) 0 0; }
        th:hover { color: var(--text); }
        th.sorted { color: var(--green-dark); }
        td { padding: 12px 14px; border-bottom: none; font-size: 13px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(0,0,0,0.015); }
        tbody tr { transition: background 0.1s; }
        .stock-name { font-weight: 600; color: var(--text); cursor: pointer; transition: color 0.15s; }
        .stock-name:hover { color: var(--green-dark); }
        .stock-ticker { font-size: 10px; color: var(--text-muted); }

        /* ── Numbers ──── */
        .num-pos { color: var(--green-dark); font-weight: 600; }
        .num-neg { color: var(--red); font-weight: 600; }
        .num-zero { color: var(--text-muted); }

        /* ── Badges ──── */
        .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
        .badge-buy { background: rgba(0,194,129,0.12); color: var(--green-dark); }
        .badge-sell { background: rgba(190,0,51,0.12); color: var(--red); }
        .badge-strong-buy { background: var(--green-dark); color: white; }
        .badge-strong-sell { background: var(--red); color: white; }
        .badge-hold { background: var(--surface-low); color: var(--text-muted); }

        /* ── Score Bar ──── */
        .score-bar { width: 80px; height: 6px; background: var(--surface-high); border-radius: 3px; display: inline-block; vertical-align: middle; position: relative; overflow: hidden; }
        .score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .score-value { font-weight: 700; font-size: 14px; min-width: 36px; display: inline-block; }

        /* ── Bar ──── */
        .bar-wrap { width: 70px; height: 6px; background: var(--surface-high); border-radius: 3px; display: inline-block; vertical-align: middle; }
        .bar-fill { height: 100%; border-radius: 3px; }

        /* ── Component Mini Bars ──── */
        .comp-bars { display: flex; gap: 3px; align-items: center; }
        .comp-bar { width: 28px; height: 14px; background: var(--surface-low); border-radius: 3px; position: relative; overflow: hidden; cursor: help; }
        .comp-bar-fill { height: 100%; border-radius: 3px; }
        .comp-label { font-size: 9px; color: var(--text-muted); text-align: center; line-height: 1; margin-top: 1px; }

        /* ── Tooltip ──── */
        .tooltip-wrap { position: relative; }
        .tooltip-wrap:hover .tooltip { display: block; }
        .tooltip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 6px 10px; border-radius: 6px; font-size: 11px; white-space: nowrap; z-index: 10; margin-bottom: 4px; }
        .tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 4px solid transparent; border-top-color: var(--text); }

        /* ── Loading ──── */
        .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; }
        .loading-spinner { width: 28px; height: 28px; border: 3px solid var(--surface-high); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }

        /* ── Dashboard page ─────────────────────────────── */
        .dash-grid { display: flex; flex-direction: column; gap: 28px; }
        .dash-section { }
        .dash-heading { font-size: 14px; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 14px; }
        .dash-heading .dash-sub { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text-muted); font-size: 12px; margin-left: 8px; }
        .dash-top-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        @media (max-width: 900px) { .dash-top-stats { grid-template-columns: repeat(2, 1fr); } }
        .stat-tile { background: var(--white); border-radius: 12px; padding: 18px 18px; display: flex; flex-direction: column; gap: 6px; position: relative; transition: transform 0.15s; }
        .stat-tile:hover { transform: translateY(-2px); }
        .stat-icon { position: absolute; top: 14px; right: 14px; color: var(--green); opacity: 0.85; }
        .stat-icon .material-symbols-outlined { font-size: 22px; }
        .stat-val { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
        .stat-lbl { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .stat-skel { height: 82px; background: linear-gradient(90deg, var(--surface-low) 0%, var(--surface-high) 50%, var(--surface-low) 100%); background-size: 200% 100%; border-radius: 12px; animation: skeleton 1.2s infinite; }
        @keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .dash-macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        @media (max-width: 1100px) { .dash-macro-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 700px) { .dash-macro-grid { grid-template-columns: 1fr; } }
        .macro-card { background: var(--white); border-radius: 12px; padding: 16px 18px; display: flex; flex-direction: column; gap: 4px; }
        .macro-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
        .macro-label .macro-hint { text-transform: none; letter-spacing: 0; font-weight: 400; color: var(--text-sec); margin-left: 6px; }
        .macro-value { font-size: 30px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; line-height: 1.1; margin-top: 4px; }
        .macro-zone { font-size: 13px; font-weight: 600; margin-top: 2px; }
        .macro-note { font-size: 11px; color: var(--text-sec); margin-top: 6px; line-height: 1.4; }

        .dash-model-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        @media (max-width: 1100px) { .dash-model-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 700px) { .dash-model-grid { grid-template-columns: 1fr; } }
        .model-card { background: var(--white); border-radius: 12px; padding: 14px 16px; }
        .model-card-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .model-badge { color: white; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; letter-spacing: 0.03em; }
        .model-name { font-size: 13px; font-weight: 600; color: var(--text); }
        .model-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
        .model-verdict { font-size: 13px; font-weight: 600; margin-top: 6px; }

        .today-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        @media (max-width: 900px) { .today-grid { grid-template-columns: repeat(2, 1fr); } }
        .today-box { background: var(--white); border-radius: 12px; padding: 14px 16px; }
        .today-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 4px; }
        .today-val { font-size: 14px; font-weight: 600; }

        /* ── Dagens köp-banner ──── */
        .daily-picks-skel { background: linear-gradient(90deg, #f5f3ff 0%, #ede9fe 50%, #f5f3ff 100%); background-size: 200% 100%; animation: skeleton 1.2s infinite; border-radius: 16px; padding: 28px; color: var(--text-muted); font-size: 13px; text-align: center; }
        .daily-picks-empty { background: linear-gradient(135deg, #fffbeb, #fef3c7); border-radius: 16px; padding: 18px 22px; }
        .daily-picks-banner { background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%); border-radius: 16px; padding: 18px 22px; box-shadow: 0 8px 24px rgba(0,108,70,0.06); }
        .dpb-hd { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .dpb-title { font-size: 16px; font-weight: 800; color: var(--green-dark); letter-spacing: -0.01em; }
        .dpb-sub { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
        .dpb-live { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 800; letter-spacing: 1px; color: var(--green-dark); background: rgba(255,255,255,0.7); padding: 5px 10px; border-radius: 20px; }
        .daily-picks-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 12px; }
        .daily-pick-card { background: var(--white); border-radius: 12px; padding: 12px 14px; transition: all 0.15s; border-left: 3px solid var(--green); }
        .daily-pick-card:hover { box-shadow: 0 6px 18px rgba(0,108,70,0.1); }
        .dp-row { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .dp-rank { font-size: 20px; font-weight: 900; flex-shrink: 0; width: 28px; text-align: center; }
        .dp-main { flex: 1; min-width: 0; }
        .dp-name { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .sim-ranking-row { display: grid; grid-template-columns: 28px 1fr auto; align-items: center; padding: 8px 0; gap: 10px; border-bottom: 1px solid var(--surface-low); font-size: 13px; }

        .sim-holdings-head { display: flex; align-items: center; justify-content: space-between; margin: 28px 0 10px; gap: 12px; flex-wrap: wrap; }

        /* ── Upload Zone ──── */

        .upload-zone:hover, .upload-zone.dragover { border-color: var(--orange); background: var(--orange-light); }
        .upload-zone-icon { font-size: 48px; margin-bottom: 12px; }
        .upload-zone-text { font-size: 14px; color: var(--text-sec); }
        .upload-preview { max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 12px; }

        /* ── AI Score Gauge ──── */
        .ai-gauge { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .ai-gauge-inner { width: 34px; height: 34px; border-radius: 50%; background: var(--white); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; }

        /* ── Owner Maturity Badge ──── */
        .maturity-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
        .maturity-badge.mogen { background: #dcfce7; color: #166534; }
        .maturity-badge.vaxande { background: #fef9c3; color: #854d0e; }
        .maturity-badge.omogen { background: #f3f4f6; color: #6b7280; }
        .maturity-sparkline { display: inline-block; vertical-align: middle; }
        .maturity-sparkline svg { display: block; }
        .drawer-maturity { background: linear-gradient(135deg, #f0fdf4, #ecfccb); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .drawer-maturity-score { font-size: 32px; font-weight: 900; color: #166534; }
        .drawer-maturity-label { font-size: 13px; font-weight: 700; color: #15803d; text-transform: uppercase; letter-spacing: 1px; }
        .consistency-bar { height: 8px; border-radius: 4px; background: #e5e7eb; overflow: hidden; margin-top: 4px; }
        .consistency-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #22c55e, #16a34a); }

        /* ── Mobile ──── */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .mobile-menu-btn { display: flex !important; }
        }
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .cards { grid-template-columns: 1fr 1fr; }
            .search-input { width: 100%; }
            .drawer { width:100vw;max-width:100vw; }

        .mobile-menu-btn:hover { background: var(--surface-low); }
    </style>
</head>

<script>
// ── State ──────────────────────────────────────────────
let currentTab = 'dashboard';
let searchQuery = '';
let countryFilter = '';
let sortCol = 'meta';
let sortOrder = 'desc';
let trendPeriod = '1m';
let trendDirection = 'up';
let minOwners = 0;
let insiderType = '';
let signalFilter = '';
let setupFilter = '';  // v2 setup-typ-filter (trifecta/quality_full_price/...)
let signalCountry = 'SE';
let actionFilter = '';
let hotLookback = 1;
let hotDirection = 'up';
let hotCountry = '';
let hotMode = 'daily';  // 'daily' = snapshot-mot-snapshot (live-läget borttaget — vi uppdaterar inte löpande)
let hotDateFrom = '';
let hotDateTo = '';
// Unified momentum period: 1d/3d/1w → hot-movers API, 1m/3m/ytd/1y → trending API
let momPeriod = '1d';

// Pagination
let currentOffset = 0;
const PAGE_SIZE = 50;
let totalResults = 0;
let isLoadingMore = false;
let allLoadedRows = [];

// Stats cache
let statsData = null;

// ── Tab data cache (instant tab switching) ──────────────
const _tabCache = {};
const CACHE_TTL = 120000; // 2 minutes
function cacheKey(tab, params) { return tab + '|' + JSON.stringify(params); }
function getCached(key) {
    const c = _tabCache[key];
    if (c && (Date.now() - c.ts) < CACHE_TTL) return c.data;
    return null;
}
function setCache(key, data) { _tabCache[key] = {data, ts: Date.now()}; }
function invalidateTab(tab) {
    Object.keys(_tabCache).forEach(k => { if (k.startsWith(tab + '|')) delete _tabCache[k]; });
}

const FLAGS = {SE:'🇸🇪',US:'🇺🇸',NO:'🇳🇴',DK:'🇩🇰',FI:'🇫🇮',DE:'🇩🇪',FR:'🇫🇷',GB:'🇬🇧',NL:'🇳🇱',IT:'🇮🇹',CH:'🇨🇭',CA:'🇨🇦',JP:'🇯🇵',BE:'🇧🇪',ES:'🇪🇸',PT:'🇵🇹',AT:'🇦🇹',IE:'🇮🇪',HK:'🇭🇰',SG:'🇸🇬'};

// ── Fetch ──────────────────────────────────────────────

// ── Live Clock & Market Hours ──────────────────────────
function getCETTime() {
    return new Date(new Date().toLocaleString('en-US', {timeZone: 'Europe/Stockholm'}));
}
function getETTime() {
    return new Date(new Date().toLocaleString('en-US', {timeZone: 'America/New_York'}));
}
function isSEMarketOpen() {
    const now = getCETTime();
    if (now.getDay() === 0 || now.getDay() === 6) return false;
    const h = now.getHours(), m = now.getMinutes();
    const mins = h * 60 + m;
    return mins >= 540 && mins <= 1050; // 9:00 - 17:30 CET
}
function isUSMarketOpen() {
    const now = getETTime();
    if (now.getDay() === 0 || now.getDay() === 6) return false;
    const h = now.getHours(), m = now.getMinutes();
    const mins = h * 60 + m;
    return mins >= 570 && mins <= 960; // 9:30 - 16:00 ET
}
function isAnyMarketOpen() { return isSEMarketOpen() || isUSMarketOpen(); }

function updateClock() {
    const now = getCETTime();
    const time = now.toLocaleTimeString('sv-SE', {hour:'2-digit', minute:'2-digit'});
    const date = now.toLocaleDateString('sv-SE', {day:'numeric', month:'short'});
    document.getElementById('liveClock').textContent = time + ' ' + date;
}

function updateMarketIndicators() {
    const seOpen = isSEMarketOpen();
    const usOpen = isUSMarketOpen();

    const seStatus = document.getElementById('marketStatusSE');
    const seDot = document.getElementById('marketDotSE');
    const seLabel = document.getElementById('marketLabelSE');
    seStatus.className = 'market-status ' + (seOpen ? 'open' : 'closed');
    seDot.className = 'market-dot ' + (seOpen ? 'open' : 'closed');
    seLabel.textContent = 'SE: ' + (seOpen ? 'Öppen' : 'Stängd');

    const usStatus = document.getElementById('marketStatusUS');
    const usDot = document.getElementById('marketDotUS');
    const usLabel = document.getElementById('marketLabelUS');
    usStatus.className = 'market-status ' + (usOpen ? 'open' : 'closed');
    usDot.className = 'market-dot ' + (usOpen ? 'open' : 'closed');
    usLabel.textContent = 'US: ' + (usOpen ? 'Öppen' : 'Stängd');
}

// Update clock every second, market status every 30s
setInterval(updateClock, 1000);
setInterval(updateMarketIndicators, 30000);
updateClock();
updateMarketIndicators();

async function fetchStatus() {
    try {
        const r = await fetch('/api/status');
        statsData = await r.json();
        renderCards();
    } catch(e) { console.error('Status fetch error:', e); }
}

async function fetchData(append = false) {
    if (isLoadingMore) return;
    if (!append) {
        currentOffset = 0;
        allLoadedRows = [];
    }

    isLoadingMore = true;
    if (append) showLoadMore();

    try {
        let data, url, params, ck, cached, renderFn, dataKey;

        if (currentTab === 'signals') {
            params = {country:signalCountry, sort:sortCol||'smart', order:sortOrder, limit:PAGE_SIZE, offset:currentOffset, min_owners:minOwners||10, signal:signalFilter, action:actionFilter, setup:setupFilter};
            url = '/api/signals?' + new URLSearchParams(params);
            ck = cacheKey('signals', params);
            dataKey = 'signals';
            renderFn = renderSignalsTable;
        } else if (currentTab === 'stocks') {
            params = {q:searchQuery, country:countryFilter, sort:sortCol, order:sortOrder, limit:PAGE_SIZE, offset:currentOffset, min_owners:minOwners};
            url = '/api/stocks?' + new URLSearchParams(params);
            ck = cacheKey('stocks', params);
            dataKey = 'stocks';
            renderFn = renderStocksTable;
        } else if (currentTab === 'hotmovers') {
            // Routing: kort sikt via /api/hot-movers (snapshots), lång via /api/trending (pre-computed)
            const shortPeriods = {live:{mode:'live',lookback:1}, '1d':{mode:'daily',lookback:1}, '3d':{mode:'daily',lookback:3}, '1w':{mode:'daily',lookback:5}};
            const longPeriodMap = {'1m':'1m', '3m':'3m', 'ytd':'ytd', '1y':'1y'};
            if (shortPeriods[momPeriod]) {
                const cfg = shortPeriods[momPeriod];
                params = {mode:cfg.mode, direction:hotDirection, lookback:cfg.lookback, limit:PAGE_SIZE, offset:currentOffset, min_owners:minOwners||100, country:hotCountry};
                url = '/api/hot-movers?' + new URLSearchParams(params);
                ck = cacheKey('hotmovers_short', params);
                dataKey = 'stocks';
                renderFn = () => { hotDateFrom = data.date_from; hotDateTo = data.date_to; renderHotMoversTable(); };
            } else {
                params = {period: longPeriodMap[momPeriod] || '1m', direction:hotDirection, limit:PAGE_SIZE, offset:currentOffset, min_owners:minOwners||100};
                url = '/api/trending?' + new URLSearchParams(params);
                ck = cacheKey('hotmovers_long', params);
                dataKey = 'stocks';
                renderFn = renderTrendingTable;
            }
        } else if (currentTab === 'insiders') {
            params = {q:searchQuery, type:insiderType, limit:PAGE_SIZE, offset:currentOffset};
            url = '/api/insiders?' + new URLSearchParams(params);
            ck = cacheKey('insiders', params);
            dataKey = 'transactions';
            renderFn = renderInsidersTable;
        } else if (currentTab === 'ocf') {
            params = {q:searchQuery, country:countryFilter||'SE', sort:sortCol, order:sortOrder, limit:PAGE_SIZE, offset:currentOffset, min_owners:minOwners||100};
            url = '/api/stocks?' + new URLSearchParams(params);
            ck = cacheKey('ocf', params);
            dataKey = 'stocks';
            renderFn = renderOcfTable;
        } else if (currentTab === 'portfolio') {
            const simCk = cacheKey('portfolio', {});
            cached = getCached(simCk);
            const simData = cached || await (await fetch('/api/simulation')).json();
            if (!cached) setCache(simCk, simData);
            if (simData.active) {
                renderSimulation(simData);
            } else {
                const pCk = cacheKey('portfolio_start', {});
                const pCached = getCached(pCk);
                data = pCached || await (await fetch('/api/portfolio')).json();
                if (!pCached) setCache(pCk, data);
                renderPortfolio(data);
                const startCard = `<div style="background:linear-gradient(135deg,#e6f9f1,#e8eeff);border-radius:var(--radius);padding:24px;margin-bottom:20px;text-align:center;box-shadow:var(--shadow)">
                    <div style="font-size:28px;margin-bottom:8px">🚀</div>
                    <div style="font-size:18px;font-weight:700;margin-bottom:8px">Starta portföljsimulering</div>
                    <div style="color:var(--text-sec);margin-bottom:16px">
                        Lås in dagens aktier med <strong>1 000 000 kr</strong> per portfölj.<br>
                        Likaviktad allokering. Avkastning mäts framåt från idag.
                    </div>
                    <button onclick="startSimulation()" style="background:var(--green);color:white;border:none;padding:12px 32px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s">
                        Starta simulering
                    </button>
                </div>`;
                document.getElementById('content').insertAdjacentHTML('afterbegin', startCard);
            }
            return;
        } else if (currentTab === 'myportfolio') {
            renderMyPortfolio();
            return;
        } else if (currentTab === 'aitoplist') {
            await fetchAIToplist();
            return;
        } else if (currentTab === 'agent') {
            renderAgent();
            return;
        }

        // Generic cached fetch for table tabs
        if (url) {
            cached = getCached(ck);
            data = cached || await (await fetch(url)).json();
            if (!cached) setCache(ck, data);
            totalResults = data.total;
            allLoadedRows = allLoadedRows.concat(data[dataKey] || []);
            if (currentTab === 'hotmovers') { hotDateFrom = data.date_from; hotDateTo = data.date_to; }
            renderFn();
        }
    } catch(e) {
        document.getElementById('content').innerHTML =
            `<div class="loading-wrap"><p style="color:var(--red)">Fel: ${e.message}</p></div>`;
    } finally {
        isLoadingMore = false;
    }
}

async function doRefreshPrices() {
    const btn = document.getElementById('refreshPricesBtn');
    btn.disabled = true; btn.textContent = 'Uppdaterar...';
    await fetch('/api/refresh-prices', {method:'POST'});

    const poll = setInterval(async () => {
        const st = await (await fetch('/api/status')).json();
        btn.textContent = st.progress || 'Uppdaterar...';
        if (!st.loading) {
            clearInterval(poll);
            btn.disabled = false;
            btn.textContent = 'Uppdatera priser';
            await fetchStatus();
            await fetchData();
        }
    }, 2000);
}

async function doRefreshInsiders() {
    const btn = document.getElementById('refreshInsidersBtn');
    btn.disabled = true; btn.textContent = 'Laddar...';
    await fetch('/api/refresh-insiders', {method:'POST'});

    const poll = setInterval(async () => {
        const st = await (await fetch('/api/status')).json();
        btn.textContent = st.progress || 'Laddar...';
        if (!st.loading) {
            clearInterval(poll);
            btn.disabled = false;
            btn.textContent = 'Insiders';
            await fetchStatus();
            await fetchData();
        }
    }, 3000);
}

// ── Render Cards ──────────────────────────────────────

function renderCards() {
    // Stat-stripen i toppen är permanent dold — dashboarden har sin egen
    // "Marknadsöversikt"-sektion som visar samma data, och på övriga flikar
    // är det bara visuellt brus som tar utrymme från huvudinnehållet.
    const cardsEl = document.getElementById('cards');
    if (cardsEl) {
        cardsEl.style.display = 'none';
        cardsEl.innerHTML = '';
    }
}

// Ska köras varje gång man byter tabb — så kort-synligheten uppdateras
function updateCardsVisibility() {
    if (statsData) renderCards();
}

// ── Filter Bar ──────────────────────────────────────

function _ownersSelect(options) {
    let o = '';
    options.forEach(v => {
        const lbl = v === 0 ? 'Alla ägare' : v.toLocaleString('sv') + '+ ägare';
        o += `<option value="${v}" ${minOwners==v?'selected':''}>${lbl}</option>`;
    });
    return `<select class="min-owners-select" onchange="setMinOwners(this.value)" title="Minsta antal Avanza-ägare">${o}</select>`;
}
function _group(label, inner, tight) {
    return `<div class="filter-group${tight?' tight':''}">${label?`<span class="filter-label">${label}</span>`:''}${inner}</div>`;
}
function _chips(items, activeVal, cls, handler) {
    return items.map(it => `<button class="${cls} ${activeVal===it.v?'active':''}" onclick="${handler}('${it.v}')">${it.l}</button>`).join('');
}
function _hasActiveFilters() {
    if (currentTab === 'signals') return actionFilter || signalFilter || setupFilter || signalCountry !== 'SE' || minOwners > 10;
    if (currentTab === 'stocks') return searchQuery || countryFilter || minOwners > 0;
    if (currentTab === 'hotmovers') return momPeriod !== '1d' || hotDirection !== 'up' || hotCountry || minOwners > 100;
    if (currentTab === 'insiders') return searchQuery || insiderType;
    if (currentTab === 'ocf') return searchQuery || (countryFilter && countryFilter !== 'SE') || minOwners > 100;
    return false;
}
function resetFilters() {
    searchQuery = '';
    if (currentTab === 'signals') { actionFilter=''; signalFilter=''; setupFilter=''; signalCountry='SE'; minOwners=10; }
    else if (currentTab === 'stocks') { countryFilter=''; minOwners=0; }
    else if (currentTab === 'hotmovers') { momPeriod='1d'; hotDirection='up'; hotCountry=''; minOwners=100; }
    else if (currentTab === 'insiders') { insiderType=''; }
    else if (currentTab === 'ocf') { countryFilter='SE'; minOwners=100; }
    fetchData();
    renderFilterBar();
}

function renderFilterBar() {
    let html = '';
    const FLAG = {SE:'🇸🇪', US:'🇺🇸', NO:'🇳🇴', DK:'🇩🇰', FI:'🇫🇮', DE:'🇩🇪', CA:'🇨🇦', FR:'🇫🇷', GB:'🇬🇧'};

    if (currentTab === 'signals') {
        // v2 Setup-filter — högst upp, det är den viktigaste signalen

// NOTE: Live-läge borttaget — vi uppdaterar inte owner-snapshots löpande, så auto-refresh-timer avvecklad.

function switchTab(tab, el) {
    // Backwards-compat: "trending" är numera merged med "hotmovers" under Ägarmomentum
    if (tab === 'trending') { tab = 'hotmovers'; momPeriod = '1m'; }
    currentTab = tab;
    // Update sidebar
    document.querySelectorAll('.sidebar-item').forEach(s => {
        s.classList.toggle('active', s.dataset.tab === tab);
    });
    // Dölj/visa stat-kort beroende på tabb (dashboard/trending/hotmovers har egna motsv. stats)
    updateCardsVisibility();
    // Update page header title/subtitle
    const meta = TAB_META[tab] || { title: tab, sub: '' };
    const t = document.getElementById('pageTitle'); if (t) t.textContent = meta.title;
    const s = document.getElementById('pageSubtitle'); if (s) s.textContent = meta.sub;

    searchQuery = '';

    if (tab === 'signals') { sortCol = 'smart'; sortOrder = 'desc'; }
    else if (tab === 'stocks') { sortCol = 'owners'; sortOrder = 'desc'; }
    else if (tab === 'hotmovers') {
        // Short periods sorterar på hot_diff_pct, long periods på change-kolumn
        sortCol = (['1d','3d','1w'].includes(momPeriod)) ? 'hot_diff_pct' : 'change_1m';
        sortOrder = 'desc';
    }
    else if (tab === 'ocf') { sortCol = 'ocf'; sortOrder = 'desc'; }
    else { sortCol = 'date'; sortOrder = 'desc'; }

    // Client-side only tabs (no API fetch)
    if (tab === 'dashboard') { renderFilterBar(); renderDashboard(); return; }
    if (tab === 'metrics')   { renderFilterBar(); renderMetricsTool(); return; }

    renderFilterBar();
    // Visa loading-spinner direkt så att gamla flikens content inte ligger kvar
    // medan fetchData() väntar på servern eller cachen.
    const _content = document.getElementById('content');
    if (_content) _content.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
    fetchData();
}

function sidebarNav(tab, el) {
    switchTab(tab);
    // Close sidebar on mobile

        document.getElementById('sidebar').classList.remove('open');

}

function maturityBadge(stock) {
    // Discovery signal — Backtest v5 Global: CAGR +12.5%, 64% win, 7/8 profitabla år
    const disc = stock.discovery_score || (stock.components && stock.components.discovery) || 0;
    const owners = stock.number_of_owners || 0;

    // 500-2k: Primär discovery zone
    if (disc >= 70 && owners < 2000) return `<span class="maturity-badge" style="background:#fef3c7;color:#92400e" title="Discovery: ${disc}\nv5 Global: 64% win, CAGR +12.5%\nvel5-20% + cons≥75% + lönsam + P/E<40">🔥 Discovery</span>`;
    if (disc >= 50 && owners < 2000) return `<span class="maturity-badge" style="background:#dbeafe;color:#1e40af" title="Discovery: ${disc}\nSaknar ett kvalitetskriterium">⚡ Discovery</span>`;

    // 2k-10k: Growth Zone ("Nvidia-case")
    if (disc >= 50 && owners >= 2000 && owners < 10000) return `<span class="maturity-badge" style="background:#e0e7ff;color:#3730a3" title="Growth Zone: ${disc}\nCAGR ~8.5%, 56% win">🚀 Growth</span>`;

    // Fallback till mognad-badge för 5000+
    const score = stock.maturity_score || (stock.components && stock.components.owner_maturity) || 0;
    if (score >= 70) return `<span class="maturity-badge mogen" title="Mognad: ${score}">🟢 Mogen</span>`;
    if (score >= 50) return `<span class="maturity-badge vaxande" title="Mognad: ${score}">🟡 Växande</span>`;
    if (score >= 30) return `<span class="maturity-badge omogen" title="Mognad: ${score}">⚪ Omogen</span>`;

    // Tidig tillväxt
    if (disc >= 30) return `<span class="maturity-badge" style="background:#f0fdf4;color:#166534" title="Tidig tillväxt: ${disc}">📈 Tidig</span>`;
    return '<span style="color:var(--text-muted);font-size:11px">-</span>';
}

    function stockRow(s, i, type) {
        const ytd = (s.ytd_change_pct||0)*100;
        const m1 = (s.one_month_change_pct||0)*100;
        const oc1m = (s.owners_change_1m||0)*100;
        const roe = s.return_on_equity ? (s.return_on_equity*100).toFixed(0)+'%' : '-';
        const ocf = s.operating_cash_flow ? (s.operating_cash_flow>0?'+':'')+(s.operating_cash_flow/1e6).toFixed(0)+'M' : '-';
        const ev = s.ev_ebit_ratio ? s.ev_ebit_ratio.toFixed(1) : '-';
        const de = s.debt_to_equity_ratio != null ? s.debt_to_equity_ratio.toFixed(1) : '-';

        let extra = '';
        if (type === 'trav') {
            const sc = s.edge_score||0;
            const fund = s.components ? s.components.fundamental : 0;
            extra = `<td style="text-align:center"><span style="font-weight:700;color:${scoreColor(sc)}">${sc.toFixed(0)}</span></td>
                     <td style="text-align:center">${fund?fund.toFixed(0):'-'}</td>`;
        } else {
            extra = `<td style="text-align:center">${s.magic_rank||'-'}</td>
                     <td style="text-align:center">${ev}</td>`;
        }

        const pidx = _portfolioStocks.push(s) - 1;
        return `<tr style="background:${ytd>0?'#f0fdf4':ytd<-10?'#fef2f2':''}">
            <td>${i+1}</td>
            <td><span class="stock-name" onclick="openDrawer(_portfolioStocks[${pidx}])">${s.name}</span></td>
            ${extra}
            <td style="text-align:right">${fmtNum(s.number_of_owners)}</td>
            <td style="text-align:right" class="${oc1m>0?'num-pos':'num-neg'}">${oc1m>0?'+':''}${oc1m.toFixed(1)}%</td>
            <td style="text-align:right">${roe}</td>
            <td style="text-align:right">${ocf}</td>
            <td style="text-align:right">${de}</td>
            <td style="text-align:right;font-weight:600" class="${m1>0?'num-pos':'num-neg'}">${m1>0?'+':''}${m1.toFixed(1)}%</td>
            <td style="text-align:right;font-weight:700" class="${ytd>0?'num-pos':'num-neg'}">${ytd>0?'+':''}${ytd.toFixed(1)}%</td>
        </tr>`;
    }

    const travRows = trav.stocks.map((s,i) => stockRow(s,i,'trav')).join('');
    const magicRows = magic.stocks.map((s,i) => stockRow(s,i,'magic')).join('');

    // Spread beräkning
    const spread_ytd = ((ts.avg_ytd - ms.avg_ytd)*100).toFixed(1);
    const spread_1m = ((ts.avg_1m - ms.avg_1m)*100).toFixed(1);
    const spreadColor = spread_ytd > 0 ? 'var(--green)' : 'var(--red)';

    document.getElementById('content').innerHTML = `
        <div class="info-banner" style="background:linear-gradient(135deg,#f0e8ff,#e8eeff)">
            <div class="info-banner-icon">🏇 vs 📊</div>
            <div class="info-banner-text">
                <strong>Walk-Forward Simulering</strong> — Startdatum: ${data.date}. Portföljerna uppdateras dagligen.
                Data sparas i Supabase. Resultat mäts 1v, 1m, 3m efter varje signal.<br>
                <strong>Trav-modellen:</strong> Ägardriven — köp när ägare ökar i sweet spot (200-5000) + OCF-kvalitet.<br>
                <strong>Magic Formula:</strong> EV/EBIT + ROCE ranking (Greenblatt). Top 20 billigaste kvalitetsbolag.<br>
                <strong style="color:${spreadColor}">Spread YTD: ${spread_ytd}pp · Spread 1M: ${spread_1m}pp</strong>
                (OBS: YTD är bakåtblickande, walk-forward börjar ${data.date})
            </div>
        </div>

        <div style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap">
            ${statCard('Trav-modellen (ENTRY)', ts, 'var(--green)', '🏇')}
            ${statCard('Magic Formula (Top 20)', ms, 'var(--purple)', '📊')}
            <div style="background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-left:4px solid ${spreadColor};flex:1;min-width:280px">
                <div style="font-size:20px;margin-bottom:8px">📈 <strong>Spread (Trav - Magic)</strong></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:14px">
                    <div>YTD spread: <strong style="color:${spreadColor}">${spread_ytd}pp</strong></div>
                    <div>1M spread: <strong style="color:${spread_1m>0?'var(--green)':'var(--red)'}">${spread_1m}pp</strong></div>
                    <div>Win YTD Trav: <strong>${(ts.win_ytd*100).toFixed(0)}%</strong></div>
                    <div>Win YTD Magic: <strong>${(ms.win_ytd*100).toFixed(0)}%</strong></div>
                </div>
            </div>
        </div>

        <h3 style="margin:20px 0 10px;font-size:16px">🏇 Trav-modellen — ${trav.stocks.length} aktier</h3>
        <div class="table-container">
            <table><thead><tr>
                <th>#</th><th>Aktie</th><th>Score</th><th>Fund</th>
                <th style="text-align:right">Ägare</th><th style="text-align:right">Äg 1M</th>
                <th style="text-align:right">ROE</th><th style="text-align:right">OCF</th>
                <th style="text-align:right">D/E</th>
                <th style="text-align:right">Pris 1M</th><th style="text-align:right">Pris YTD</th>
            </tr></thead><tbody>${travRows}</tbody></table>
        </div>

        <h3 style="margin:30px 0 10px;font-size:16px">📊 Magic Formula — Top ${magic.stocks.length}</h3>
        <div class="table-container">
            <table><thead><tr>
                <th>#</th><th>Aktie</th><th>MF Rank</th><th>EV/EBIT</th>
                <th style="text-align:right">Ägare</th><th style="text-align:right">Äg 1M</th>
                <th style="text-align:right">ROE</th><th style="text-align:right">OCF</th>
                <th style="text-align:right">D/E</th>
                <th style="text-align:right">Pris 1M</th><th style="text-align:right">Pris YTD</th>
            </tr></thead><tbody>${magicRows}</tbody></table>
        </div>

        <div class="table-footer">Simulering startad ${data.date} · Walk-forward resultat mäts efter 1v/1m/3m · Data sparas dagligen i Supabase</div>
    `;
}

// ── Simulation ─────────────────────────────────────

async function startSimulation() {
    if (!confirm('Starta simulering med 1 000 000 kr per portfölj?\nDagens aktier och priser låses in.')) return;
    document.getElementById('content').innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
    await fetch('/api/simulation', {method: 'POST'});
    fetchData();
}

async function resetSimulation() {
    if (!confirm('Nollställ simuleringen? Alla data raderas och du kan starta en ny.')) return;
    await fetch('/api/simulation', {method: 'DELETE'});
    fetchData();
}

async function rebalanceSimulation() {
    if (!confirm('Rebalansera alla 5 portföljerna?\n\nTrav: Säljer EXIT-aktier, köper nya ENTRY\nMagic: Roterar om top 20 ändrats\nDSM: Roterar om top 15 ändrats\nACE: Roterar om top 25 ändrats\nMeta: Roterar om top 20 ändrats')) return;
    document.getElementById('content').innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div style="margin-top:12px;color:var(--text-sec)">Rebalanserar portföljerna...</div></div>';
    try {
        const res = await fetch('/api/simulation/rebalance', {method: 'POST'});
        const data = await res.json();
        const changes = data.rebalance_changes || [];
        if (changes.length > 0) {
            const sells = changes.filter(c => c.type === 'SELL');
            const buys = changes.filter(c => c.type === 'BUY');
            const totalGain = sells.reduce((s, c) => s + (c.gain_kr || 0), 0);
            alert(`✅ Rebalansering klar!\n\n${sells.length} sålda aktier\n${buys.length} nya köp\nRealiserat: ${totalGain >= 0 ? '+' : ''}${Math.round(totalGain).toLocaleString('sv-SE')} kr`);
        } else {
            alert('Inga ändringar behövdes — alla aktier har samma signaler.');
        }
    } catch (e) {
        alert('Fel vid rebalansering: ' + e.message);
    }
    fetchData();
}

function renderSimulation(simData) {
    _portfolioStocks = [];
    const portfolios = simData.portfolios || {};
    const portKeys = Object.keys(portfolios);
    const trades = simData.trades || [];
    const realized = simData.realized || {};
    const cash = simData.cash || {};

    const PCFG = {
        trav:         { icon: '🏇', label: 'Trav-modellen',                color: 'var(--green)',  borderColor: 'var(--green)', category: 'signal' },
        magic:        { icon: '📊', label: 'Magic Formula',                color: 'var(--purple)', borderColor: 'var(--purple)', category: 'book' },
        dsm:          { icon: '🎯', label: 'DSM (Dennis Signal)',          color: 'var(--blue)',   borderColor: 'var(--blue)',  category: 'signal' },
        ace:          { icon: '⚡', label: 'ACE (Alpha Engine)',            color: 'var(--orange)', borderColor: 'var(--orange)', category: 'signal' },
        meta:         { icon: '🧠', label: 'Meta Score (Combo)',           color: '#e91e63',       borderColor: '#e91e63',  category: 'signal' },
        books:        { icon: '📚', label: 'Böckerna (10 aktier)',         color: '#8b5cf6',       borderColor: '#8b5cf6',  category: 'book' },
        graham_def:   { icon: '📘', label: 'Graham Defensive (20 st)',     color: '#1d4ed8',       borderColor: '#1d4ed8',  category: 'book' },
        quality_conc: { icon: '🏰', label: 'Buffett Quality (8 st)',       color: '#b45309',       borderColor: '#b45309',  category: 'book' },
        v2_trifecta:  { icon: '🎯', label: 'v2 Trifecta (15 st)',          color: '#059669',       borderColor: '#059669',  category: 'v2' },
        v2_quality_cp:{ icon: '🏰', label: 'v2 Quality Compounder (12 st)', color: '#2563eb',      borderColor: '#2563eb',  category: 'v2' },
    };

    function fmtKr(n) { return n.toLocaleString('sv-SE', {minimumFractionDigits: 0, maximumFractionDigits: 0}) + ' kr'; }
    function fmtRet(n) { return (n >= 0 ? '+' : '') + (n * 100).toFixed(2) + '%'; }
    function rc(n) { return n >= 0 ? 'var(--green)' : 'var(--red)'; }
    function rcClass(n) { return n >= 0 ? 'num-pos' : 'num-neg'; }

    function statLine(label, value, color) {
        return `<div style="display:flex;justify-content:space-between;align-items:baseline;padding:3px 0">
            <span style="font-size:11px;color:var(--text-muted)">${label}</span>
            <span style="font-size:13px;font-weight:600;color:${color||'var(--text)'}">${value}</span>
        </div>`;
    }

    function bigCard(label, icon, color, port, portKey, category) {
        if (!port) return '';
        const c = cash[portKey] || 0;
        // Visa totalt portföljvärde inkl. kassa (matchar vad användaren faktiskt har)
        // Buffett Quality med 30% kassa ska inte se ut som -27% när aktierna är -27%.
        const valHoldings = port.total_current_value;
        const val = port.total_value_with_cash != null ? port.total_value_with_cash : (valHoldings + c);
        const gain = port.total_gain_with_cash != null ? port.total_gain_with_cash : (val - port.start_capital);
        const ret = port.total_return_with_cash_pct != null ? port.total_return_with_cash_pct : (gain / (port.start_capital || 1));
        // Aktiedel-avkastning (utan kassa) — visa som sekundär info
        const aktieRet = port.total_return_pct;
        const aktieGain = port.total_gain;
        const r = realized[portKey] || {total_sells:0, wins:0, losses:0, win_rate:0, total_gain_kr:0};
        const retClass = ret > 0 ? 'pos' : ret < 0 ? 'neg' : 'neu';
        const retArrow = ret > 0 ? '▲' : ret < 0 ? '▼' : '●';
        const badgeLabel = category === 'book' ? 'Bokstrategi' : 'Signalmodell';
        const cashPct = port.cash_pct != null ? port.cash_pct : (val > 0 ? c/val : 0);

        return `<div class="sim-pcard" style="--accent:${color}" onclick="showModelDetail('${portKey}')" title="Klicka för detaljerad vy, plan och transaktioner">
            <span class="sim-pcard-detail-hint">DETALJER →</span>
            <div class="sim-pcard-head">
                <div class="sim-pcard-title"><span class="sim-pcard-icon">${icon}</span>${label}</div>
            </div>
            <div class="sim-pcard-badge" style="display:inline-block;margin-bottom:10px">${badgeLabel}</div>
            <div class="sim-pcard-value" style="color:${ret >= 0 ? 'var(--text)' : 'var(--red)'}">${fmtKr(val)}</div>
            <div class="sim-pcard-return ${retClass}">${retArrow} ${fmtRet(ret)} <span style="opacity:0.7;font-weight:500;margin-left:4px">(${gain>=0?'+':''}${fmtKr(gain)})</span></div>
            <div class="sim-pcard-meta">
                <span>${port.holdings.length} aktier</span><span>•</span>
                <span>${port.days_active} dagar</span><span>•</span>
                <span>Start: ${fmtKr(port.start_capital)}</span>
            </div>
            <div class="sim-pcard-stats">
                <span class="sim-pcard-stat-label">Aktier</span>
                <span class="sim-pcard-stat-val" style="color:${aktieGain !== 0 ? rc(aktieGain) : 'var(--text-muted)'}">
                    ${fmtKr(valHoldings)} <span style="opacity:0.6;font-weight:500">(${fmtRet(aktieRet)})</span>
                </span>
                <span class="sim-pcard-stat-label">Kassa</span>
                <span class="sim-pcard-stat-val" style="color:${c > 100 ? 'var(--blue)' : 'var(--text-muted)'}">
                    ${fmtKr(c)} <span style="opacity:0.6;font-weight:500">(${(cashPct*100).toFixed(0)}%)</span>
                </span>
                <span class="sim-pcard-stat-label">Realiserat</span>
                <span class="sim-pcard-stat-val" style="color:${r.total_gain_kr !== 0 ? rc(r.total_gain_kr) : 'var(--text-muted)'}">
                    ${r.total_gain_kr !== 0 ? (r.total_gain_kr>=0?'+':'')+fmtKr(r.total_gain_kr) : '—'}
                </span>
                <span class="sim-pcard-stat-label">Win rate</span>
                <span class="sim-pcard-stat-val" style="color:${r.total_sells > 0 ? (r.win_rate >= 0.5 ? 'var(--green-dark)' : 'var(--red)') : 'var(--text-muted)'}">
                    ${r.total_sells > 0 ? r.wins+'/'+r.total_sells+' ('+(r.win_rate*100).toFixed(0)+'%)' : 'Inga sälj'}
                </span>
            </div>
        </div>`;
    }

    // Ranking-panel: alla portföljer sorterade på avkastning (inkl. kassa)
    let rankingHtml = '';
    let hero = { totalVal: 0, totalCap: 0, totalRealized: 0, best: null, worst: null };
    if (portKeys.length >= 1) {
        const sorted = portKeys
            .filter(k => portfolios[k])
            .map(k => {
                const p = portfolios[k];
                const c = cash[k] || 0;
                const v = p.total_value_with_cash != null ? p.total_value_with_cash : (p.total_current_value + c);
                const r = p.total_return_with_cash_pct != null ? p.total_return_with_cash_pct : ((v - p.start_capital) / (p.start_capital || 1));
                return { key: k, ret: r, val: v, n: p.holdings.length };
            })
            .sort((a,b) => b.ret - a.ret);
        hero.best = sorted[0];
        hero.worst = sorted[sorted.length - 1];
        hero.totalVal = sorted.reduce((s, x) => s + x.val, 0);
        hero.totalCap = portKeys.reduce((s, k) => s + (portfolios[k]?.start_capital || 0), 0);
        hero.totalRealized = Object.values(realized).reduce((s, r) => s + (r.total_gain_kr || 0), 0);

        rankingHtml = `<div class="sim-ranking">
            <div class="sim-ranking-head">
                <span>📈 Ranking</span>
                <span style="font-size:11px;color:var(--text-muted);font-weight:500;text-transform:none;letter-spacing:0">efter avkastning</span>
            </div>
            ${sorted.map((s, i) => {
                const cfg = PCFG[s.key] || {icon:'', label:s.key};
                const rankCls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
                const rankDisp = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#'+(i+1);
                return `<div class="sim-ranking-row">
                    <span class="sim-ranking-rank ${rankCls}">${rankDisp}</span>
                    <span class="sim-ranking-name"><span>${cfg.icon}</span>${cfg.label}</span>
                    <span class="sim-ranking-ret" style="color:${rc(s.ret)}">${fmtRet(s.ret)}</span>
                </div>`;
            }).join('')}
        </div>`;
    }

    function holdingsTable(port, label, icon) {
        if (!port || !port.holdings.length) return `<h3 style="margin:24px 0 10px;font-size:16px">${icon} ${label} — inga aktier</h3>`;
        const winners = port.holdings.filter(h => h.return_pct > 0).length;
        const losers = port.holdings.filter(h => h.return_pct < 0).length;
        const winPct = (winners / port.holdings.length * 100).toFixed(0);
        const rows = port.holdings.map((h, i) => {
            const pidx = _portfolioStocks.push(h) - 1;
            return `<tr style="background:${h.gain>0?'#f0fdf4':h.gain<0?'#fef2f2':''}">
                <td>${i+1}</td>
                <td><span class="stock-name" onclick="openDrawer(allLoadedRows.find(r=>String(r.orderbook_id)===String(_portfolioStocks[${pidx}].orderbook_id))||_portfolioStocks[${pidx}])">${h.name}</span></td>
                <td style="text-align:right">${h.entry_price.toFixed(2)}</td>
                <td style="text-align:right;font-weight:600">${h.current_price.toFixed(2)}</td>
                <td style="text-align:right;color:var(--text-sec)">${h.shares.toFixed(0)}</td>
                <td style="text-align:right;color:var(--text-sec)">${fmtKr(h.allocation)}</td>
                <td style="text-align:right;font-weight:600" class="${rcClass(h.gain)}">${h.gain>=0?'+':''}${fmtKr(h.gain)}</td>
                <td style="text-align:right;font-weight:700" class="${rcClass(h.return_pct)}">${fmtRet(h.return_pct)}</td>
            </tr>`;
        }).join('');

        return `<h3 style="margin:24px 0 10px;font-size:16px">${icon} ${label} — ${port.holdings.length} aktier <span style="font-weight:400;font-size:13px;color:var(--text-muted)">(${winners} vinnare · ${losers} förlorare · ${winPct}% win)</span></h3>
        <div class="table-container"><table><thead><tr>
            <th>#</th><th>Aktie</th>
            <th style="text-align:right">Köpkurs</th>
            <th style="text-align:right">Nuv. kurs</th>
            <th style="text-align:right">Antal</th>
            <th style="text-align:right">Allokering</th>
            <th style="text-align:right">Avk. kr</th>
            <th style="text-align:right">Avk. %</th>
        </tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    // ── Handelshistorik ──
    function tradesTable() {
        if (!trades.length) return '';
        const reasonLabels = {
            'INITIAL': 'Start', 'NEW_ENTRY': 'Ny signal', 'EXIT_DECEL': 'Exit decel',
            'EXIT_REVERSAL': 'Exit reversal', 'EXIT_WEEKLY': 'Exit vecka',
            'EXIT_INSIDER': 'Exit insider', 'EXIT_DISCOVERY': 'Exit discovery',
            'MF_ROTATION': 'MF rotation',
            'DSM_ROTATION': 'DSM rotation', 'ACE_ROTATION': 'ACE rotation',
            'META_ROTATION': 'Meta rotation', 'REBALANCE': 'Rebalans'
        };
        // Books-portföljen har längre reason-strängar ("BOOKS_INITIAL · composite 82 · …")
        // Rendera dem läsligt: bara första segmentet bold, resten muted.
        function fmtReason(raw) {
            if (!raw) return '';
            const mapped = reasonLabels[raw];
            if (mapped) return mapped;
            if (raw.indexOf(' · ') === -1) return raw;
            const parts = raw.split(' · ');
            const head = parts[0].replace(/^BOOKS_/, '').replace(/_/g,' ').toLowerCase();
            const rest = parts.slice(1).join(' · ');
            return `<span style="font-weight:700">${head}</span><span style="color:var(--text-muted);margin-left:4px">· ${rest}</span>`;
        }
        const portIcons = Object.fromEntries(Object.entries(PCFG).map(([k,v]) => [k, v.icon]));

        const rows = trades.map(t => {
            const isSell = t.trade_type === 'SELL';
            const bg = isSell ? (t.gain_kr > 0 ? '#f0fdf4' : '#fef2f2') : '';
            const gainStr = isSell && t.gain_pct != null ? `<span class="${t.gain_kr >= 0 ? 'num-pos' : 'num-neg'}">${t.gain_kr>=0?'+':''}${(t.gain_pct*100).toFixed(1)}%</span>` : '<span style="color:var(--text-muted)">—</span>';
            const gainKrStr = isSell && t.gain_kr != null ? `<span class="${t.gain_kr >= 0 ? 'num-pos' : 'num-neg'}">${t.gain_kr>=0?'+':''}${fmtKr(t.gain_kr)}</span>` : '';
            const typeColor = isSell ? 'var(--red)' : 'var(--green)';
            const typeBg = isSell ? 'var(--red-light)' : 'var(--green-light)';
            const dateStr = t.trade_date ? t.trade_date.slice(5) : '';

            return `<tr style="background:${bg}">
                <td style="font-size:12px;color:var(--text-sec);white-space:nowrap">${dateStr}</td>
                <td style="font-size:12px">${portIcons[t.portfolio]||''} ${t.portfolio}</td>
                <td style="font-weight:600">${t.name}</td>
                <td><span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:${typeBg};color:${typeColor}">${t.trade_type === 'BUY' ? 'KÖP' : 'SÄLJ'}</span></td>
                <td style="text-align:right">${t.price.toFixed(2)}</td>
                <td style="text-align:right;font-size:12px">${fmtKr(t.value)}</td>
                <td style="font-size:12px;color:var(--text-sec);max-width:320px">${fmtReason(t.reason)}</td>
                <td style="text-align:right">${gainStr}</td>
                <td style="text-align:right;font-size:12px">${gainKrStr}</td>
            </tr>`;
        }).join('');

        const totalSells = trades.filter(t => t.trade_type === 'SELL');
        const totalGain = totalSells.reduce((s, t) => s + (t.gain_kr || 0), 0);

        return `<h3 style="margin:30px 0 10px;font-size:16px;display:flex;align-items:center;gap:8px">
            📋 Handelshistorik <span style="font-weight:400;font-size:13px;color:var(--text-muted)">(${trades.length} transaktioner${totalSells.length > 0 ? ' · Realiserat: '+(totalGain>=0?'+':'')+fmtKr(totalGain) : ''})</span>
        </h3>
        <div class="table-container"><table><thead><tr>
            <th>Datum</th><th>Portfölj</th><th>Aktie</th><th>Typ</th>
            <th style="text-align:right">Pris</th><th style="text-align:right">Värde</th>
            <th>Anledning</th><th style="text-align:right">Avk. %</th><th style="text-align:right">Avk. kr</th>
        </tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    const firstPort = portfolios[portKeys[0]];
    const startDate = firstPort ? firstPort.start_date : '—';

    // Rebalanserings-banner
    const rebalanceTrades = trades.filter(t => t.reason !== 'INITIAL');
    let rebalBanner = '';
    if (rebalanceTrades.length > 0) {
        const lastDate = rebalanceTrades[0]?.trade_date || '';
        const lastSells = rebalanceTrades.filter(t => t.trade_type === 'SELL' && t.trade_date === lastDate);
        const lastBuys = rebalanceTrades.filter(t => t.trade_type === 'BUY' && t.trade_date === lastDate);
        const lastGain = lastSells.reduce((s, t) => s + (t.gain_kr || 0), 0);

// ── Bokmodeller — evaluerar aktien mot klassiska värderingsmodeller ──
function _verdict(pass, warn) {
    if (pass) return {cls:'v-pass', icon:'✅', txt:'Pass'};
    if (warn) return {cls:'v-warn', icon:'⚠️', txt:'Varning'};
    return {cls:'v-fail', icon:'❌', txt:'Fail'};
}
function evaluateBookModels(s) {
    const out = [];
    const pe = s.pe_ratio, pb = s.price_book_ratio, evEbit = s.ev_ebit_ratio;
    const dy = s.direct_yield, roe = s.return_on_equity, roce = s.return_on_capital_employed;
    const de = s.debt_to_equity_ratio, ndEbitda = s.net_debt_ebitda_ratio;
    const vol = s.volatility, beta = s.beta, rsi = s.rsi14;
    const sma200 = s.sma200; // pct deviation (positive = över)
    const mcap = s.market_cap, ocf = s.operating_cash_flow;

    // Graham Defensive — bokens tumregel: P/E × P/B < 22.5 (produkten är
    // summan av margin-of-safety). Rankar på produkten, straffar extrema
    // enskilda gates mjukt (matchar backend `_score_book_models`).
    if (pe != null && pb != null && pe >= 2 && pe <= 80 && pb >= 0.1 && pb <= 20) {
        const prod = pe * pb;
        // Pass om produkten är under gränsen OCH inget enskilt värde är extremt
        // (P/B > 3 = >2x bokvärde, P/E > 25 = högt pris på vinsten)
        const pass = prod < 22.5 && pb <= 3 && pe <= 25;
        // Varning: antingen produkten över 22.5 men under 35, eller produkten
        // under gränsen men med en enskild komponent som är över mjuk gräns
        const warn = (prod < 35) && !(pb > 4 || pe > 30);
        const v = _verdict(pass, !pass && warn);
        // Visa varför varning/fail om produkten i sig är okej
        let metric = `P/E ${pe.toFixed(1)} × P/B ${pb.toFixed(2)} = ${prod.toFixed(1)}`;
        if (!pass && prod < 22.5) {
            if (pb > 3) metric += ` · P/B ${pb.toFixed(2)} > 3 (enskild gate)`;
            else if (pe > 25) metric += ` · P/E ${pe.toFixed(1)} > 25 (enskild gate)`;
        }
        out.push({
            key:'graham', icon:'📘', title:'Graham Defensive',
            sub:'Den intelligente investeraren — P/E × P/B < 22,5',
            v, metric
        });
    }

    // Buffett Quality — kräver BÅDE hög ROE OCH verifierbar låg skuld (D/E eller ND/EBITDA).
    // Utan skuld-data kan vi inte säga om lönsamheten är hävstångsdriven.
    if (roe != null) {
        const roePct = roe * 100;
        const hasDebtData = de != null || ndEbitda != null;
        const deOk = de == null || de < 0.5;
        const ndOk = ndEbitda == null || ndEbitda < 3;
        const pass = roePct >= 15 && hasDebtData && deOk && ndOk;
        const warn = hasDebtData && roePct >= 10 && deOk && ndOk;
        const v = _verdict(pass, !pass && warn);
        const dbgMetric = !hasDebtData
            ? `ROE ${roePct.toFixed(1)}% · skulddata saknas (ej bedömbar)`
            : `ROE ${roePct.toFixed(1)}% · D/E ${de!=null?de.toFixed(2):'—'} · ND/EBITDA ${ndEbitda!=null?ndEbitda.toFixed(1):'—'}`;
        out.push({
            key:'buffett', icon:'🏰', title:'Buffett Quality Moat',
            sub:'Hög ROE + låg skuld = kvalitetsbolag',
            v, metric: dbgMetric
        });
    }

    // Lynch PEG (< 1 = billigt, < 1.5 = OK). Kräver RIKTIG tillväxt (>5%).
    // PEG = P/E / tillväxt — vi approximerar tillväxt från ägarutveckling 1Y
    const growthProxy = s.owners_change_1y != null ? s.owners_change_1y * 100 : null;
    if (pe != null && growthProxy != null && growthProxy > 5) {
        const peg = pe / growthProxy;
        const pass = peg < 1;
        const warn = peg < 1.5;
        const v = _verdict(pass, !pass && warn);
        out.push({
            key:'lynch', icon:'🔎', title:'Lynch PEG',
            sub:'P/E i relation till tillväxt (ägar-proxy)',
            v, metric: `PEG ≈ ${peg.toFixed(2)} (P/E ${pe.toFixed(1)} / tillväxt ${growthProxy.toFixed(1)}%)`
        });
    }

    // Magic Formula (Greenblatt): kräver BÅDA — billigt (låg EV/EBIT) OCH kvalitet (hög ROCE).
    // En enskild stark sida räcker inte enligt Greenblatt.
    if (evEbit != null && roce != null) {
        const ey = 1 / evEbit;  // earnings yield
        const pass = evEbit < 10 && roce > 0.15;
        const warn = evEbit < 15 && roce > 0.10;
        const v = _verdict(pass, !pass && warn);
        const cheapTag = evEbit < 10 ? '✓ billigt' : (evEbit < 15 ? '~ok' : '✗ dyrt');
        const qualTag  = roce > 0.15 ? '✓ kvalitet' : (roce > 0.10 ? '~ok' : '✗ svag kvalitet');
        out.push({
            key:'magic', icon:'📊', title:'Magic Formula',
            sub:'Greenblatt: kräver BÅDE billigt (EV/EBIT<10) OCH kvalitet (ROCE>15%)',
            v, metric: `EY ${(ey*100).toFixed(1)}% (${cheapTag}) · ROCE ${(roce*100).toFixed(1)}% (${qualTag})`
        });
    }

    // Klarman Margin of Safety — kräver BÅDE lågt P/B OCH lågt EV/EBIT (dubbel bekräftelse).
    // En enskild billig multipel kan vara värdefälla — kräv att båda stämmer.
    if (pb != null && evEbit != null) {
        const passBoth = pb < 1.0 && evEbit < 8;
        const warnBoth = pb < 1.5 && evEbit < 12;
        const v = _verdict(passBoth, !passBoth && warnBoth);
        out.push({
            key:'klarman', icon:'🛡️', title:'Klarman Margin of Safety',
            sub:'Djupvärde — kräver BÅDE lågt P/B OCH lågt EV/EBIT',
            v, metric: `P/B ${pb.toFixed(2)} · EV/EBIT ${evEbit.toFixed(1)}`
        });
    } else if (pb != null || evEbit != null) {
        // Bara en mätpunkt → kan som bäst bli warn
        const warn = (pb != null && pb < 1.0) || (evEbit != null && evEbit < 8);
        const v = _verdict(false, warn);
        out.push({
            key:'klarman', icon:'🛡️', title:'Klarman Margin of Safety',
            sub:'Djupvärde — kräver BÅDE lågt P/B OCH lågt EV/EBIT',
            v, metric: `P/B ${pb!=null?pb.toFixed(2):'—'} · EV/EBIT ${evEbit!=null?evEbit.toFixed(1):'—'} (endast ett mätvärde)`
        });
    }

    // Bogle/Investera — utdelning + kvalitet (DY ≥ 3%, ROE > 10%, D/E < 1)
    if (dy != null) {
        const dyPct = dy * 100;
        const roeOk = roe == null || roe * 100 > 10;
        const deOk = de == null || de < 1;
        const pass = dyPct >= 3 && roeOk && deOk;
        const warn = dyPct >= 2;
        const v = _verdict(pass, !pass && warn);
        out.push({
            key:'divq', icon:'💰', title:'Utdelningskvalitet',
            sub:'Stabil direktavkastning + hållbar balansräkning',
            v, metric: `DY ${dyPct.toFixed(2)}% · ROE ${roe!=null?(roe*100).toFixed(1)+'%':'—'} · D/E ${de!=null?de.toFixed(2):'—'}`
        });
    }

    // Trend / Momentum (ovanför SMA200, RSI < 70)
    if (sma200 != null) {
        const trendUp = sma200 > 0;
        const rsiOk = rsi == null || rsi < 70;
        const pass = trendUp && rsiOk && (rsi == null || rsi > 40);
        const warn = trendUp;
        const v = _verdict(pass, !pass && warn);
        out.push({
            key:'trend', icon:'📈', title:'Trend & Momentum',
            sub:'Stinsen-regeln — följ trenden, undvik överköpta lägen',
            v, metric: `SMA200 ${(sma200*100).toFixed(1)}% · RSI ${rsi!=null?rsi.toFixed(0):'—'}`
        });
    }

    // Taleb Barbell — hög vol = spekulativ (liten andel); låg vol = säker (stor andel)
    if (vol != null) {
        const volPct = vol * 100;
        let tag, v;
        if (volPct < 25) { tag = 'Säker sida (80% av portföljen)'; v = _verdict(true, false); }
        else if (volPct < 45) { tag = 'Mitten — begränsad roll'; v = _verdict(false, true); }
        else { tag = 'Spekulativ sida (max 20%)'; v = _verdict(false, false); }
        out.push({
            key:'taleb', icon:'🎯', title:'Taleb Barbell',
            sub:'Klassa som "säker" vs "spekulativ"',
            v, metric: `${tag} · vol ${volPct.toFixed(0)}% · beta ${beta!=null?beta.toFixed(2):'—'}`
        });
    }

    // Kelly Criterion — simpel sizing baserat på estimerat edge från meta_score
    if (s.meta_score != null) {
        const edge = (s.meta_score - 50) / 100;  // 50 = neutral, >50 = edge
        const kelly = Math.max(-0.25, Math.min(0.25, edge * 0.5));
        const kellyPct = kelly * 100;
        const pass = kellyPct > 10;
        const warn = kellyPct > 3;
        const v = _verdict(pass, !pass && warn);
        out.push({
            key:'kelly', icon:'🎲', title:'Kelly Sizing',
            sub:'Halv-Kelly från Meta Score (edge-baserad vikt)',
            v, metric: `Föreslagen vikt ${kellyPct>0?'+':''}${kellyPct.toFixed(1)}%`
        });
    }

    // Ägarmomentum (Spiltan/Stinsen — smart money flow)
    if (s.owners_change_1m != null) {
        const mom = s.owners_change_1m * 100;
        const pass = mom > 3;
        const warn = mom > 0;
        const v = _verdict(pass, !pass && warn);
        out.push({
            key:'owners', icon:'👥', title:'Ägarmomentum',
            sub:'Spiltan-approach — smart money följer kvalitet',
            v, metric: `Ägare +${mom.toFixed(1)}% (30d) · totalt ${fmtNum(s.number_of_owners)}`
        });
    }

    return out;
}

// Värdefälle-detektor — matchar backend `_value_trap_score` i edge_db.py.
// Extrema värderingstal + extrem ROE/ROCE + fallande pris = TTM är sannolikt
// peak-earnings och marknaden prissätter normalisering. Graham varnade
// explicit: använd 7-årssnitt, inte peak-year TTM.
function calculateValueTrapScore(s) {
    const pe = s.pe_ratio, ev = s.ev_ebit_ratio;
    const roe = s.return_on_equity, roce = s.return_on_capital_employed;
    const sma200 = s.sma200, rsi = s.rsi14;
    const c1m = s.one_month_change_pct, c6m = s.six_months_change_pct, c1y = s.one_year_change_pct;

    let pts = 0;
    // "För billig"-koincidens
    if (pe != null && ev != null && pe > 0 && pe < 8 && ev > 0 && ev < 5) pts += 30;
    else if (pe != null && pe > 0 && pe < 6) pts += 15;
    else if (ev != null && ev > 0 && ev < 4) pts += 15;

    // Cyklisk peak
    if (roe != null && roe > 0.30) pts += 12;
    if (roce != null && roce > 0.30) pts += 10;

    // Fallande pris
    if (c1y != null && c1y < -15) pts += 18;
    else if (c1y != null && c1y < -8) pts += 10;
    if (c6m != null && c6m < -10) pts += 12;
    else if (c6m != null && c6m < -5) pts += 6;
    if (c1m != null && c1m < -5) pts += 6;

    // Teknisk
    if (sma200 != null && sma200 < -15) pts += 10;
    else if (sma200 != null && sma200 < -8) pts += 5;
    if (rsi != null && rsi < 40) pts += 5;

    // Kräv BÅDA värde-signal och negativ pris-signal
    const hasValue = (pe != null && pe > 0 && pe < 10) || (ev != null && ev > 0 && ev < 6);
    const hasNegPrice = (c1y != null && c1y < -8) || (c6m != null && c6m < -5) || (sma200 != null && sma200 < -8);
    if (!hasValue || !hasNegPrice) return 0;

    return Math.max(0, Math.min(100, pts));
}

function renderValueTrapBanner(s) {
    const trap = calculateValueTrapScore(s);
    if (trap < 40) return '';
    const pe = s.pe_ratio, ev = s.ev_ebit_ratio;
    const roe = s.return_on_equity, roce = s.return_on_capital_employed;
    const c1y = s.one_year_change_pct, c6m = s.six_months_change_pct;
    const peakParts = [];
    if (pe != null && pe > 0 && pe < 8) peakParts.push(`P/E ${pe.toFixed(1)}`);
    if (ev != null && ev > 0 && ev < 5) peakParts.push(`EV/EBIT ${ev.toFixed(1)}`);
    if (roe != null && roe > 0.30) peakParts.push(`ROE ${(roe*100).toFixed(0)}%`);
    if (roce != null && roce > 0.30) peakParts.push(`ROCE ${(roce*100).toFixed(0)}%`);
    const priceParts = [];
    if (c1y != null) priceParts.push(`1Y ${c1y >= 0 ? '+' : ''}${c1y.toFixed(0)}%`);
    if (c6m != null) priceParts.push(`6M ${c6m >= 0 ? '+' : ''}${c6m.toFixed(0)}%`);
    const severity = trap >= 70 ? 'hög' : (trap >= 55 ? 'måttlig' : 'låg');
    const bg = trap >= 70 ? '#fef2f2' : '#fff7ed';
    const border = trap >= 70 ? '#ef4444' : '#f59e0b';
    const titleColor = trap >= 70 ? '#991b1b' : '#92400e';
    return `
        <div style="background:${bg};border-left:4px solid ${border};border-radius:10px;padding:12px 14px;margin-bottom:10px">
            <div style="display:flex;align-items:center;gap:8px;font-weight:800;color:${titleColor};font-size:13px">
                🚩 Värdefälle-varning (${severity} risk · ${trap.toFixed(0)}/100)
            </div>
            <div style="font-size:12px;color:#3f3f46;line-height:1.5;margin-top:4px">
                <strong>Peak-siffror:</strong> ${peakParts.join(' · ') || '—'}
                ${priceParts.length ? `<br><strong>Men pris:</strong> ${priceParts.join(' / ')}` : ''}
                <br>Marknaden diskonterar sannolikt att TTM är en topp. Graham krävde 7-årssnitt av vinsten i denna situation.
            </div>
        </div>
    `;
}
